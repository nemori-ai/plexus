          h('span', { className: 'lid' }, t.id),
          h('span', { className: 'ltt' + (title ? '' : ' empty') }, title || 'untitled'),
        ),
        h('div', { className: 'tltrack' },
          h('div', { className: 'tlgrid' }, ...(gridEls || [])),
          bar,
        ),
      );
    }

    // ---- DISCUSS HISTORY — past discussions on a node ----------------------
    // Renders the discuss-sidecar record for one node: a summary line (count +
    // latest TL;DR + latest time) that expands to per-round entries. Fed the
    // already-grouped, round-ascending list for the selected node. Every field is
    // guarded — a sidecar missing tldr / resolved_at / round still renders (that
    // line just drops the absent bit); a wholly empty entry is skipped, never throws.
    // The `ask_type` badge reuses the .askbadge idiom from the decision card.
    function localTime(iso) {
      const ms = parseTs(typeof iso === 'string' ? iso : '');
      if (ms == null) return (typeof iso === 'string' && iso.trim()) ? iso.trim() : null;
      try { return new Date(ms).toLocaleString(); } catch (_e) { return iso; }
    }
    function DiscussHistory({ items }) {
      const [open, setOpen] = useState(false);
      const list = Array.isArray(items) ? items : [];
      if (!list.length) return null;

      // latest = last element (the group is round/time ascending). TL;DR + time
      // for the summary line both come from it, each independently guarded.
      const latest = list[list.length - 1];
      const latestTldr = (latest && typeof latest.tldr === 'string' && latest.tldr.trim())
        ? latest.tldr.trim() : null;
      const latestWhen = latest ? localTime(latest.resolved_at) : null;

      const summaryBits = [
        h('span', { key: 'n', className: 'dh-count' }, '已讨论 ' + list.length + ' 次'),
      ];
      if (latestTldr) summaryBits.push(
        h('span', { key: 'tl', className: 'dh-tldr' }, '最近结论：' + latestTldr));
      if (latestWhen) summaryBits.push(
        h('span', { key: 'wh', className: 'dh-when' }, latestWhen));

      const rows = list.map((d, i) => {
        if (!d || typeof d !== 'object') return null;
        const round = Number(d.round);
        const roundStr = Number.isFinite(round) ? '#' + round : null;
        const when = localTime(d.resolved_at);
        const askKey = (d.ask_type === 'decision' || d.ask_type === 'advice' || d.ask_type === 'solution')
          ? d.ask_type : null;
        const askMeta = askKey ? ASK_META[askKey] : null;
        const tldr = (typeof d.tldr === 'string' && d.tldr.trim()) ? d.tldr.trim() : null;
        // skip an entry with literally nothing to show
        if (!roundStr && !when && !askMeta && !tldr) return null;

        const head = [];
        if (roundStr) head.push(h('span', { key: 'r', className: 'dh-round' }, roundStr));
        if (askMeta) head.push(
          h('span', { key: 'ab', className: 'askbadge ' + askKey },
            h('span', { className: 'glyph' }, askMeta.glyph), askMeta.label));
        if (when) head.push(h('span', { key: 'w', className: 'dh-when' }, when));

        return h('div', { className: 'dh-entry', key: (roundStr || '') + i },
          head.length ? h('div', { className: 'dh-ehead' }, ...head) : null,
          tldr ? h('div', { className: 'dh-etldr' }, tldr) : null,
        );
      }).filter(Boolean);

      return h('div', { className: 'dischist-box' },
        h('div', {
          className: 'dh-summary' + (open ? ' open' : ''),
          onClick: () => setOpen(o => !o),
          role: 'button', tabIndex: 0,
          title: open ? '收起讨论历史' : '展开讨论历史',
        },
          h('span', { className: 'dh-caret' }, open ? '▾' : '▸'),
          h('span', { className: 'dh-summary-text' }, ...summaryBits),
        ),
        open && rows.length ? h('div', { className: 'dh-entries' }, ...rows) : null,
      );
    }

    // ---- DECISION CARD — rich awaiting-user briefing -----------------------
    // When an awaiting-user node carries a prepared `decision_package` (an
    // agent-shaped, on-board field — NOT part of the narrow waist), the amber
    // "awaiting you" flag is upgraded to a full decision briefing in the detail
    // rail. Schema (pinned, do NOT assume other field names):
    //   prepared_at, inputs_hash, freshness('fresh'|'stale'),
    //   ask_type('decision'|'advice'|'solution'), context_md, question,
    //   what_i_need, why_it_matters, options[{id,label,rationale,tradeoffs}],
    //   enter_cmd
    // Graceful degradation: a node may have NO decision_package, or a partial
    // one — every field read below is guarded; missing fields just omit their
    // block, nothing throws. options may be [] (advice/solution) → no options
    // block. The copy button is navigator.clipboard ONLY — zero fetch/POST/XHR.
    const ASK_META = {
      decision: { glyph: '◈', label: 'decision' },
      advice:   { glyph: '◇', label: 'advice' },
      solution: { glyph: '◆', label: 'solution' },
    };
    function DecisionCard({ pkg }) {
      // copy-feedback state: '' | 'copied' | 'failed'. Hook is called
      // unconditionally at the top (DecisionCard only renders when pkg exists).
      const [copyState, setCopyState] = useState('');
      const resetRef = useRef(null);
      useEffect(() => () => { if (resetRef.current) clearTimeout(resetRef.current); }, []);

      if (!pkg || typeof pkg !== 'object') return null;

      const askKey = (pkg.ask_type === 'decision' || pkg.ask_type === 'advice' || pkg.ask_type === 'solution')
        ? pkg.ask_type : null;
      const askMeta = askKey ? ASK_META[askKey] : null;
      const cmd = (typeof pkg.enter_cmd === 'string' && pkg.enter_cmd.trim()) ? pkg.enter_cmd.trim() : '';

      const onCopy = useCallback(() => {
        if (!cmd) return;
        const flash = (st) => {
          setCopyState(st);
          if (resetRef.current) clearTimeout(resetRef.current);
          resetRef.current = setTimeout(() => setCopyState(''), 1800);
        };
        // client-only clipboard write — no network of any kind. navigator.clipboard
        // may be absent (insecure context / old engine); fall back to a textarea +
        // execCommand, still 100% local. Any failure → 'failed' flash, no throw.
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(cmd).then(() => flash('copied'), () => flash('failed'));
            return;
          }
        } catch (_e) { /* fall through to local fallback */ }
        try {
          const ta = document.createElement('textarea');
          ta.value = cmd; ta.setAttribute('readonly', '');
          ta.style.position = 'absolute'; ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          const ok = document.execCommand('copy');
          document.body.removeChild(ta);
          flash(ok ? 'copied' : 'failed');
        } catch (_e) { flash('failed'); }
      }, [cmd]);

      const bits = [];

      // ask-type badge + (optional) stale freshness hint
      const askRow = [];
      if (askMeta) askRow.push(
        h('span', { key: 'ab', className: 'askbadge ' + askKey },
          h('span', { className: 'glyph' }, askMeta.glyph), askMeta.label));
      if (askRow.length) bits.push(h('div', { key: 'askrow', className: 'askrow' }, ...askRow));

      if (pkg.freshness === 'stale') bits.push(
        h('div', { key: 'stale', className: 'stalehint' },
          h('span', { className: 'glyph' }, '⟲'),
          '可能已过期，进入讨论时会自动刷新'));

      // the question — headline
      if (typeof pkg.question === 'string' && pkg.question.trim()) bits.push(
        h('div', { key: 'q', className: 'question' }, pkg.question.trim()));

      // self-explaining context (preformatted plain text; React escapes content)
      if (typeof pkg.context_md === 'string' && pkg.context_md.trim()) bits.push(
        h('div', { key: 'ctx', className: 'context-md' }, pkg.context_md));

      // what-i-need / why-it-matters
      const field = (key, k, v) => {
        if (typeof v !== 'string' || !v.trim()) return;
        bits.push(h('div', { key, className: 'decfield' },
          h('div', { className: 'dfk' }, k),
          h('div', { className: 'dfv' }, v.trim())));
      };
      field('need', 'what i need', pkg.what_i_need);
      field('why', 'why it matters', pkg.why_it_matters);

      // options[] — each label + rationale + tradeoffs. Empty array → omitted.
      const options = Array.isArray(pkg.options) ? pkg.options : [];
      if (options.length) {
        bits.push(h('div', { key: 'opts', className: 'options' },
          ...options.map((o, i) => {
            if (!o || typeof o !== 'object') return null;
            const rows = [];
            const oid = (o.id != null && String(o.id).trim()) ? String(o.id).trim() : null;
            const label = (typeof o.label === 'string' && o.label.trim()) ? o.label.trim() : '(unlabeled option)';
            const ohead = [];
            if (oid) ohead.push(h('span', { key: 'id', className: 'oid' }, oid));
            ohead.push(h('span', { key: 'lb', className: 'olabel' }, label));
            rows.push(h('div', { key: 'h', className: 'ohead' }, ...ohead));
            if (typeof o.rationale === 'string' && o.rationale.trim())
              rows.push(h('div', { key: 'r', className: 'orat' }, o.rationale.trim()));
            if (typeof o.tradeoffs === 'string' && o.tradeoffs.trim())
              rows.push(h('div', { key: 't', className: 'otrade' },
                h('span', { className: 'otk' }, 'trade'),
                h('span', null, o.tradeoffs.trim())));
            return h('div', { key: oid || ('opt' + i), className: 'opt' }, ...rows);
          }).filter(Boolean)));
      }

      // the copy-command button (client-only) + the literal command beneath it
      if (cmd) {
        const copyLabel = copyState === 'copied' ? '已复制'
          : copyState === 'failed' ? '复制失败，手动选择下方命令'
          : '复制命令';
        const copyGlyph = copyState === 'copied' ? '✓' : copyState === 'failed' ? '✕' : '⧉';
        bits.push(h('div', { key: 'copy', className: 'copyrow' },
          h('div', {
            className: 'copycmd' + (copyState ? ' ' + copyState : ''),
            onClick: onCopy, role: 'button', tabIndex: 0,
            title: '复制进入讨论的命令到剪贴板（纯本地，零联网）',
          },
            h('span', { className: 'glyph' }, copyGlyph), copyLabel),
          h('div', { className: 'cmdtext' }, cmd)));
      }

      if (!bits.length) return null;
      return h('div', { className: 'deccard' }, ...bits);
    }

    // ---- DETAIL RAIL — full task readout -----------------------------------
    function Detail({ task, an, board, discussions, onClose, onPick }) {
      const open = !!task;
      const lamp = task ? statusColor(task.status) : 'transparent';

      const body = [];
      if (task && an) {
        const id = task.id;
        const title = (task.title || '').trim();
        const isCrit = an.critSet.has(id);
        const isBneck = an.bneck === id;
        // awaiting-user = blocked_on:'user' AND pending status (mirrors the tile
        // + analyze via isAwaitingUser); a terminal task's stale gate doesn't count.
        const userGate = isAwaitingUser(task);

        // badges
        const badges = [];
        if (isCrit) badges.push(h('span', { className: 'badge crit', key: 'b1' }, '⟋ critical path'));
        if (isBneck) badges.push(h('span', { className: 'badge bneck', key: 'b2' }, '⚠ bottleneck'));
        if (task.verified === true) badges.push(h('span', { className: 'badge verified', key: 'b3' }, '✓ verified'));
        if (badges.length) body.push(h('div', { className: 'dsect', key: 'badges' },
          h('div', { className: 'badge-row' }, ...badges)));

        // identity
        const idRows = [];
        const addRow = (k, v, mono) => {
          if (v == null || v === '') return;
          idRows.push(h('div', { className: 'row', key: k },
            h('span', { className: 'k' }, k),
            h('span', { className: 'v' + (mono ? ' mono' : '') }, v)));
        };
        addRow('kind', task.kind);
        addRow('mechanism', task.mechanism, true);
        addRow('handle', task.handle, true);
        addRow('impact', (an.impact.get(id) || 0) + ' downstream', false);
        addRow('fan-in', (an.inDeg.get(id) || 0) + ' direct deps', false);
        if (idRows.length) body.push(h('div', { className: 'dsect', key: 'ident' },
          h('div', { className: 'sl' }, 'identity'),
          h('div', { className: 'kv' }, ...idRows)));

        // WHY — the headline
        const whyBits = [];
        if (task.justification) whyBits.push(
          h('div', { className: 'why-text', key: 'just' }, task.justification));
        if (task.dep_pins && typeof task.dep_pins === 'object') {
          const pins = Object.entries(task.dep_pins);
          if (pins.length) whyBits.push(h('div', { className: 'kv', key: 'pins', style: { marginTop: '10px' } },
            ...pins.map(([k, v]) => h('div', { className: 'row', key: k },
              h('span', { className: 'k' }, 'pin ' + k),
              h('span', { className: 'v mono' }, String(v))))));
        }

        // dependencies (upstream, by title + status)
        const deps = (an.upstream.get(id) || []);
        const depList = deps.length
          ? h('div', { className: 'deplist' }, ...deps.map(d => depItem(d, an, onPick)))
          : h('div', { className: 'deplist' }, h('div', { className: 'empty' }, 'no upstream dependencies — a root task'));

        // dependents (downstream — direct + transitive count)
        const directDown = (an.downstream.get(id) || []);
        const allDown = an.descendants(id, new Set());
        const transOnly = [...allDown].filter(x => !directDown.includes(x));
        const downBits = [];
        if (directDown.length) {
          downBits.push(h('div', { className: 'deplist', key: 'dd' },
            ...directDown.map(d => depItem(d, an, onPick))));
          if (transOnly.length) {
            downBits.push(h('div', { className: 'transitive-head', key: 'th' },
              '+ ' + transOnly.length + ' transitive'));
          }
        } else {
          downBits.push(h('div', { className: 'deplist', key: 'de' },
            h('div', { className: 'empty' }, 'gates nothing — a leaf task')));
        }

        body.push(h('div', { className: 'dsect why', key: 'why' },
          h('div', { className: 'sl' }, '◆ why this exists'),
          whyBits.length ? whyBits : h('div', { className: 'mv dim', style: { fontSize: '11.5px', color: 'var(--ink-faint)' } }, 'no justification recorded'),
        ));

        // rich decision card — only when this node is genuinely awaiting the user
        // AND a decision_package has been prepared. When awaiting-user but the
        // package isn't ready yet, this is simply skipped (the tile/list amber
        // "awaiting you" flag stays the signal — no error, graceful degradation).
        if (userGate && task.decision_package && typeof task.decision_package === 'object') {
          body.push(h('div', { className: 'dsect decision', key: 'decision' },
            h('div', { className: 'sl' }, '◈ decision needed'),
            h(DecisionCard, { pkg: task.decision_package }),
          ));
        }

        // discuss history — any node (not just awaiting-user) that has ≥1 discuss
        // sidecar shows a collapsible record of past discussions. Sourced from the
        // OPTIONAL /decisions.json; when absent (old server) discussions is [] and
        // this whole section is omitted. Independent of the live decision_package.
        const discList = Array.isArray(discussions) ? discussions : [];
        if (discList.length) {
          body.push(h('div', { className: 'dsect dischist', key: 'dischist' },
            h('div', { className: 'sl' }, '💬 discuss history'),
            h(DiscussHistory, { items: discList }),
          ));
        }

        body.push(h('div', { className: 'dsect', key: 'deps' },
          h('div', { className: 'sl' }, 'waiting on'),
          depList,
        ));

        body.push(h('div', { className: 'dsect', key: 'blocks' },
          h('div', { className: 'sl' }, 'this blocks'),
          ...downBits,
        ));

        // telemetry
        const teleRows = [];
        const addTele = (k, v, mono) => {
          if (v == null || v === '') return;
          teleRows.push(h('div', { className: 'row', key: k },
            h('span', { className: 'k' }, k),
            h('span', { className: 'v' + (mono ? ' mono' : '') }, v)));
        };
        addTele('created', task.created_at, true);
        addTele('started', startStr(task), true);
        addTele('finished', endStr(task), true);
        const elStr = fmtElapsed(msFromDispatch(task));
        if (elStr != null) addTele('elapsed', elStr, true);
        // execution time — how long the task ran (live) or took (settled).
        const dur = taskDuration(task);
        const durStr = fmtDuration(dur);
        if (durStr != null) addTele(dur && dur.running ? 'runtime' : 'duration', durStr, true);
        // human-in-the-loop cost: how many user-decision rounds this task cycled through.
        if (typeof task.hitl_rounds === 'number' && task.hitl_rounds > 0) addTele('hitl rounds', String(task.hitl_rounds), true);
        if (userGate) {
          addTele('awaiting', 'user' + (elStr != null ? ' · ' + elStr : ''), false);
        } else if (task.blocked_on && task.blocked_on !== 'user') {
          addTele('blocked on', task.blocked_on, true);
        }
        addTele('verified', task.verified === true ? 'yes' : (task.verified === false ? 'no' : null), false);
        if (teleRows.length) body.push(h('div', { className: 'dsect', key: 'tele' },
          h('div', { className: 'sl' }, 'telemetry'),
          h('div', { className: 'kv' }, ...teleRows)));

        // artifact
        if (task.artifact) body.push(h('div', { className: 'dsect', key: 'art' },
          h('div', { className: 'sl' }, 'artifact'),
          h('div', { className: 'artifact-box' }, String(task.artifact))));

        // activity (log + notes). A log entry may be a bare string OR a rich
        // object { ts, kind, summary, detail?, refs? } (the append-only log
        // schema) — render the rich shape as "ts · kind · summary" with detail/
        // refs, falling back to String() for legacy bare-string entries.
        const logs = Array.isArray(task.log) ? task.log : [];
        const activityBits = [];
        if (task.notes) activityBits.push(h('div', { className: 'le', key: 'note', style: { color: 'var(--ink)' } }, task.notes));
        for (let i = 0; i < logs.length; i++) {
          const entry = logs[i];
          if (entry && typeof entry === 'object' && !Array.isArray(entry)) {
            const head = [entry.ts, entry.kind, entry.task].filter(x => x != null && x !== '').join(' · ');
            const lines = [];
            if (head) lines.push(h('span', { className: 'lehead', style: { color: 'var(--ink-faint)' } }, head));
            if (entry.summary != null && entry.summary !== '') lines.push(h('span', { className: 'lesum' }, String(entry.summary)));
            if (entry.detail != null && entry.detail !== '') lines.push(h('span', { className: 'ledet', style: { color: 'var(--ink-faint)' } }, String(entry.detail)));
            if (Array.isArray(entry.refs) && entry.refs.length) lines.push(h('span', { className: 'lerefs', style: { color: 'var(--ink-faint)' } }, 'refs: ' + entry.refs.map(String).join(', ')));
            activityBits.push(h('div', { className: 'le', key: 'l' + i }, lines.length ? lines : String(entry)));
          } else {
            activityBits.push(h('div', { className: 'le', key: 'l' + i }, String(entry)));
          }
        }
        if (activityBits.length) body.push(h('div', { className: 'dsect', key: 'act' },
          h('div', { className: 'sl' }, 'activity'),
          h('div', { className: 'activity' }, ...activityBits)));
      }

      return h('div', { id: 'detail', className: open ? 'open' : '' },
        open ? h('div', { className: 'dpanel' },
          h('div', { className: 'dhead' },
            h('span', { className: 'lamp', style: { background: lamp, color: lamp } }),
            h('div', { className: 'htext' },
              h('div', { className: 'htitle' + ((task.title || '').trim() ? '' : ' empty') },
                (task.title || '').trim() || 'untitled'),
              h('div', { className: 'hmeta' },
                h('span', { className: 'hid' }, task.id),
                h('span', { className: 'hstat', style: { color: lamp } },
                  STATUS_LABEL[task.status] || task.status),
              ),
            ),
            h('div', { className: 'dclose', onClick: onClose, title: 'close (or click canvas)' }, '✕'),
          ),
          ...body,
        ) : null,
      );
    }

    // a dependency / dependent line: lamp + id + title + status, clickable
    function depItem(id, an, onPick) {
      const t = an.byId.get(id);
      const status = t ? t.status : 'unknown';
      const c = statusColor(status);
      const title = t && (t.title || '').trim();
      return h('div', { className: 'depitem', key: id, onClick: () => onPick(id) },
        h('span', { className: 'lamp', style: { background: c, color: c } }),
        h('span', { className: 'dt' },
          h('span', { className: 'did' }, id),
          title || h('span', { style: { color: 'var(--ink-faint)', fontStyle: 'italic' } }, 'untitled')),
        h('span', { className: 'ds', style: { color: c } }, STATUS_LABEL[status] || status),
      );
    }

    function Legend({ counts, total }) {
      return h('div', { className: 'legend' },
        h('div', { className: 'lhead' },
          h('span', null, 'status'),
          h('span', { className: 'total' }, total + ' tasks'),
        ),
        h('div', { className: 'grid' },
          STATUS_ORDER.map(s => {
            const n = counts[s] || 0;
            const c = statusColor(s);
            return h('div', { className: 'row' + (n ? ' live' : ''), key: s },
              h('span', { className: 'lamp', style: { background: c, color: c } }),
              h('span', { className: 'nm' }, STATUS_LABEL[s] || s),
              h('span', { className: 'ct' }, n ? n : '·'),
            );
          }),
        ),
        h('div', { className: 'spine-key' },
          h('span', { className: 'bar' }),
          h('span', { className: 'nm' }, 'critical path'),
        ),
      );
    }

    function App() {
      return h(ReactFlowProvider, null, h(Board, null));
    }

    createRoot(document.getElementById('root')).render(h(App, null));
  </script>
</body>
</html>
