<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>cc-master · mission control</title>
  <!-- All assets are served from this server's /vendor/ — ZERO external URLs (offline / air-gapped). -->
  <link rel="stylesheet" href="/vendor/xyflow-style.css" />
  <style>
    /* ============================================================================
       cc-master — MISSION CONTROL · dark telemetry console
       Vendored fonts (offline): Archivo (display grotesque) + Martian Mono (telemetry).
       Color: OKLCH only, brand hue 255 (deep space blue-graphite). Neutrals tinted
       subtly toward the hue; chroma drops near black/white; no pure #000/#fff.
       ========================================================================= */

    @font-face {
      font-family: 'Archivo';
      src: url('/vendor/fonts/archivo-500.woff2') format('woff2');
      font-weight: 500; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Archivo';
      src: url('/vendor/fonts/archivo-600.woff2') format('woff2');
      font-weight: 600; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Archivo';
      src: url('/vendor/fonts/archivo-700.woff2') format('woff2');
      font-weight: 700; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Martian Mono';
      src: url('/vendor/fonts/martian-mono-400.woff2') format('woff2');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Martian Mono';
      src: url('/vendor/fonts/martian-mono-500.woff2') format('woff2');
      font-weight: 500; font-style: normal; font-display: swap;
    }

    :root {
      color-scheme: dark;

      /* ---- ground / panels (60: large neutral field) ---- */
      --ground:    oklch(0.145 0.012 255);   /* deepest void behind canvas */
      --panel:     oklch(0.185 0.014 255);   /* chrome panels (header/legend) */
      --panel-hi:  oklch(0.225 0.016 255);   /* raised inset */
      --grid:      oklch(0.255 0.012 255);   /* hairline canvas grid */

      /* ---- lines + text (30: secondary structure) ---- */
      --hair:      oklch(0.30 0.012 255);    /* hairline dividers */
      --hair-soft: oklch(0.26 0.010 255);
      --ink:       oklch(0.93 0.008 255);    /* primary text (never #fff) */
      --ink-dim:   oklch(0.66 0.013 255);    /* secondary text */
      --ink-faint: oklch(0.50 0.013 255);    /* tertiary / units */
      --edge:      oklch(0.46 0.018 252);    /* idle DAG connector */

      /* ---- status lamps (10: rare status-color light points) ---- */
      --done:      oklch(0.74 0.135 162);    /* jade green — done / verified */
      --inflight:  oklch(0.79 0.150 74);     /* amber — in flight (pulses) */
      --blocked:   oklch(0.56 0.022 250);    /* muted slate — blocked on task */
      --ready:     oklch(0.70 0.115 244);    /* cool blue — ready */
      --escalated: oklch(0.64 0.165 300);    /* violet — escalated */
      --failed:    oklch(0.63 0.190 26);     /* red — failed */
      --stale:     oklch(0.72 0.115 96);     /* ochre — stale */
      --uncertain: oklch(0.71 0.130 352);    /* pink — uncertain */

      /* ---- the amber spine + the one allowed alarm ---- */
      --spine:     oklch(0.80 0.160 70);     /* critical-path amber */
      --alert:     oklch(0.80 0.150 66);     /* user-gate alarm amber */

      --r-sm: 4px; --r-md: 7px; --r-lg: 11px;

      /* JS-resolved scalars that the minimap SVG can't read from oklch() vars.
         Concrete hex, theme-switched via the [data-theme] block below; JS reads
         these (getComputedStyle) so minimap bg/mask/stroke track the theme too. */
      --mm-bg:     #13151c;   /* minimap canvas background */
      --mm-mask:   rgba(14, 16, 22, 0.74);  /* outside-viewport mask */
      --mm-stroke: #3a3f4d;   /* node-dot stroke so dots never vanish */

      /* drop-shadow base — darker (toward void) on dark; tinted-grey on light. */
      --shadow:    oklch(0.10 0.01 255);

      /* surfaces that on dark sit DARKER than --panel (insets, chips, the ring
         separating a glowing lamp from its tile). On light these must flip to
         sit slightly DARKER than the paper too — so they get redefined, not
         inverted, in the light block. */
      --inset:     oklch(0.16 0.012 255 / 0.6);   /* recessed inset surface */
      --chip-bg:   oklch(0.26 0.012 255 / 0.7);   /* chip / badge fill */
      --lamp-ring: oklch(0.16 0.012 255 / 0.6);   /* hairline ring around a lamp */

      /* the canvas top-glow stop (radial vignette behind the DAG / list). On
         dark it's a lift above --ground; on light a faint cool wash, not a dark
         smudge. */
      --canvas-glow: oklch(0.20 0.016 255);
    }

    /* ========================================================================
       LIGHT THEME — "daylight control room"
       NOT a naive invert. A warm-cool PAPER ground tinted toward brand hue 255
       (very low chroma — never pure #fff), neutrals on the same hue, text dark
       (never pure #000). On a light field the grid/hairlines must go DARKER to
       read, and the status lamps want HIGHER chroma + LOWER lightness (the airy
       high-L lamps that glow on dark go muddy/weak on white). The amber spine,
       edges, and glows are re-tuned for a light backdrop (dialed-back halos).
       The instrument identity is preserved — it reads as an intentionally-lit
       day console, not a bleached dark theme.
       ====================================================================== */
    :root[data-theme="light"] {
      color-scheme: light;

      /* ---- ground / panels (60) — paper, panels RAISED brighter than ground -- */
      --ground:    oklch(0.967 0.006 255);   /* cool-paper field (not #fff) */
      --panel:     oklch(0.988 0.005 255);   /* raised chrome panel */
      --panel-hi:  oklch(0.998 0.004 255);   /* highest inset (still tinted) */
      --grid:      oklch(0.86 0.010 255);    /* hairline canvas grid — DARKER */

      /* ---- lines + text (30) — darker on light to carry structure ---------- */
      --hair:      oklch(0.83 0.012 255);    /* hairline dividers */
      --hair-soft: oklch(0.88 0.009 255);
      --ink:       oklch(0.27 0.020 255);    /* primary text (never #000) */
      --ink-dim:   oklch(0.44 0.020 255);    /* secondary text */
      --ink-faint: oklch(0.56 0.018 255);    /* tertiary / units */
      --edge:      oklch(0.62 0.030 252);    /* idle DAG connector — readable */

      /* ---- status lamps (10) — higher chroma, lower L so they read on white -- */
      --done:      oklch(0.60 0.150 162);    /* jade green */
      --inflight:  oklch(0.66 0.165 64);     /* amber */
      --blocked:   oklch(0.58 0.030 250);    /* slate */
      --ready:     oklch(0.57 0.150 250);    /* blue */
      --escalated: oklch(0.55 0.200 300);    /* violet */
      --failed:    oklch(0.56 0.215 27);     /* red */
      --stale:     oklch(0.62 0.140 90);     /* ochre */
      --uncertain: oklch(0.60 0.170 352);    /* pink */

      /* ---- amber spine + the one alarm — deepened so it reads on paper ------ */
      --spine:     oklch(0.66 0.175 65);     /* critical-path amber */
      --alert:     oklch(0.64 0.180 58);     /* user-gate alarm amber */

      /* drop-shadows go to a soft tinted grey (a black void shadow looks dirty
         on paper); JS minimap hexes follow suit. */
      --shadow:    oklch(0.60 0.020 255 / 0.5);
      --mm-bg:     #eef0f5;
      --mm-mask:   rgba(120, 126, 140, 0.30);
      --mm-stroke: #b6bcc8;

      /* recessed surfaces on paper: a touch darker than --panel, low chroma, so
         chips / insets / the lamp ring read as gently sunk, not punched black. */
      --inset:     oklch(0.93 0.008 255 / 0.7);
      --chip-bg:   oklch(0.90 0.010 255 / 0.8);
      --lamp-ring: oklch(0.99 0.004 255 / 0.85);  /* light ring lifts the lamp off the tile */
      --canvas-glow: oklch(0.995 0.004 255);   /* a near-white cool wash, brighter than paper */
    }

    /* On light, the deep-void drop-shadows baked into the elevated surfaces read
       as a dirty near-black bloom. Soften the heaviest ones to a low-alpha cool
       grey so tiles / panels lift off the paper cleanly (kept subtle — paper
       shadows are gentle). Only the big lift shadows need this; the 1px hairline
       highlights are already imperceptible. */
    :root[data-theme="light"] .cc-node {
      box-shadow:
        0 1px 2px oklch(0.55 0.02 255 / 0.10),
        0 6px 16px oklch(0.55 0.02 255 / 0.12);
    }
    :root[data-theme="light"] .cc-node:hover {
      box-shadow:
        0 1px 2px oklch(0.55 0.02 255 / 0.10),
        0 10px 24px oklch(0.55 0.02 255 / 0.16);
    }
    :root[data-theme="light"] .legend,
    :root[data-theme="light"] .react-flow__controls,
    :root[data-theme="light"] .react-flow__minimap {
      box-shadow: 0 8px 24px oklch(0.55 0.02 255 / 0.16);
    }

    /* ---- theme transition — restyle smoothly, never animate layout ----------
       A short exponential ease on the big color-carrying SURFACES so the day/night
       flip feels like a console dimming, not a flash. Scoped deliberately to
       containers that have NO transition of their own — elements with existing
       transitions (.cc-node hover-lift, #detail width slide, .lvrow / .viewtoggle
       button / .dclose) are left to swap instantly so we never clobber their
       shorthand or animate layout (width / flex-basis / transform). The large
       grounds + panels carry the felt transition. Reduced-motion → instant swap
       (global reduce block below). */
    body, header.bar, #insights, #flow, #listview, #boardview, .bvlane,
    .legend, .lvstrip, .metric, .dpanel, .dhead, .dsect,
    .react-flow__minimap {
      transition-property: background-color, background, color, border-color, box-shadow, fill;
      transition-duration: 420ms;
      transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; }
    body {
      font-family: 'Archivo', ui-sans-serif, system-ui, sans-serif;
      background: var(--ground);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    #app { display: flex; flex-direction: column; height: 100%; }

    /* ============================ HEADER / instrument rail ==================== */
    header.bar {
      flex: 0 0 auto;
      display: flex; align-items: stretch; gap: 0;
      background:
        linear-gradient(180deg, var(--panel-hi), var(--panel));
      border-bottom: 1px solid var(--hair);
      box-shadow: 0 1px 0 oklch(0.12 0.01 255 / 0.6);
      padding: 0 18px 0 0;
      height: 54px;
    }
    /* left identity block — feels like a console nameplate */
    .ident {
      flex: 0 0 auto;
      display: flex; align-items: center; gap: 10px;
      padding: 0 18px 0 20px;
      border-right: 1px solid var(--hair-soft);
    }
    /* beacon — live "online" telemetry dot; sits on the wordmark cap line,
       nudged down a hair so it reads against the uppercase mark, not the subline */
    .ident .beacon {
      flex: 0 0 auto;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--done);
      box-shadow: 0 0 0 0 var(--done), 0 0 6px oklch(0.74 0.135 162 / 0.5);
      margin-top: -5px;
      animation: beacon 2.6s ease-out infinite;
    }
    @keyframes beacon {
      0%   { box-shadow: 0 0 0 0 oklch(0.74 0.135 162 / 0.5), 0 0 6px oklch(0.74 0.135 162 / 0.5); }
      70%  { box-shadow: 0 0 0 6px oklch(0.74 0.135 162 / 0), 0 0 6px oklch(0.74 0.135 162 / 0.5); }
      100% { box-shadow: 0 0 0 0 oklch(0.74 0.135 162 / 0), 0 0 6px oklch(0.74 0.135 162 / 0.5); }
    }
    .ident .mark {
      font-weight: 700; font-size: 13px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--ink);
      white-space: nowrap;
    }
    .ident .sub {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8.5px; letter-spacing: 0.26em; color: var(--ink-faint);
      text-transform: uppercase; white-space: nowrap; margin-top: 3px;
    }
    .ident .mark-wrap { display: flex; flex-direction: column; line-height: 1; }

    /* goal — the mission line */
    .goalwrap {
      flex: 1 1 auto; min-width: 0;
      display: flex; flex-direction: column; justify-content: center;
      gap: 3px; padding: 0 22px;
    }
    .goalwrap .label {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8.5px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--ink-faint);
    }
    .goalwrap .goal {
      font-weight: 600; font-size: 14.5px; letter-spacing: -0.005em;
      color: var(--ink);
      max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* readouts — right-aligned telemetry cluster */
    .readouts { display: flex; align-items: center; gap: 14px; }
    .readout {
      display: flex; flex-direction: column; align-items: flex-end; gap: 3px;
      min-width: 0;
    }
    .readout .rl {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--ink-faint);
    }
    .readout .rv {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-weight: 500; font-size: 13px; letter-spacing: 0.02em;
      color: var(--ink); font-variant-numeric: tabular-nums;
    }
    .readout .rv .unit { color: var(--ink-faint); font-size: 11px; margin-left: 1px; }
    .readout.branch .rv { color: var(--ink-dim); max-width: 30ch;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* slim progress meter sitting under the count */
    .meter {
      width: 96px; height: 3px; border-radius: 2px;
      background: var(--hair); overflow: hidden;
    }
    .meter > i {
      display: block; height: 100%; border-radius: 2px;
      background: var(--done);
      box-shadow: 0 0 8px oklch(0.74 0.135 162 / 0.6);
      transition: width 600ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .vrule { width: 1px; align-self: stretch; margin: 12px 0;
      background: var(--hair-soft); }

    /* ---- view toggle — a Mission-Control segmented control --------------- */
    /* Two segments (⬡ GRAPH / ☰ LIST); the active one is a raised inset with a
       cool-blue lamp tint. Keyboard-reachable (real <button>s), obvious. */
    .viewtoggle {
      display: inline-flex; align-items: stretch; gap: 0;
      padding: 3px; border-radius: var(--r-md);
      background: var(--inset);
      border: 1px solid var(--hair);
    }
    .viewtoggle button {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 11px; border-radius: var(--r-sm);
      background: transparent; border: 1px solid transparent;
      color: var(--ink-faint);
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 9.5px; font-weight: 500; letter-spacing: 0.14em;
      text-transform: uppercase; cursor: pointer;
      transition: color 200ms cubic-bezier(0.16, 1, 0.3, 1),
                  background 200ms cubic-bezier(0.16, 1, 0.3, 1),
                  border-color 200ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    .viewtoggle button .tg { font-size: 12px; line-height: 1; }
    .viewtoggle button:hover { color: var(--ink-dim); }
    .viewtoggle button.on {
      color: var(--ready);
      background: linear-gradient(180deg, var(--panel-hi), var(--panel));
      border-color: oklch(0.70 0.115 244 / 0.4);
      box-shadow: 0 0 0 1px oklch(0.70 0.115 244 / 0.18),
                  0 1px 3px oklch(0.10 0.01 255 / 0.5);
    }
    .viewtoggle button:focus-visible {
      outline: 2px solid oklch(0.70 0.115 244 / 0.7); outline-offset: 1px;
    }

    /* ---- day/night toggle — a single icon button (☀ day / ☾ night) ---------
       Sits beside the GRAPH/LIST control. A real <button> (keyboard-reachable,
       aria-pressed reflects light-on). The glyph swaps with the active theme:
       it shows the destination — ☀ when dark (click → day), ☾ when light
       (click → night). Same instrument chrome as the segmented control. */
    .themetoggle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; padding: 0;
      border-radius: var(--r-md);
      background: var(--inset);
      border: 1px solid var(--hair);
      color: var(--ink-faint); cursor: pointer; font-size: 14px; line-height: 1;
      transition: color 200ms cubic-bezier(0.16, 1, 0.3, 1),
                  background 200ms cubic-bezier(0.16, 1, 0.3, 1),
                  border-color 200ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    .themetoggle:hover { color: var(--ink); border-color: var(--hair); }
    .themetoggle:focus-visible {
      outline: 2px solid oklch(0.70 0.115 244 / 0.7); outline-offset: 1px;
    }
    .themetoggle .glyph { display: inline-flex; line-height: 1; }

    /* user-gate alarm — the ONE allowed alarm element, prominent not harsh */
    .alarm {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 13px; border-radius: var(--r-md);
      background: oklch(0.80 0.150 66 / 0.12);
      border: 1px solid oklch(0.80 0.150 66 / 0.45);
      color: var(--alert);
      font-weight: 600; font-size: 12.5px; letter-spacing: 0.01em;
      animation: alarmpulse 2.2s ease-in-out infinite;
    }
    .alarm .dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--alert);
      box-shadow: 0 0 7px var(--alert);
    }
    .alarm .n {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-variant-numeric: tabular-nums; font-weight: 500;
    }
    @keyframes alarmpulse {
      0%, 100% { box-shadow: 0 0 0 0 oklch(0.80 0.150 66 / 0); }
      50%      { box-shadow: 0 0 14px 0 oklch(0.80 0.150 66 / 0.28); }
    }

    /* ============================ STAGE: insights | canvas | detail ========= */
    /* The body is a three-column instrument: left analytics rail, center DAG,
       right detail rail (slides in on selection). */
    #stage {
      flex: 1 1 auto; min-height: 0;
      display: flex; align-items: stretch;
      position: relative;
    }

    /* ---------------------------- INSIGHTS RAIL (left) --------------------- */
    /* Not a card grid — a stacked telemetry readout column, the instrument's
       analysis panel. Each row is a derived metric, label over value. */
    #insights {
      flex: 0 0 246px; width: 246px;
      display: flex; flex-direction: column;
      background: linear-gradient(180deg, var(--panel), var(--ground) 92%);
      border-right: 1px solid var(--hair);
      overflow-y: auto; overflow-x: hidden;
    }
    #insights .ihead {
      padding: 11px 16px 9px;
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8.5px; letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--ink-faint);
      border-bottom: 1px solid var(--hair-soft);
    }
    .metric {
      padding: 11px 16px 12px;
      border-bottom: 1px solid var(--hair-soft);
      display: flex; flex-direction: column; gap: 5px;
    }
    .metric .ml {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--ink-faint);
      display: flex; align-items: center; gap: 6px;
    }
    .metric .ml .ic { font-size: 10px; line-height: 1; }
    .metric .mv {
      font-size: 13.5px; font-weight: 600; color: var(--ink);
      line-height: 1.34; word-break: break-word;
    }
    .metric .mv.mono {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 12px; font-weight: 500; letter-spacing: 0.01em;
      font-variant-numeric: tabular-nums;
    }
    .metric .msub {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 9.5px; color: var(--ink-dim); letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
    }
    .metric .mv.dim { color: var(--ink-dim); font-weight: 500; font-size: 12px; }
    /* the chain readout (critical path) — clickable id pills */
    .chain { display: flex; flex-wrap: wrap; align-items: center; gap: 3px 2px; }
    .chain .seg {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 10.5px; font-weight: 500; letter-spacing: 0.02em;
      color: var(--spine); padding: 1px 5px; border-radius: var(--r-sm);
      background: oklch(0.80 0.160 70 / 0.10);
      border: 1px solid oklch(0.80 0.160 70 / 0.22);
      cursor: pointer; transition: background 160ms ease;
    }
    .chain .seg:hover { background: oklch(0.80 0.160 70 / 0.20); }
    .chain .arrow { color: var(--ink-faint); font-size: 10px; }
    .metric .pill-id {
      font-family: 'Martian Mono', ui-monospace, monospace;
      cursor: pointer; color: var(--ink);
      border-bottom: 1px dotted var(--ink-faint);
    }
    .metric .pill-id:hover { color: var(--spine); border-bottom-color: var(--spine); }
    .metric.flag .ml { color: var(--alert); }
    .metric.flag .mv { color: var(--alert); }
    .metric.warnwip .mv { color: var(--stale); }

    /* ---------------------------- CANVAS ---------------------------------- */
    #flow { flex: 1 1 auto; min-width: 0; min-height: 0; position: relative;
      background:
        radial-gradient(120% 80% at 50% -8%, var(--canvas-glow), var(--ground) 60%); }

    .react-flow__attribution { display: none; }

    /* dim non-lineage elements when a node is selected. lin-child (group membership —
       children of a selected owner) is kept lit alongside the dep-chain classes. */
    #flow.has-selection .cc-node:not(.lin-self):not(.lin-anc):not(.lin-desc):not(.lin-child) {
      opacity: 0.24; filter: saturate(0.5);
    }
    #flow.has-selection .react-flow__edge:not(.edge-lin) { opacity: 0.12; }

    /* ============================ NODES — instrument tiles =================== */
    .cc-node {
      --lamp: var(--blocked);
      position: relative;
      min-width: 168px; max-width: 232px;
      padding: 9px 12px 10px;
      border-radius: var(--r-md);
      background:
        linear-gradient(180deg, var(--panel-hi), var(--panel));
      border: 1px solid var(--hair);
      color: var(--ink);
      box-shadow:
        0 1px 2px oklch(0.10 0.01 255 / 0.5),
        0 8px 20px oklch(0.10 0.01 255 / 0.35);
      transition: border-color 240ms ease, box-shadow 240ms ease,
                  transform 240ms ease, opacity 280ms ease, filter 280ms ease;
    }
    .cc-node:hover { transform: translateY(-1px);
      border-color: var(--hair); box-shadow:
        0 1px 2px oklch(0.10 0.01 255 / 0.5),
        0 12px 28px oklch(0.08 0.01 255 / 0.5); }

    /* selected node — a clear cyan focus ring (read-only selection, not edit) */
    .cc-node.lin-self {
      border-color: oklch(0.70 0.115 244 / 0.75);
      box-shadow:
        0 0 0 2px oklch(0.70 0.115 244 / 0.45),
        0 1px 2px oklch(0.10 0.01 255 / 0.5),
        0 12px 30px oklch(0.10 0.01 255 / 0.5);
    }
    /* ancestry / descendants keep full presence; everyone else dims (see #flow) */
    .cc-node.lin-anc { border-color: oklch(0.50 0.04 244 / 0.6); }
    .cc-node.lin-desc { border-color: oklch(0.50 0.04 300 / 0.5); }
    /* group membership — a child of the SELECTED OWNER. The owner's cool-blue accent hue
       (244), carried as a soft ring so it reads as "this belongs to the group you picked",
       coordinated with .cc-node.owner / .child but clearly a selection echo (a ring, not
       just a border tint). Distinct from the cyan self-ring and the anc/desc dep tints. */
    .cc-node.lin-child {
      border-color: oklch(0.70 0.115 244 / 0.55);
      box-shadow:
        0 0 0 2px oklch(0.70 0.115 244 / 0.30),
        0 1px 2px oklch(0.10 0.01 255 / 0.5),
        0 8px 20px oklch(0.30 0.06 244 / 0.18);
    }

    /* the lamp row: a glowing status lamp + uppercase status readout */
    .cc-node .lamprow {
      display: flex; align-items: center; gap: 7px; margin-bottom: 7px;
    }
    .cc-node .lamp {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--lamp);
      box-shadow: 0 0 0 1px var(--lamp-ring),
                  0 0 7px var(--lamp), 0 0 2px var(--lamp);
      flex: 0 0 auto;
    }
    .cc-node .stat {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8.5px; font-weight: 500; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--lamp);
    }
    .cc-node .tid {
      margin-left: auto;
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 10px; font-weight: 500; letter-spacing: 0.04em;
      color: var(--ink-dim); font-variant-numeric: tabular-nums;
    }
    .cc-node .title {
      font-size: 12.5px; line-height: 1.32; font-weight: 500;
      color: var(--ink); word-break: break-word;
    }
    .cc-node .title.empty { color: var(--ink-faint); font-style: italic; }

    /* meta row — structural readouts: downstream impact + convergence fan-in.
       This is what makes the graph reveal structure at a glance. */
    .cc-node .meta {
      display: flex; align-items: center; gap: 7px; margin-top: 8px;
      flex-wrap: wrap;
    }
    .cc-node .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 6px; border-radius: var(--r-sm);
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--chip-bg);
      color: var(--ink-dim); border: 1px solid var(--hair-soft);
    }
    .cc-node .chip .cn {
      color: var(--ink); font-variant-numeric: tabular-nums; font-size: 9px;
    }
    /* impact chip scales presence with leverage */
    .cc-node .chip.impact.hot {
      background: oklch(0.80 0.160 70 / 0.12);
      border-color: oklch(0.80 0.160 70 / 0.35);
      color: var(--spine);
    }
    .cc-node .chip.impact.hot .cn { color: var(--spine); }
    /* convergence chip — a distinct join glyph treatment */
    .cc-node .chip.conv {
      background: oklch(0.70 0.115 244 / 0.12);
      border-color: oklch(0.70 0.115 244 / 0.4);
      color: var(--ready);
    }
    .cc-node .chip.conv .cn { color: var(--ready); }
    /* live running-duration chip on in_flight tiles — amber, telemetry feel.
       This is a CLOCK readout: a clock glyph + a tabular Martian-Mono time that
       ticks every second (see the 1s timer in CcNode). */
    .cc-node .chip.dur {
      background: oklch(0.79 0.150 74 / 0.12);
      border-color: oklch(0.79 0.150 74 / 0.35);
      color: var(--inflight);
    }
    .cc-node .chip.dur .cglyph {
      font-size: 9px; line-height: 1; opacity: 0.9;
    }
    .cc-node .chip.dur .cn {
      color: var(--inflight); font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    /* ============================ NESTING — owner / child (D3) ==============
       A nested DAG renders flat by default; an OWNER (container node with one
       depth-1 layer of children) is distinguished by a cool-blue accent + a
       fold/unfold caret + a rollup-progress pill, and can be COLLAPSED to hide
       its children (their cross-group edges reroute to the owner). A CHILD tile
       (has a parent) gets a subtle inset tick so it reads as "belongs to a group"
       at a glance. With no nesting present this whole block is inert. */

    /* owner tile — a cool-blue container accent (distinct from the amber crit
       spine + the status lamp). Reads as "this holds a sub-DAG". */
    .cc-node.owner {
      border-color: oklch(0.70 0.115 244 / 0.42);
    }
    /* a collapsed owner is emphasized a touch more — it's standing in for a whole
       folded sub-graph, so it should carry visible weight. */
    .cc-node.owner.collapsed {
      border-color: oklch(0.70 0.115 244 / 0.62);
      box-shadow:
        0 0 0 1px oklch(0.70 0.115 244 / 0.22),
        0 1px 2px oklch(0.10 0.01 255 / 0.5),
        0 10px 26px oklch(0.30 0.06 244 / 0.16);
    }
    /* child tile — a slim cool inset bar on the left edge marks group membership.
       Subtle (a tick, not a banner) so it doesn't fight the status lamp. */
    .cc-node.child::after {
      content: ''; position: absolute; left: 0; top: 9px; bottom: 9px; width: 2px;
      border-radius: 0 2px 2px 0;
      background: oklch(0.70 0.115 244 / 0.5);
    }

    /* the fold/unfold caret in the lamprow — a clickable cool-blue glyph. It sits
       before the status lamp so the "expandable group" affordance reads first. */
    .cc-node .ocaret {
      flex: 0 0 auto; cursor: pointer; user-select: none;
      display: inline-flex; align-items: center; justify-content: center;
      width: 15px; height: 15px; margin-right: 1px; border-radius: var(--r-sm);
      color: var(--ready); font-size: 11px; line-height: 1;
      border: 1px solid transparent;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }
    .cc-node .ocaret:hover {
      background: oklch(0.70 0.115 244 / 0.14);
      border-color: oklch(0.70 0.115 244 / 0.35);
    }
    .cc-node .ocaret:focus-visible {
      outline: 2px solid oklch(0.70 0.115 244 / 0.7); outline-offset: 1px;
    }

    /* the owner rollup pill — done/total subtasks. Cool-blue while in progress,
       jade once every child is done. */
    .cc-node .chip.rollup {
      background: oklch(0.70 0.115 244 / 0.12);
      border-color: oklch(0.70 0.115 244 / 0.4);
      color: var(--ready);
    }
    .cc-node .chip.rollup .cn { color: var(--ready); font-variant-numeric: tabular-nums; }
    .cc-node .chip.rollup.done {
      background: oklch(0.74 0.135 162 / 0.12);
      border-color: oklch(0.74 0.135 162 / 0.4);
      color: var(--done);
    }
    .cc-node .chip.rollup.done .cn { color: var(--done); }

    /* ---------- in-flight BUSY lamp: an orbiting arc ring -------------------
       The amber lamp gets a thin amber arc that rotates around it — a telemetry
       "actively working / spinning" indicator (NOT a loading-spinner toy). The
       lamp core still breathes gently underneath. Reduced-motion strips the
       rotation and leaves a steady glow (handled by the global reduce block). */
    .cc-node.s-in_flight .lamp { animation: lamppulse 1.7s ease-in-out infinite; }
    @keyframes lamppulse {
      0%, 100% { box-shadow: 0 0 0 1px var(--lamp-ring),
                             0 0 6px var(--lamp), 0 0 2px var(--lamp); }
      50%      { box-shadow: 0 0 0 1px var(--lamp-ring),
                             0 0 13px var(--lamp), 0 0 5px var(--lamp); }
    }
    /* the orbiting arc: a conic-gradient ring masked to a hairline annulus, so
       only a ~90° amber arc is visible, sweeping around the lamp once/1.1s. */
    .cc-node.s-in_flight .lamp::after {
      content: ''; position: absolute;
      left: 50%; top: 50%; width: 17px; height: 17px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        var(--inflight) 0deg,
        oklch(0.79 0.150 74 / 0.55) 28deg,
        oklch(0.79 0.150 74 / 0) 92deg,
        oklch(0.79 0.150 74 / 0) 360deg);
      /* annulus mask — keep only a 1.5px-wide ring, hollow center */
      -webkit-mask: radial-gradient(closest-side, transparent 64%, #000 66%);
              mask: radial-gradient(closest-side, transparent 64%, #000 66%);
      animation: lamporbit 1.1s linear infinite;
      pointer-events: none;
    }
    .cc-node .lamp { position: relative; }
    @keyframes lamporbit {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* critical path: amber top accent line (not a side stripe) + amber border */
    .cc-node.crit {
      border-color: oklch(0.80 0.160 70 / 0.55);
      box-shadow:
        0 0 0 1px oklch(0.80 0.160 70 / 0.30),
        0 1px 2px oklch(0.10 0.01 255 / 0.5),
        0 10px 26px oklch(0.40 0.10 70 / 0.14);
    }
    .cc-node.crit::before {
      content: ''; position: absolute; left: 11px; right: 11px; top: 0; height: 2px;
      border-radius: 0 0 2px 2px;
      background: var(--spine);
      box-shadow: 0 0 8px oklch(0.80 0.160 70 / 0.65);
    }

    /* bottleneck: a heavier amber halo + corner glyph — the single "this is
       stalling the most work" emphasis. */
    .cc-node.bottleneck {
      border-color: oklch(0.80 0.150 66 / 0.7);
      box-shadow:
        0 0 0 2px oklch(0.80 0.150 66 / 0.4),
        0 1px 2px oklch(0.10 0.01 255 / 0.5),
        0 0 30px oklch(0.80 0.150 66 / 0.22);
    }
    .cc-node .bneck {
      position: absolute; top: -9px; right: -9px;
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 7px; border-radius: 9px;
      background: var(--alert); color: oklch(0.16 0.01 255);
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
      box-shadow: 0 2px 10px oklch(0.80 0.150 66 / 0.45);
    }

    /* user-gate: the alarm node — amber ring, prominent. This is the "PAUSED,
       needs you" state: a HELD, slow-pulsing alert ring (distinct from the busy
       orbit of in_flight). It reads as attention-demanding, not spinning. */
    .cc-node.usergate {
      --lamp: var(--alert);
      border-color: oklch(0.80 0.150 66 / 0.6);
      box-shadow:
        0 0 0 1px oklch(0.80 0.150 66 / 0.5),
        0 1px 2px oklch(0.10 0.01 255 / 0.5),
        0 0 22px oklch(0.80 0.150 66 / 0.18);
      animation: gatehalo 2.2s ease-in-out infinite;
    }
    @keyframes gatehalo {
      0%, 100% { box-shadow: 0 0 0 1px oklch(0.80 0.150 66 / 0.5),
                             0 1px 2px oklch(0.10 0.01 255 / 0.5),
                             0 0 16px oklch(0.80 0.150 66 / 0.12); }
      50%      { box-shadow: 0 0 0 1px oklch(0.80 0.150 66 / 0.7),
                             0 1px 2px oklch(0.10 0.01 255 / 0.5),
                             0 0 28px oklch(0.80 0.150 66 / 0.30); }
    }
    /* COMBINED state (in_flight AND awaiting user): the "needs you" signal must
       dominate the busy spinner. Force the lamp + status text to alert-amber and
       calm the orbit (slower, dimmer) so the held alert ring wins the eye. The
       clock keeps ticking (truthful: still running) but is no longer the loudest
       thing. The gate ring on the tile is the dominant signal. */
    .cc-node.usergate.s-in_flight .lamp { animation: gatelamp 2.0s ease-in-out infinite; }
    .cc-node.usergate.s-in_flight .lamp::after {
      animation-duration: 2.4s; opacity: 0.5;
    }
    @keyframes gatelamp {
      0%, 100% { box-shadow: 0 0 0 1px var(--lamp-ring),
                             0 0 7px var(--alert), 0 0 2px var(--alert); }
      50%      { box-shadow: 0 0 0 1px var(--lamp-ring),
                             0 0 11px var(--alert), 0 0 4px var(--alert); }
    }

    /* the "AWAITING YOU" flag — a held, alert chip with a pause glyph. On a
       combined node this sits ABOVE/dominant over the running clock chip. */
    .cc-node .gateflag {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 8px;
      padding: 4px 9px; border-radius: var(--r-sm);
      background: oklch(0.80 0.150 66 / 0.16);
      border: 1px solid oklch(0.80 0.150 66 / 0.5);
      color: var(--alert);
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8.5px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
      animation: gateflagpulse 2.2s ease-in-out infinite;
    }
    @keyframes gateflagpulse {
      0%, 100% { background: oklch(0.80 0.150 66 / 0.12);
                 border-color: oklch(0.80 0.150 66 / 0.4); }
      50%      { background: oklch(0.80 0.150 66 / 0.20);
                 border-color: oklch(0.80 0.150 66 / 0.62); }
    }
    /* the pause glyph (two bars) — a held, not-spinning indicator */
    .cc-node .gateflag .gpause {
      display: inline-flex; align-items: center; gap: 2px;
    }
    .cc-node .gateflag .gpause i {
      width: 2px; height: 8px; border-radius: 1px;
      background: var(--alert); box-shadow: 0 0 5px oklch(0.80 0.150 66 / 0.6);
    }

    /* staggered entrance — set by JS via --i */
    .cc-node.enter {
      animation: nodein 520ms cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: calc(var(--i, 0) * 45ms);
    }
    @keyframes nodein {
      from { opacity: 0; transform: translateY(8px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* xyflow handles — make them disappear into the tiles */
    .cc-node .react-flow__handle {
      width: 5px; height: 5px; min-width: 5px; min-height: 5px;
      background: var(--edge); border: none; opacity: 0.6;
    }

    /* ============================ LEGEND — instrument panel ================== */
    .legend {
      position: absolute; left: 14px; bottom: 14px; z-index: 6;
      display: flex; flex-direction: column;
      background: linear-gradient(180deg, var(--panel-hi), var(--panel) 70%);
      border: 1px solid var(--hair);
      border-radius: var(--r-lg);
      box-shadow: 0 10px 30px oklch(0.08 0.01 255 / 0.5);
      overflow: hidden;
      backdrop-filter: blur(2px);
    }
    .legend .lhead {
      padding: 8px 13px 7px;
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--ink-faint);
      border-bottom: 1px solid var(--hair-soft);
      display: flex; align-items: center; justify-content: space-between; gap: 18px;
    }
    .legend .lhead .total {
      color: var(--ink-dim); font-variant-numeric: tabular-nums;
    }
    .legend .grid {
      display: grid; grid-template-columns: auto auto; gap: 1px 18px;
      padding: 9px 13px 11px;
    }
    .legend .row {
      display: flex; align-items: center; gap: 8px;
      padding: 2px 0; opacity: 0.45;
      transition: opacity 240ms ease;
    }
    .legend .row.live { opacity: 1; }
    .legend .lamp {
      width: 8px; height: 8px; border-radius: 50%;
      box-shadow: 0 0 6px currentColor;
      flex: 0 0 auto;
    }
    .legend .nm {
      font-size: 11px; color: var(--ink-dim); letter-spacing: 0.01em;
      flex: 1 1 auto;
    }
    .legend .row.live .nm { color: var(--ink); }
    .legend .ct {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 10px; font-weight: 500; color: var(--ink-dim);
      font-variant-numeric: tabular-nums; min-width: 1.5ch; text-align: right;
    }
    .legend .row.live .ct { color: var(--ink); }
    .legend .spine-key {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 13px; border-top: 1px solid var(--hair-soft);
    }
    .legend .spine-key .bar {
      width: 18px; height: 2px; border-radius: 2px; background: var(--spine);
      box-shadow: 0 0 7px oklch(0.80 0.160 70 / 0.6);
    }
    .legend .spine-key .nm { font-size: 10.5px; color: var(--ink-dim); }

    /* ============================ DETAIL RAIL (right, slides in) ============= */
    #detail {
      flex: 0 0 0; width: 0;
      overflow: hidden;
      background: linear-gradient(180deg, var(--panel), var(--ground) 96%);
      border-left: 1px solid var(--hair);
      transition: flex-basis 300ms cubic-bezier(0.16, 1, 0.3, 1),
                  width 300ms cubic-bezier(0.16, 1, 0.3, 1);
      display: flex; flex-direction: column;
    }
    #detail.open { flex: 0 0 360px; width: 360px; }
    .dpanel { width: 360px; height: 100%; display: flex; flex-direction: column;
      overflow-y: auto; overflow-x: hidden; }

    .dhead {
      position: sticky; top: 0; z-index: 2;
      padding: 13px 16px 12px;
      background: linear-gradient(180deg, var(--panel-hi), var(--panel));
      border-bottom: 1px solid var(--hair);
      display: flex; align-items: flex-start; gap: 10px;
    }
    .dhead .lamp {
      width: 11px; height: 11px; border-radius: 50%; margin-top: 3px;
      box-shadow: 0 0 0 1px var(--lamp-ring), 0 0 8px currentColor, 0 0 2px currentColor;
      flex: 0 0 auto;
    }
    .dhead .htext { flex: 1 1 auto; min-width: 0; }
    .dhead .htitle {
      font-size: 14.5px; font-weight: 600; line-height: 1.3; color: var(--ink);
      word-break: break-word;
    }
    .dhead .htitle.empty { color: var(--ink-faint); font-style: italic; }
    .dhead .hmeta {
      margin-top: 5px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 9px; letter-spacing: 0.08em; color: var(--ink-faint);
      text-transform: uppercase;
    }
    .dhead .hmeta .hid { color: var(--ink-dim); font-variant-numeric: tabular-nums; }
    .dhead .hmeta .hstat { color: currentColor; }
    .dclose {
      flex: 0 0 auto; cursor: pointer; user-select: none;
      width: 24px; height: 24px; border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-faint); border: 1px solid transparent;
      font-size: 16px; line-height: 1;
      transition: color 160ms ease, border-color 160ms ease, background 160ms ease;
    }
    .dclose:hover { color: var(--ink); border-color: var(--hair); background: var(--panel-hi); }

    .dsect { padding: 13px 16px; border-bottom: 1px solid var(--hair-soft); }
    .dsect .sl {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--ink-faint); margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .dsect.why .sl { color: var(--spine); }
    .kv { display: flex; flex-direction: column; gap: 7px; }
    .kv .row { display: flex; gap: 10px; align-items: baseline; }
    .kv .k {
      flex: 0 0 84px;
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--ink-faint);
    }
    .kv .v {
      flex: 1 1 auto; min-width: 0;
      font-size: 12px; color: var(--ink); word-break: break-word; line-height: 1.4;
    }
    .kv .v.mono {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 11px; color: var(--ink-dim); font-variant-numeric: tabular-nums;
    }

    /* "why this exists" justification — emphasis by a subtle inset amber wash
       (low-chroma OKLCH tint + hairline frame), NOT a side-stripe 边条 (banned
       AI-slop tell per .impeccable.md). The ◆ section label carries the accent. */
    .why-text {
      font-size: 12.5px; line-height: 1.5; color: var(--ink);
      background: oklch(0.80 0.160 70 / 0.06);
      border: 1px solid oklch(0.80 0.160 70 / 0.16);
      border-radius: var(--r-sm);
      padding: 9px 11px;
    }

    /* dependency / dependent lists — by title with a status lamp */
    .deplist { display: flex; flex-direction: column; gap: 2px; }
    .depitem {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: var(--r-sm);
      cursor: pointer; transition: background 160ms ease;
    }
    .depitem:hover { background: var(--panel-hi); }
    .depitem .lamp {
      width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto;
      box-shadow: 0 0 5px currentColor;
    }
    .depitem .dt {
      flex: 1 1 auto; min-width: 0; font-size: 11.5px; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .depitem .dt .did {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 9.5px; color: var(--ink-faint); margin-right: 6px;
    }
    .depitem .ds {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--ink-dim); flex: 0 0 auto;
    }
    .deplist .empty {
      font-size: 11px; color: var(--ink-faint); font-style: italic; padding: 2px 8px;
    }
    .deplist .transitive-head {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 7.5px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--ink-faint); margin: 8px 0 2px 8px;
    }

    .activity { display: flex; flex-direction: column; gap: 6px; }
    .activity .le {
      font-size: 11.5px; line-height: 1.45; color: var(--ink-dim);
      padding-left: 12px; position: relative;
    }
    .activity .le::before {
      content: ''; position: absolute; left: 2px; top: 7px;
      width: 4px; height: 4px; border-radius: 50%; background: var(--ink-faint);
    }
    .artifact-box {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 10.5px; line-height: 1.5; color: var(--ink-dim);
      background: var(--inset);
      border: 1px solid var(--hair-soft); border-radius: var(--r-sm);
      padding: 8px 10px; word-break: break-word;
    }

    .badge-row { display: flex; gap: 7px; flex-wrap: wrap; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 8px; border-radius: var(--r-sm);
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8.5px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
      background: var(--chip-bg); color: var(--ink-dim);
      border: 1px solid var(--hair-soft);
    }
    .badge.crit { color: var(--spine); border-color: oklch(0.80 0.160 70 / 0.4);
      background: oklch(0.80 0.160 70 / 0.10); }
    .badge.verified { color: var(--done); border-color: oklch(0.74 0.135 162 / 0.4);
      background: oklch(0.74 0.135 162 / 0.10); }
    .badge.bneck { color: var(--alert); border-color: oklch(0.80 0.150 66 / 0.5);
      background: oklch(0.80 0.150 66 / 0.12); }

    /* ============================ DECISION CARD ============================= */
    /* When an awaiting-user node carries a prepared decision_package, the amber
       "awaiting you" flag is UPGRADED in the detail rail to a rich decision card:
       ask-type badge + question + self-explaining context + what-i-need /
       why-it-matters + options + a client-only "copy command" button. Emphasis
       by an inset amber wash + hairline frame (same idiom as .why-text), NOT a
       side-stripe. Everything is rendered from agent-shaped board fields; zero
       network, the copy button is navigator.clipboard only. */
    .dsect.decision .sl { color: var(--alert); }
    .deccard {
      background: oklch(0.80 0.150 66 / 0.05);
      border: 1px solid oklch(0.80 0.150 66 / 0.18);
      border-radius: var(--r-md);
      padding: 12px 13px 13px;
      display: flex; flex-direction: column; gap: 11px;
    }
    /* ask-type badge — three visually distinguishable variants */
    .deccard .askrow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .askbadge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: var(--r-sm);
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8.5px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
      border: 1px solid var(--hair-soft); background: var(--chip-bg); color: var(--ink-dim);
    }
    .askbadge .glyph { font-size: 10px; line-height: 1; }
    /* decision = amber call-to-act · advice = cool blue · solution = jade */
    .askbadge.decision { color: var(--alert); border-color: oklch(0.80 0.150 66 / 0.45);
      background: oklch(0.80 0.150 66 / 0.12); }
    .askbadge.advice { color: var(--ready); border-color: oklch(0.70 0.115 244 / 0.45);
      background: oklch(0.70 0.115 244 / 0.12); }
    .askbadge.solution { color: var(--done); border-color: oklch(0.74 0.135 162 / 0.45);
      background: oklch(0.74 0.135 162 / 0.12); }
    /* stale freshness hint — ochre, low-key */
    .deccard .stalehint {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10.5px; line-height: 1.4; color: var(--stale);
      background: oklch(0.72 0.115 96 / 0.08);
      border: 1px solid oklch(0.72 0.115 96 / 0.20);
      border-radius: var(--r-sm); padding: 5px 8px;
    }
    .deccard .stalehint .glyph { font-size: 11px; line-height: 1; flex: 0 0 auto; }
    /* the question — the headline */
    .deccard .question {
      font-size: 13.5px; font-weight: 600; line-height: 1.4; color: var(--ink);
      word-break: break-word;
    }
    /* self-explaining context — preformatted, whitespace-preserving (markdown is
       NOT rendered: keeping it as readable plain text needs no vendored parser
       and stays inside the zero-network red line; React escapes it for us). */
    .deccard .context-md {
      font-size: 11.5px; line-height: 1.55; color: var(--ink-dim);
      white-space: pre-wrap; word-break: break-word;
      background: var(--inset);
      border: 1px solid var(--hair-soft); border-radius: var(--r-sm);
      padding: 9px 11px; max-height: 280px; overflow-y: auto;
    }
    /* what-i-need / why-it-matters — labelled blocks */
    .deccard .decfield { display: flex; flex-direction: column; gap: 4px; }
    .deccard .decfield .dfk {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink-faint);
    }
    .deccard .decfield .dfv {
      font-size: 12px; line-height: 1.45; color: var(--ink); word-break: break-word;
    }
    /* options list — label + rationale + tradeoffs, one card each */
    .deccard .options { display: flex; flex-direction: column; gap: 7px; }
    .deccard .opt {
      border: 1px solid var(--hair-soft); border-radius: var(--r-sm);
      background: var(--panel-hi); padding: 8px 10px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .deccard .opt .ohead { display: flex; align-items: baseline; gap: 7px; }
    .deccard .opt .oid {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 9px; letter-spacing: 0.06em; color: var(--ink-faint); flex: 0 0 auto;
    }
    .deccard .opt .olabel { font-size: 12px; font-weight: 600; color: var(--ink); line-height: 1.35; }
    .deccard .opt .orat { font-size: 11px; line-height: 1.45; color: var(--ink-dim); }
    .deccard .opt .otrade {
      font-size: 10.5px; line-height: 1.45; color: var(--ink-faint);
      display: flex; gap: 5px;
    }
    .deccard .opt .otrade .otk {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-faint); flex: 0 0 auto; margin-top: 1px;
    }
    /* the copy-command button — client-only clipboard, NO fetch/POST */
    .deccard .copyrow { display: flex; flex-direction: column; gap: 5px; margin-top: 1px; }
    .copycmd {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      width: 100%; cursor: pointer; user-select: none;
      padding: 9px 12px; border-radius: var(--r-sm);
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 10.5px; letter-spacing: 0.04em; font-weight: 500;
      color: var(--alert);
      background: oklch(0.80 0.150 66 / 0.10);
      border: 1px solid oklch(0.80 0.150 66 / 0.40);
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }
    .copycmd:hover { background: oklch(0.80 0.150 66 / 0.18); border-color: oklch(0.80 0.150 66 / 0.55); }
    .copycmd.copied { color: var(--done); border-color: oklch(0.74 0.135 162 / 0.45);
      background: oklch(0.74 0.135 162 / 0.12); }
    .copycmd.failed { color: var(--failed); border-color: oklch(0.63 0.190 26 / 0.45);
      background: oklch(0.63 0.190 26 / 0.10); }
    .copycmd .glyph { font-size: 11px; line-height: 1; }
    .deccard .cmdtext {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 10px; line-height: 1.4; color: var(--ink-faint);
      word-break: break-all; text-align: center;
    }

    /* ============================ DISCUSS HISTORY =========================== */
    /* A node's past-discussion record in the detail rail. Same amber-wash +
       hairline idiom as .deccard / .why-text (NO side-stripe). A collapsible
       summary line (count + latest TL;DR + time) expands to per-round entries;
       each entry reuses the .askbadge from the decision card. */
    .dsect.dischist .sl { color: var(--ink-dim); }
    .dischist-box {
      background: oklch(0.80 0.150 66 / 0.05);
      border: 1px solid oklch(0.80 0.150 66 / 0.18);
      border-radius: var(--r-md);
      overflow: hidden;
    }
    .dh-summary {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 10px 11px; cursor: pointer; user-select: none;
      transition: background 160ms ease;
    }
    .dh-summary:hover { background: oklch(0.80 0.150 66 / 0.06); }
    .dh-summary:focus-visible {
      outline: 2px solid oklch(0.80 0.150 66 / 0.55); outline-offset: -2px;
    }
    .dh-caret {
      flex: 0 0 auto; color: var(--alert); font-size: 11px; line-height: 1.5;
      margin-top: 1px;
    }
    .dh-summary-text {
      flex: 1 1 auto; min-width: 0;
      display: flex; flex-direction: column; gap: 3px;
    }
    .dh-summary-text .dh-count {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 10px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--alert);
    }
    .dh-summary-text .dh-tldr {
      font-size: 12px; line-height: 1.45; color: var(--ink); word-break: break-word;
    }
    .dh-summary-text .dh-when {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 9px; letter-spacing: 0.04em; color: var(--ink-faint);
      font-variant-numeric: tabular-nums;
    }
    /* expanded per-round entries */
    .dh-entries {
      display: flex; flex-direction: column;
      border-top: 1px solid oklch(0.80 0.150 66 / 0.16);
    }
    .dh-entry {
      display: flex; flex-direction: column; gap: 5px;
      padding: 9px 11px;
      border-top: 1px solid var(--hair-soft);
    }
    .dh-entry:first-child { border-top: none; }
    .dh-ehead {
      display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    }
    .dh-ehead .dh-round {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 9.5px; font-weight: 500; letter-spacing: 0.04em;
      color: var(--ink-dim); font-variant-numeric: tabular-nums;
    }
    .dh-ehead .dh-when {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 9px; letter-spacing: 0.04em; color: var(--ink-faint);
      font-variant-numeric: tabular-nums; margin-left: auto;
    }
    .dh-entry .dh-etldr {
      font-size: 11.5px; line-height: 1.5; color: var(--ink-dim); word-break: break-word;
    }

    /* ============================ LIST VIEW — the status-board ============== */
    /* The TUI status-board's web twin: a scannable, status-grouped column. Same
       live board / poll / analyze() as the DAG, same detail rail. Replaces the
       #flow canvas (insights rail + detail rail stay). NO accent side-stripes —
       grouping is carried by leading lamps + a section header + a subtle full-
       border row; emphasis by background tint, never a 2px left rail. */
    #listview {
      flex: 1 1 auto; min-width: 0; min-height: 0;
      display: flex; flex-direction: column;
      overflow-y: auto; overflow-x: hidden;
      background:
        radial-gradient(120% 80% at 50% -8%, var(--canvas-glow), var(--ground) 60%);
    }

    /* condensed insights strip atop the list (mirrors the rail, one line) */
    .lvstrip {
      position: sticky; top: 0; z-index: 4;
      display: flex; align-items: center; gap: 0;
      flex-wrap: wrap;
      padding: 0;
      background: linear-gradient(180deg, var(--panel), var(--panel-hi) 130%);
      border-bottom: 1px solid var(--hair);
      box-shadow: 0 1px 0 oklch(0.12 0.01 255 / 0.5);
    }
    .lvstrip .si {
      display: flex; flex-direction: column; gap: 3px;
      padding: 9px 16px;
      border-right: 1px solid var(--hair-soft);
    }
    .lvstrip .si:last-child { border-right: none; }
    .lvstrip .si.grow { flex: 1 1 auto; min-width: 0; }
    .lvstrip .sl {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--ink-faint);
    }
    .lvstrip .sv {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 12px; font-weight: 500; color: var(--ink);
      font-variant-numeric: tabular-nums; letter-spacing: 0.01em;
    }
    .lvstrip .si.grow .sv {
      font-family: 'Archivo', sans-serif; font-size: 13px; font-weight: 600;
      letter-spacing: -0.005em;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .lvstrip .sv .unit { color: var(--ink-faint); font-size: 11px; }
    .lvstrip .si.flag .sl, .lvstrip .si.flag .sv { color: var(--alert); }

    /* a status section: header (icon + name + count) then its rows */
    .lvsect { display: flex; flex-direction: column; }
    .lvsect .shead {
      display: flex; align-items: center; gap: 9px;
      padding: 13px 18px 8px;
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink-dim);
    }
    .lvsect .shead .sic { font-size: 12px; line-height: 1; color: var(--shc, var(--ink-dim)); }
    .lvsect .shead .snm { color: var(--shc, var(--ink-dim)); font-weight: 500; }
    .lvsect .shead .scount {
      font-variant-numeric: tabular-nums; color: var(--ink-faint);
      background: var(--chip-bg);
      border: 1px solid var(--hair-soft); border-radius: 9px;
      padding: 1px 8px; font-size: 9px; letter-spacing: 0.04em;
    }
    .lvsect .shead .srule {
      flex: 1 1 auto; height: 1px; background: var(--hair-soft);
    }
    /* the AWAITING-YOU section header reads as the one alarm — amber, held */
    .lvsect.gate .shead { --shc: var(--alert); }
    .lvsect.gate .shead .scount {
      color: var(--alert); border-color: oklch(0.80 0.150 66 / 0.45);
      background: oklch(0.80 0.150 66 / 0.12);
    }

    /* a row: leading lamp + id·title + per-status detail + structural chips.
       Full bottom hairline (no side stripe); selected = full ring + tint. */
    .lvrow {
      display: flex; align-items: center; gap: 11px;
      padding: 9px 18px; cursor: pointer;
      border-bottom: 1px solid var(--hair-soft);
      border-left: 1px solid transparent; border-right: 1px solid transparent;
      transition: background 200ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    .lvrow:hover { background: var(--panel-hi); }
    .lvrow.sel {
      background: oklch(0.70 0.115 244 / 0.10);
      box-shadow: inset 0 0 0 1px oklch(0.70 0.115 244 / 0.45);
    }
    .lvrow .lamp {
      width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto;
      box-shadow: 0 0 0 1px var(--lamp-ring),
                  0 0 7px currentColor, 0 0 2px currentColor;
    }
    /* the in_flight row lamp breathes like the tile lamp */
    .lvrow.s-in_flight .lamp { animation: lamppulse 1.7s ease-in-out infinite; }
    /* awaiting-you row lamp: held alert pulse */
    .lvrow.usergate .lamp { animation: gatelamp 2.0s ease-in-out infinite; }

    .lvrow .body { flex: 1 1 auto; min-width: 0;
      display: flex; flex-direction: column; gap: 3px; }
    .lvrow .line1 { display: flex; align-items: baseline; gap: 9px; min-width: 0; }
    .lvrow .rid {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 10px; font-weight: 500; color: var(--ink-dim);
      font-variant-numeric: tabular-nums; flex: 0 0 auto;
    }
    .lvrow .rtitle {
      font-size: 13px; font-weight: 500; color: var(--ink);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
    }
    .lvrow .rtitle.empty { color: var(--ink-faint); font-style: italic; }
    /* per-status detail line — mechanism / clock / blocked-on / artifact */
    .lvrow .detailline {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 9.5px; letter-spacing: 0.02em; color: var(--ink-dim);
      font-variant-numeric: tabular-nums;
    }
    .lvrow .detailline .dpart { display: inline-flex; align-items: center; gap: 4px; }
    .lvrow .detailline .dpart .dk {
      color: var(--ink-faint); letter-spacing: 0.08em; text-transform: uppercase;
      font-size: 8px;
    }
    .lvrow .detailline .clk { color: var(--inflight); }
    .lvrow .detailline .clk .cglyph { font-size: 9px; opacity: 0.9; }
    .lvrow .detailline .art { color: var(--done); }
    .lvrow .detailline .bon { color: var(--ink-dim); }
    .lvrow .detailline .gate { color: var(--alert); }

    /* structural chips, right-aligned cluster (gates / fan-in / bottleneck / crit) */
    .lvrow .chips { display: flex; align-items: center; gap: 6px; flex: 0 0 auto; }
    .lvrow .lchip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 7px; border-radius: var(--r-sm);
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
      background: var(--chip-bg);
      color: var(--ink-dim); border: 1px solid var(--hair-soft);
    }
    .lvrow .lchip .cn { color: var(--ink); font-variant-numeric: tabular-nums; font-size: 9px; }
    .lvrow .lchip.impact.hot {
      background: oklch(0.80 0.160 70 / 0.12);
      border-color: oklch(0.80 0.160 70 / 0.35); color: var(--spine);
    }
    .lvrow .lchip.impact.hot .cn { color: var(--spine); }
    .lvrow .lchip.conv {
      background: oklch(0.70 0.115 244 / 0.12);
      border-color: oklch(0.70 0.115 244 / 0.4); color: var(--ready);
    }
    .lvrow .lchip.conv .cn { color: var(--ready); }
    .lvrow .lchip.crit {
      background: oklch(0.80 0.160 70 / 0.10);
      border-color: oklch(0.80 0.160 70 / 0.4); color: var(--spine);
    }
    .lvrow .lchip.bneck {
      background: oklch(0.80 0.150 66 / 0.12);
      border-color: oklch(0.80 0.150 66 / 0.5); color: var(--alert);
    }

    .lvempty {
      padding: 40px 18px; text-align: center;
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 11px; letter-spacing: 0.04em; color: var(--ink-faint);
    }

    /* ============================ BOARD VIEW — the Kanban card board ========= */
    /* The agile card board between the DAG and the list: workflow stages become
       lanes (columns), tasks become compact cards with density BETWEEN a graph
       node and a list row. Same live board + analyze() + select() + clock as the
       other two views; replaces the #flow canvas (insights + detail rails stay).
       Discipline: NO side-stripe accent rails on lanes or cards — grouping is
       carried by the lane header + the leading status lamp + full hairline
       borders + background tint, never a 2px left/right edge. */
    #boardview {
      flex: 1 1 auto; min-width: 0; min-height: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
      background:
        radial-gradient(120% 80% at 50% -8%, var(--canvas-glow), var(--ground) 60%);
    }

    /* the lanes track: a horizontal row of columns, scrolls sideways on overflow */
    .bvlanes {
      flex: 1 1 auto; min-height: 0;
      display: flex; align-items: stretch; gap: 14px;
      padding: 16px 18px;
      overflow-x: auto; overflow-y: hidden;
    }

    /* a LANE — a column container (NOT a card; no card chrome around it). Header
       on top, then an independently vertical-scrolling body of cards. */
    .bvlane {
      flex: 0 0 286px; width: 286px;
      display: flex; flex-direction: column; min-height: 0;
      background: linear-gradient(180deg, var(--panel), var(--ground) 96%);
      border: 1px solid var(--hair-soft);
      border-radius: var(--r-lg);
      overflow: hidden;
    }
    .bvlane .lanehead {
      flex: 0 0 auto;
      display: flex; align-items: center; gap: 9px;
      padding: 11px 13px 10px;
      border-bottom: 1px solid var(--hair-soft);
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--ink-dim);
    }
    .bvlane .lanehead .lic { font-size: 12px; line-height: 1; color: var(--lhc, var(--ink-dim)); }
    .bvlane .lanehead .lnm { color: var(--lhc, var(--ink-dim)); font-weight: 500; flex: 1 1 auto; }
    .bvlane .lanehead .lct {
      font-variant-numeric: tabular-nums; color: var(--ink-faint);
      background: var(--chip-bg);
      border: 1px solid var(--hair-soft); border-radius: 9px;
      padding: 1px 8px; font-size: 9px; letter-spacing: 0.04em; flex: 0 0 auto;
    }
    /* the AWAITING-YOU lane header reads as the one allowed alarm — amber, held */
    .bvlane.gate { border-color: oklch(0.80 0.150 66 / 0.4); }
    .bvlane.gate .lanehead { --lhc: var(--alert); border-bottom-color: oklch(0.80 0.150 66 / 0.3); }
    .bvlane.gate .lanehead .lct {
      color: var(--alert); border-color: oklch(0.80 0.150 66 / 0.45);
      background: oklch(0.80 0.150 66 / 0.12);
    }

    .bvlane .lanebody {
      flex: 1 1 auto; min-height: 0;
      overflow-y: auto; overflow-x: hidden;
      display: flex; flex-direction: column; gap: 10px;
      padding: 11px 11px 13px;
    }

    /* a CARD — a compact instrument tile, denser than a node, lighter than a row.
       Full hairline border + raised panel fill; the leading status lamp carries
       the status colour. No side-stripe. Hover lifts a hair; selected = full ring. */
    .bvcard {
      --lamp: var(--blocked);
      position: relative;
      display: flex; flex-direction: column; gap: 7px;
      padding: 9px 11px 10px;
      border-radius: var(--r-md);
      background: linear-gradient(180deg, var(--panel-hi), var(--panel));
      border: 1px solid var(--hair);
      cursor: pointer;
      box-shadow: 0 1px 2px oklch(0.10 0.01 255 / 0.4);
      transition: border-color 200ms cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 200ms cubic-bezier(0.16, 1, 0.3, 1),
                  transform 200ms cubic-bezier(0.16, 1, 0.3, 1),
                  background 200ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    :root[data-theme="light"] .bvcard {
      box-shadow: 0 1px 2px oklch(0.55 0.02 255 / 0.10);
    }
    .bvcard:hover {
      transform: translateY(-1px); border-color: var(--hair);
      box-shadow: 0 2px 4px oklch(0.10 0.01 255 / 0.4), 0 8px 18px oklch(0.10 0.01 255 / 0.28);
    }
    :root[data-theme="light"] .bvcard:hover {
      box-shadow: 0 2px 4px oklch(0.55 0.02 255 / 0.10), 0 8px 18px oklch(0.55 0.02 255 / 0.14);
    }
    .bvcard.sel {
      border-color: oklch(0.70 0.115 244 / 0.75);
      box-shadow: 0 0 0 1px oklch(0.70 0.115 244 / 0.45),
                  0 2px 4px oklch(0.10 0.01 255 / 0.4);
    }
    :root[data-theme="light"] .bvcard.sel {
      box-shadow: 0 0 0 1px oklch(0.70 0.115 244 / 0.55),
                  0 2px 4px oklch(0.55 0.02 255 / 0.10);
    }
    /* critical-path card: amber border + faint amber field (no top bar needed at
       this density; the border + tint reads as "on the spine"). */
    .bvcard.crit {
      border-color: oklch(0.80 0.160 70 / 0.5);
      background: linear-gradient(180deg, oklch(0.80 0.160 70 / 0.05), var(--panel));
    }
    /* bottleneck card: heavier amber halo — the single "stalling the most" tile */
    .bvcard.bneck {
      border-color: oklch(0.80 0.150 66 / 0.6);
      box-shadow: 0 0 0 1px oklch(0.80 0.150 66 / 0.35),
                  0 2px 4px oklch(0.10 0.01 255 / 0.4);
    }

    .bvcard .cardtop { display: flex; align-items: center; gap: 7px; }
    .bvcard .lamp {
      width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto;
      background: var(--lamp);
      box-shadow: 0 0 0 1px var(--lamp-ring), 0 0 6px var(--lamp), 0 0 2px var(--lamp);
    }
    /* in_flight card lamp breathes; awaiting-you card lamp holds an alert pulse */
    .bvcard.s-in_flight .lamp { animation: lamppulse 1.7s ease-in-out infinite; }
    .bvcard.usergate .lamp { animation: gatelamp 2.0s ease-in-out infinite; }
    .bvcard .cid {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 9.5px; font-weight: 500; letter-spacing: 0.04em;
      color: var(--ink-dim); font-variant-numeric: tabular-nums; flex: 0 0 auto;
    }
    .bvcard .ctitle {
      font-size: 12px; line-height: 1.32; font-weight: 500; color: var(--ink);
      /* clamp to ~2 lines with ellipsis */
      display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      word-break: break-word;
    }
    .bvcard .ctitle.empty { color: var(--ink-faint); font-style: italic; }

    /* the chip row — reuses analyze(): gates N / ⋈ N / ⟋ crit / ⚠ bottleneck */
    .bvcard .cchips { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .bvcard .bchip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 1px 6px; border-radius: var(--r-sm);
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase;
      background: var(--chip-bg); color: var(--ink-dim);
      border: 1px solid var(--hair-soft);
    }
    .bvcard .bchip .cn { color: var(--ink); font-variant-numeric: tabular-nums; font-size: 9px; }
    .bvcard .bchip.impact.hot {
      background: oklch(0.80 0.160 70 / 0.12);
      border-color: oklch(0.80 0.160 70 / 0.35); color: var(--spine);
    }
    .bvcard .bchip.impact.hot .cn { color: var(--spine); }
    .bvcard .bchip.conv {
      background: oklch(0.70 0.115 244 / 0.12);
      border-color: oklch(0.70 0.115 244 / 0.4); color: var(--ready);
    }
    .bvcard .bchip.conv .cn { color: var(--ready); }
    .bvcard .bchip.crit {
      background: oklch(0.80 0.160 70 / 0.10);
      border-color: oklch(0.80 0.160 70 / 0.4); color: var(--spine);
    }
    .bvcard .bchip.bneck {
      background: oklch(0.80 0.150 66 / 0.12);
      border-color: oklch(0.80 0.150 66 / 0.5); color: var(--alert);
    }

    /* the ONE per-stage detail line — clock / took / blocked-on / awaiting-you */
    .bvcard .cdetail {
      display: flex; align-items: center; gap: 5px;
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 9px; letter-spacing: 0.02em; color: var(--ink-dim);
      font-variant-numeric: tabular-nums; min-width: 0;
    }
    .bvcard .cdetail .dk {
      color: var(--ink-faint); letter-spacing: 0.08em; text-transform: uppercase;
      font-size: 8px; flex: 0 0 auto;
    }
    .bvcard .cdetail .dv {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
    }
    .bvcard .cdetail.clk { color: var(--inflight); }
    .bvcard .cdetail.clk .cglyph { font-size: 9px; opacity: 0.9; }
    .bvcard .cdetail.took .dv { color: var(--done); }
    .bvcard .cdetail.bon { color: var(--ink-dim); }
    .bvcard .cdetail.gate { color: var(--alert); }
    .bvcard .cdetail.gate .gpause { display: inline-flex; align-items: center; gap: 2px; flex: 0 0 auto; }
    .bvcard .cdetail.gate .gpause i {
      width: 2px; height: 7px; border-radius: 1px;
      background: var(--alert); box-shadow: 0 0 5px oklch(0.80 0.150 66 / 0.6);
    }

    .bvempty {
      margin: auto; padding: 40px 18px; text-align: center;
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 11px; letter-spacing: 0.04em; color: var(--ink-faint);
    }

    /* ============================ TIMELINE VIEW — the gantt swimlanes ======== */
    /* The fourth view: tasks spread across a shared time axis. Each task is ONE
       horizontal bar on its own lane (row); lanes share the same x-scale, so two
       bars that span the same x-range visibly overlap — OVERLAP READS AS PARALLEL
       at a glance. Same live board + analyze() + select() + clock + isAwaitingUser()
       as the other three views; replaces the #flow canvas (insights + detail rails
       stay). When wall-clock timestamps are present the axis is real time; when
       they are sparse/absent it degrades to a TOPOLOGICAL axis (longest-path depth
       from roots) so the chart is meaningful even on a clock-less board.
       Discipline: NO side-stripe accent rails — the critical chain is carried by a
       top accent bar + amber bar fill + lamp, never a 2px left/right edge. */
    #timelineview {
      flex: 1 1 auto; min-width: 0; min-height: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
      background:
        radial-gradient(120% 80% at 50% -8%, var(--canvas-glow), var(--ground) 60%);
    }

    /* the sticky axis header: a left label gutter + a tick-ruled scale strip */
    .tlaxis {
      position: sticky; top: 0; z-index: 4;
      flex: 0 0 auto;
      display: flex; align-items: stretch;
      background: linear-gradient(180deg, var(--panel), var(--panel-hi) 130%);
      border-bottom: 1px solid var(--hair);
      box-shadow: 0 1px 0 oklch(0.12 0.01 255 / 0.5);
    }
    .tlaxis .axhead {
      flex: 0 0 var(--tl-gutter, 168px); width: var(--tl-gutter, 168px);
      display: flex; flex-direction: column; gap: 3px; justify-content: center;
      padding: 9px 14px;
      border-right: 1px solid var(--hair-soft);
    }
    .tlaxis .axhead .axl {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--ink-faint);
    }
    .tlaxis .axhead .axmode {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 10px; font-weight: 500; color: var(--ink-dim);
      letter-spacing: 0.04em;
    }
    /* the scale strip — tick labels evenly spaced across the time/depth span */
    .tlaxis .axscale {
      flex: 1 1 auto; min-width: 0; position: relative;
      padding: 9px 16px 8px;
    }
    .tlaxis .axtick {
      position: absolute; top: 0; bottom: 0;
      display: flex; flex-direction: column; justify-content: center;
      transform: translateX(-50%);
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8.5px; letter-spacing: 0.04em; color: var(--ink-faint);
      font-variant-numeric: tabular-nums; white-space: nowrap;
      pointer-events: none;
    }
    .tlaxis .axtick:first-child { transform: none; }
    .tlaxis .axtick:last-child { transform: translateX(-100%); }

    /* the lane area: vertical scroll of per-task rows, each row a shared-scale track */
    .tllanes {
      flex: 1 1 auto; min-height: 0;
      overflow-y: auto; overflow-x: hidden;
      padding: 10px 0 16px;
    }
    .tllane {
      display: flex; align-items: stretch;
      min-height: 34px;
    }
    .tllane:hover { background: oklch(0.70 0.115 244 / 0.04); }
    /* the lane's left label gutter: lamp + id + clamped title */
    .tllabel {
      flex: 0 0 var(--tl-gutter, 168px); width: var(--tl-gutter, 168px);
      display: flex; align-items: center; gap: 8px;
      padding: 5px 14px 5px 16px;
      border-right: 1px solid var(--hair-soft);
      cursor: pointer; min-width: 0;
      transition: background 160ms ease;
    }
    .tllabel:hover { background: var(--panel-hi); }
    .tllabel .lamp {
      width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto;
      box-shadow: 0 0 0 1px var(--lamp-ring), 0 0 6px currentColor, 0 0 2px currentColor;
    }
    .tllane.s-in_flight .tllabel .lamp { animation: lamppulse 1.7s ease-in-out infinite; }
    .tllane.usergate .tllabel .lamp { animation: gatelamp 2.0s ease-in-out infinite; }
    .tllabel .lid {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 9.5px; font-weight: 500; color: var(--ink-dim);
      font-variant-numeric: tabular-nums; flex: 0 0 auto;
    }
    .tllabel .ltt {
      flex: 1 1 auto; min-width: 0;
      font-size: 11px; color: var(--ink);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .tllabel .ltt.empty { color: var(--ink-faint); font-style: italic; }

    /* the track: the shared-scale plotting strip a bar floats on */
    .tltrack {
      flex: 1 1 auto; min-width: 0; position: relative;
      margin: 5px 16px;
    }
    /* faint vertical gridlines aligned to the axis ticks (drawn as a repeating
       linear-gradient set inline per-render via --tl-grid background). The grid
       reads as instrument ruling, low-contrast. */
    .tltrack .tlgrid {
      position: absolute; inset: 0; pointer-events: none;
      opacity: 0.5;
    }
    .tltrack .tlgrid i {
      position: absolute; top: -4px; bottom: -4px; width: 1px;
      background: var(--grid);
    }

    /* a BAR — one task's span on the shared scale. left/width set inline (%).
       The fill is the status lamp laid over the raised panel at low opacity (a
       translucent tint layer, the file's idiom — NOT a hard lamp block), framed
       by a lamp-tinted hairline. The leading edge carries a brighter lamp cap so
       a zero/near-zero-width bar is still visible. */
    .tlbar {
      position: absolute; top: 0; bottom: 0;
      min-width: 5px;
      border-radius: var(--r-sm);
      background: linear-gradient(180deg, var(--panel-hi), var(--panel));
      border: 1px solid var(--lamp);
      box-shadow: 0 1px 2px oklch(0.10 0.01 255 / 0.35);
      cursor: pointer; overflow: hidden;
      display: flex; align-items: center; gap: 6px;
      padding: 0 8px;
      transition: border-color 200ms cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 200ms cubic-bezier(0.16, 1, 0.3, 1),
                  transform 200ms cubic-bezier(0.16, 1, 0.3, 1),
                  filter 200ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    /* the lamp tint layer — the lamp colour washed across the bar at low opacity,
       so the fill reads as the status colour without a flat block. Sits under the
       cap + label (they carry z-index 1); the crit/sel overrides restyle it. */
    .tlbar::after {
      content: ''; position: absolute; inset: 0;
      background: var(--lamp); opacity: 0.18; pointer-events: none;
    }
    :root[data-theme="light"] .tlbar {
      box-shadow: 0 1px 2px oklch(0.55 0.02 255 / 0.10);
    }
    .tlbar:hover {
      transform: translateY(-1px); filter: brightness(1.06);
      box-shadow: 0 2px 5px oklch(0.10 0.01 255 / 0.32), 0 6px 14px oklch(0.10 0.01 255 / 0.22);
    }
    :root[data-theme="light"] .tlbar:hover {
      box-shadow: 0 2px 5px oklch(0.55 0.02 255 / 0.10), 0 6px 14px oklch(0.55 0.02 255 / 0.12);
    }
    /* the bright leading cap so even a thin bar shows its status colour */
    .tlbar .cap {
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      border-radius: var(--r-sm) 0 0 var(--r-sm);
      background: var(--lamp);
      box-shadow: 0 0 6px var(--lamp);
      z-index: 1; /* sits above the ::after lamp-tint wash */
    }
    /* in-bar label — id-or-clock, only shown when the bar is wide enough (JS gates
       it via a min-width class). Martian Mono, sits on the fill. */
    .tlbar .blabel {
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 9px; font-weight: 500; letter-spacing: 0.02em;
      color: var(--ink); font-variant-numeric: tabular-nums;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      position: relative; z-index: 1;
    }
    .tlbar .blabel .cglyph { font-size: 9px; opacity: 0.85; margin-right: 3px; }
    .tlbar.running .blabel { color: var(--inflight); }

    /* selected bar: a clear cyan focus ring (read-only selection, matches nodes) */
    .tlbar.sel {
      border-color: oklch(0.70 0.115 244 / 0.8);
      box-shadow: 0 0 0 2px oklch(0.70 0.115 244 / 0.45),
                  0 1px 2px oklch(0.10 0.01 255 / 0.35);
    }
    .tllane.sel { background: oklch(0.70 0.115 244 / 0.08); }

    /* critical-chain bar — amber spine: a top accent cap (NOT a side stripe) +
       amber-shifted fill + amber frame. Same visual language as GRAPH crit nodes. */
    .tlbar.crit {
      background:
        linear-gradient(180deg,
