          oklch(0.80 0.160 70 / 0.26), oklch(0.80 0.160 70 / 0.14));
      border-color: oklch(0.80 0.160 70 / 0.55);
    }
    /* crit carries its own amber fill — drop the lamp-tint wash so it stays amber */
    .tlbar.crit::after { display: none; }
    .tlbar.crit::before {
      content: ''; position: absolute; left: 4px; right: 4px; top: 0; height: 2px;
      border-radius: 0 0 2px 2px;
      background: var(--spine);
      box-shadow: 0 0 7px oklch(0.80 0.160 70 / 0.6);
    }
    .tlbar.crit .blabel { color: var(--spine); }
    /* bottleneck bar — heavier amber halo (the single "stalling the most" bar) */
    .tlbar.bneck {
      border-color: oklch(0.80 0.150 66 / 0.7);
      box-shadow: 0 0 0 1px oklch(0.80 0.150 66 / 0.35),
                  0 0 18px oklch(0.80 0.150 66 / 0.2);
    }
    /* awaiting-you bar holds the alert pulse (the one allowed alarm) */
    .tlbar.usergate { border-color: oklch(0.80 0.150 66 / 0.6); }
    .tlbar.usergate .cap { background: var(--alert); box-shadow: 0 0 6px var(--alert); }

    /* a degraded "no span" pip — used when a task has no derivable extent at all
       (e.g. a ready/blocked task on a real-time axis): a small lamp dot at its
       anchor point so it still appears on the timeline rather than vanishing. */
    .tlbar.pip {
      min-width: 0; width: 11px !important; padding: 0; border-radius: 50%;
      background: var(--lamp);
      border: 1px solid var(--lamp-ring);
      box-shadow: 0 0 6px var(--lamp), 0 0 2px var(--lamp);
    }
    .tlbar.pip::before, .tlbar.pip::after { display: none; }
    .tlbar.pip .cap, .tlbar.pip .blabel { display: none; }

    /* NOT-STARTED bar — a queued task (ready/blocked) with no data yet. Greyed +
       weakened so it reads as "waiting in line", clearly behind any started/done
       coloured bar, WITHOUT a side stripe (.impeccable): the desaturation is
       carried by a neutral fill + lowered opacity + a grey lamp/cap, never a 2px
       edge rail. The neutral comes from --blocked (the file's muted-slate token);
       the lamp-tint wash + leading cap are overridden to that same grey so no
       status colour leaks through, and overall opacity drops so it sits visually
       under the live/completed bars sharing the chart. */
    .tlbar.notstarted {
      background: linear-gradient(180deg, var(--panel-hi), var(--panel));
      border-color: var(--blocked);
      opacity: 0.5;
      box-shadow: none;
    }
    .tlbar.notstarted::after { background: var(--blocked); opacity: 0.10; }
    .tlbar.notstarted .cap { background: var(--blocked); box-shadow: none; }
    .tlbar.notstarted .blabel { color: var(--ink-faint); }
    /* a not-started PIP (time mode, no anchor) — the dot greys + dims to match */
    .tlbar.pip.notstarted {
      background: var(--blocked);
      border-color: var(--lamp-ring);
      box-shadow: none;
    }
    /* the lane lamp greys + loses its glow so the whole row reads "not started" */
    .tllane.notstarted .tllabel .lamp {
      background: var(--blocked) !important; color: var(--blocked) !important;
      box-shadow: 0 0 0 1px var(--lamp-ring);
      opacity: 0.7;
    }

    .tlempty {
      margin: auto; padding: 40px 18px; text-align: center;
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 11px; letter-spacing: 0.04em; color: var(--ink-faint);
    }
    /* the legend strip at the bottom — explains the axis + crit spine, mirrors the
       graph legend's restraint (lamp/bar keys, no chrome side rails) */
    .tlfoot {
      flex: 0 0 auto;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      padding: 8px 16px;
      border-top: 1px solid var(--hair-soft);
      background: linear-gradient(180deg, var(--panel), var(--panel-hi) 130%);
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 8.5px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--ink-faint);
    }
    .tlfoot .fk { display: inline-flex; align-items: center; gap: 6px; }
    .tlfoot .fk .spinebar {
      width: 16px; height: 2px; border-radius: 2px; background: var(--spine);
      box-shadow: 0 0 6px oklch(0.80 0.160 70 / 0.6);
    }
    .tlfoot .fk .nowbar {
      width: 2px; height: 11px; border-radius: 1px; background: var(--inflight);
      box-shadow: 0 0 6px oklch(0.79 0.150 74 / 0.6);
    }

    /* the live "NOW" marker — a thin vertical line riding the lane area when the
       axis is real-time and at least one task is still in flight. The marker's
       left% must share the bars'/grid's coordinate system, so it lives inside a
       .tlnowlayer overlay that reproduces the .tltrack plotting box: it starts
       after the label gutter (--tl-gutter) + the track's 16px left margin and
       stops 16px before the right edge. Inside it, .tlnow's left% then lands on
       the same f as every bar and gridline (pixel-aligned). */
    .tlnowlayer {
      position: absolute; top: 0; bottom: 0;
      left: calc(var(--tl-gutter, 168px) + 16px);
      right: 16px;
      pointer-events: none; z-index: 3;
    }
    .tlnow {
      position: absolute; top: 0; bottom: 0; width: 2px;
      background: var(--inflight);
      box-shadow: 0 0 8px oklch(0.79 0.150 74 / 0.55);
      pointer-events: none;
    }
    .tlnow::after {
      content: 'now'; position: absolute; top: 2px; left: 4px;
      font-family: 'Martian Mono', ui-monospace, monospace;
      font-size: 7.5px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--inflight); white-space: nowrap;
    }

    /* ============================ STATUS / ERROR ============================ */
    .err {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-family: 'Martian Mono', ui-monospace, monospace;
      color: var(--ink-faint); font-size: 12px; letter-spacing: 0.05em;
    }

    /* ============================ xyflow chrome overrides ==================== */
    .react-flow__controls {
      box-shadow: 0 8px 24px oklch(0.08 0.01 255 / 0.5);
      border-radius: var(--r-md); overflow: hidden;
      border: 1px solid var(--hair);
    }
    .react-flow__controls-button {
      background: var(--panel); border-bottom: 1px solid var(--hair-soft);
      color: var(--ink-dim); width: 26px; height: 26px;
    }
    .react-flow__controls-button:hover { background: var(--panel-hi); color: var(--ink); }
    .react-flow__controls-button svg { fill: currentColor; }

    .react-flow__minimap {
      border: 1px solid var(--hair);
      border-radius: var(--r-md);
      box-shadow: 0 8px 24px oklch(0.08 0.01 255 / 0.5);
      overflow: hidden;
    }
    /* legible minimap mask — clearly contrasted outside the viewport rectangle.
       (xyflow's maskColor/nodeStrokeColor props win over these; kept theme-aware
       via the --mm-* tokens as a backstop so a CSS-only render still tracks.) */
    .react-flow__minimap-mask { fill: var(--mm-mask); }
    /* minimap node dots get a faint stroke so they never vanish into the bg */
    .react-flow__minimap-node { stroke: var(--mm-stroke); stroke-width: 2px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Import-map: every specifier resolves to a LOCAL /vendor/ file. React is mapped to a
       SINGLE file so react / react-dom / @xyflow/react all share ONE react instance
       (two copies => hooks crash). No esm.sh / CDN / external URL anywhere. -->
  <!-- Shared graph-analysis core (the ONE source of truth — same module hooks + the
       board-graph CLI use). Loaded as CLASSIC scripts (no type=module) so they run, in
       order, BEFORE the module below: board-lint-core first (publishes buildGraph/findCycle
       to globalThis.__ccmBoardLintCore), then board-graph-core (reads that global, publishes
       analyzeGraph to globalThis.__ccmBoardGraphCore). The module's analyze() then DELEGATES
       to analyzeGraph() instead of re-implementing the graph algorithms (DRY — design §5.8).
       Served from /core/* by view-server (read-only, zero network). If either fails to load
       (older server with no /core route), the module degrades to a built-in fallback. -->
  <script src="/core/board-lint-core.js"></script>
  <script src="/core/board-graph-core.js"></script>

  <script type="importmap">
  {
    "imports": {
      "react": "/vendor/react.mjs",
      "react/jsx-runtime": "/vendor/jsx-runtime.mjs",
      "react-dom": "/vendor/react-dom.mjs",
      "react-dom/client": "/vendor/react-dom-client.mjs",
      "@xyflow/react": "/vendor/xyflow.mjs",
      "dagre": "/vendor/dagre.mjs"
    }
  }
  </script>

  <script type="module">
    import React, { useEffect, useState, useRef, useCallback, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      ReactFlow, Background, BackgroundVariant, Controls, MiniMap, Handle, Position,
      ReactFlowProvider, useReactFlow,
    } from '@xyflow/react';
    import dagre from 'dagre';

    const h = React.createElement;

    // ---- status palette ----------------------------------------------------
    // Resolved from the OKLCH CSS custom properties so the JS-driven surfaces
    // (minimap node dots, legend lamps) stay in lockstep with the CSS tokens.
    // One distinct illuminated-lamp color per enum value.
    const STATUS_VAR = {
      ready:     '--ready',
      in_flight: '--inflight',
      blocked:   '--blocked',

      // owner caret — a fold/unfold toggle (▾ open / ▸ collapsed). Clicking it toggles
      // the owner's collapse WITHOUT selecting the node (stopPropagation). Only owners
      // (have children) get one; leaf / childless tiles don't.
      const lamprowKids = [
        h('span', { key: 'l', className: 'lamp', style: { background: lamp, color: lamp } }),
        h('span', { key: 's', className: 'stat', style: { color: lamp } }, label),
      ];
      if (data.isOwner && data.ownerChildCount > 0) {
        lamprowKids.unshift(
          h('span', {
            key: 'caret',
            className: 'ocaret',
            role: 'button',
            tabIndex: 0,
            title: (data.collapsed ? 'expand' : 'collapse') + ' — ' + data.ownerChildCount + ' subtasks',
            onClick: (e) => {
              e.stopPropagation();
              if (typeof data.onToggleCollapse === 'function') data.onToggleCollapse(data.id);
            },
            onKeyDown: (e) => {
              if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault(); e.stopPropagation();
                if (typeof data.onToggleCollapse === 'function') data.onToggleCollapse(data.id);
              }
            },
          }, data.collapsed ? '▸' : '▾'),
        );
      }
      lamprowKids.push(h('span', { key: 'tid', className: 'tid' }, data.id));
      kids.push(
        h('div', { key: 'lr', className: 'lamprow' }, ...lamprowKids),
        h('div', { key: 'ti', className: 'title' + (title ? '' : ' empty') },
          title || 'untitled'),
      );

      // structural meta row: downstream impact + convergence fan-in
      const metaChips = [];
      // owner rollup pill — child progress (done / total). On a collapsed owner it is the
      // primary readout of "what's inside"; on an expanded owner it's a quick group gauge.
      if (data.isOwner && data.ownerChildCount > 0) {
        const allDone = data.ownerDone >= data.ownerChildCount;
        metaChips.push(
          h('span', {
            key: 'rollup',
            className: 'chip rollup' + (allDone ? ' done' : ''),
            title: data.ownerDone + ' of ' + data.ownerChildCount + ' subtasks done'
              + (data.collapsed ? ' · collapsed' : ''),
          }, (data.collapsed ? '▸ ' : '▾ ') + 'subtasks',
            h('span', { className: 'cn' }, data.ownerDone + '/' + data.ownerChildCount)),
        );
      }
      if (data.impact > 0) {
        metaChips.push(
          h('span', { key: 'imp', className: 'chip impact' + (data.impact >= IMPACT_HOT ? ' hot' : '') },
            'gates', h('span', { className: 'cn' }, data.impact)),
        );
      }
      if (data.inDeg >= CONV_MIN) {
        metaChips.push(
          h('span', { key: 'cv', className: 'chip conv', title: 'convergence join' },
            '⋈ in', h('span', { className: 'cn' }, data.inDeg)),
        );
      }
      // live running clock — a clear, legible readout on the tile (Martian Mono),
      // ticking once/second. Omits gracefully when dispatched_at is absent.
      if (clockStr) {
        metaChips.push(
          h('span', { key: 'dur', className: 'chip dur', title: 'running ' + clockStr + ' since dispatch' },
            h('span', { className: 'cglyph' }, '◷'),
            h('span', { className: 'cn' }, clockStr)),
        );
      }
      if (metaChips.length) {
        kids.push(h('div', { key: 'mt', className: 'meta' }, ...metaChips));
      }

      // awaiting-user indicator — a held "PAUSED, needs you" flag with a pause
      // glyph. Triggered by blocked_on:'user' regardless of status, so it shows
      // on a pure-blocked gate AND on an in_flight node that's hit a user gate.
      // On the combined node this flag is the dominant signal (see .usergate CSS).
      if (data.userGate) {
        kids.push(
          h('div', { key: 'gf', className: 'gateflag', title: 'paused — waiting on your decision' },
            h('span', { className: 'gpause' }, h('i'), h('i')),
            'awaiting you'),
        );
      }
      kids.push(h(Handle, { key: 'sh', type: 'source', position: Position.Bottom }));

      return h('div',
        { className: cls.join(' '), style: { '--lamp': lamp, '--i': data.order || 0 } },
        ...kids,
      );
    }
    const nodeTypes = { cc: CcNode };

    // ---- build nodes/edges from a board + analysis -------------------------
    // collapsed: Set<ownerId> of owners the user has folded shut. A collapsed owner's
    // CHILD nodes are hidden; their cross-group dependency edges reroute to/from the owner
    // so the DAG stays connected (design §7 nested-DAG owner grouping + collapse). The
    // owner tile then shows a child-count + rollup-progress pill and a ▾/▸ caret. With no
    // nesting (legacy / flat boards) `an.owners` is empty and this is a no-op — every node
    // renders exactly as before (graceful degradation, backward compatible).
    function buildGraph(board, an, sel, prevPositions, firstLayout, collapsed, onToggleCollapse) {
      const tasks = Array.isArray(board.tasks) ? board.tasks : [];
      const collapsedSet = collapsed instanceof Set ? collapsed : new Set();
      const owners = an.owners || new Set();

      // hidden = children of a COLLAPSED owner (only owners that are actually collapsed AND
      // genuinely own children). reroute(id) maps a hidden child up to its visible owner.
      const hidden = new Set();
      for (const t of tasks) {
        const par = an.parentOf(t.id);
        if (par && collapsedSet.has(par) && owners.has(par)) hidden.add(t.id);
      }
      function reroute(id) {
        if (!hidden.has(id)) return id;
        const par = an.parentOf(id);
        return (par && !hidden.has(par)) ? par : id; // owner is depth-1, always visible
      }
      const visibleTasks = tasks.filter(t => !hidden.has(t.id));
      const visibleIds = new Set(visibleTasks.map(t => t.id));

      // rerouted edge pairs (deduped, no self/internal loops) — feeds both dagre layout and
      // the rendered edges. An edge dep->task becomes reroute(dep)->reroute(task).
      const pairSeen = new Set();
      const edgePairs = [];
      for (const t of tasks) {
        const deps = Array.isArray(t.deps) ? t.deps : [];
        for (const d of deps) {
          if (!visibleIds.has(d) && !hidden.has(d)) continue; // dangling dep -> skip
          const s = reroute(d), tg = reroute(t.id);
          if (s === tg || !visibleIds.has(s) || !visibleIds.has(tg)) continue;
          const key = s + '\u0000' + tg;
          if (pairSeen.has(key)) continue;
          pairSeen.add(key);
          edgePairs.push([s, tg]);
        }
      }

      const positions = (prevPositions && prevPositions.size) ? prevPositions : layout(visibleTasks, edgePairs);

      // lineage sets for the selected node. ancSet/descSet trace the DEPENDENCY chain
      // (who gates / is gated by sel). kidSet is the CONTAINMENT relation: if sel is an
      // owner, its child nodes (the sub-DAG it holds) light up as "members of this group"
      // — a distinct, coordinated cool-blue highlight (the owner's accent hue) so selecting
      // a parent answers "what does it manage?" (#feat①). Only populated for an owner.
      let ancSet = null, descSet = null, kidSet = null;
      if (sel && an.byId.has(sel)) {
        ancSet = an.ancestors(sel);
        descSet = an.descendants(sel, new Set());
        if (owners.has(sel)) kidSet = new Set(an.childrenOf(sel));
      }

      const nodes = visibleTasks.map((t, i) => {
        // awaiting-user = blocked_on:'user' AND a pending status (blocked /
        // in_flight) — catches a pure-blocked gate AND an in_flight node that has
        // hit a point needing human input (combined "spinning AND waiting"), but
        // NOT a terminal task carrying a stale blocked_on:'user' (see isAwaitingUser).
        const userGate = isAwaitingUser(t);
        const p = positions.get(t.id) || { x: 0, y: 0 };
        let lineage = null;
        if (sel) {
          if (t.id === sel) lineage = 'self';
          else if (ancSet && ancSet.has(t.id)) lineage = 'anc';
          else if (descSet && descSet.has(t.id)) lineage = 'desc';
          // group membership — a child of the selected owner. Lowest precedence: a node
          // already on sel's dependency chain (anc/desc) keeps that classification; a child
          // that's NOT on the dep chain gets the containment highlight.
          else if (kidSet && kidSet.has(t.id)) lineage = 'child';
        }
        // nesting metadata: is this node an owner (has children)? a child (has a parent)?
        const isOwner = owners.has(t.id);
        const childOf = an.parentOf(t.id);
        const rp = isOwner ? an.rollupProgress(t.id) : null;
        return {
          id: t.id,
          type: 'cc',
          position: p,
          selected: t.id === sel,
          // explicit dims so the MiniMap can size its rects before xyflow has
          // measured the custom node DOM (otherwise the dots are zero-size and
          // the minimap reads as an empty dark box).
          width: NODE_W,
          height: NODE_H,
          data: {
            id: t.id,
            title: t.title,
            status: t.status,
            crit: an.critSet.has(t.id),
            userGate,
            bottleneck: an.bneck === t.id,
            impact: an.impact.get(t.id) || 0,
            inDeg: an.inDeg.get(t.id) || 0,
            // parsed dispatch epoch (ms) so the tile can tick a LIVE clock itself
            // every second; null when absent/unparseable -> clock omitted.
            dispatchedAt: t.status === 'in_flight' ? startTs(t) : null,
            lineage,
            // staggered entrance fade — ONLY on the first paint (firstLayout), never on a
            // re-layout (topology change / collapse toggle), or the whole graph re-fades
            // from opacity:0 and high-stagger tiles read as "vanished" (#bug②).
            enter: !!firstLayout,
            order: i,
            // ── D3 nesting tile data ──
            isOwner,
            collapsed: isOwner && collapsedSet.has(t.id),
            ownerChildCount: rp ? rp.total : 0,
            ownerDone: rp ? rp.done : 0,
            childOf: childOf && visibleIds.has(childOf) ? childOf : null,
            onToggleCollapse,
          },
        };
      });

      // lineage edge set: edges fully inside {sel} ∪ ancestors ∪ descendants
      // along the actual dependency chain to/from sel. Rerouted ids are used so a
      // collapsed owner's lineage still reads (its children's lineage rolls up to it).
      const linNodes = new Set();
      if (sel) {
        linNodes.add(reroute(sel));
        if (ancSet) for (const a of ancSet) linNodes.add(reroute(a));
        if (descSet) for (const d of descSet) linNodes.add(reroute(d));
      }

      const edges = [];
      for (const [d, tid] of edgePairs) {
        const onCrit = an.critSet.has(d) && an.critSet.has(tid);
        let onLin = false;
        if (sel && linNodes.has(d) && linNodes.has(tid)) {
          const dAnc = d === sel || (ancSet && ancSet.has(d));
          const tAnc = tid === sel || (ancSet && ancSet.has(tid));
          const dDesc = d === sel || (descSet && descSet.has(d));
          const tDesc = tid === sel || (descSet && descSet.has(tid));
          onLin = (dAnc && tAnc) || (dDesc && tDesc);
        }
        edges.push({
          id: d + '->' + tid,
          source: d,
          target: tid,
          className: onLin ? 'edge-lin' : undefined,
          animated: onCrit || onLin,
          style: onLin
            ? { stroke: cssVar('--ready'), strokeWidth: 2.2 }
            : onCrit
              ? { stroke: spineColor(), strokeWidth: 2.4 }
              : { stroke: edgeColor(), strokeWidth: 1.3, opacity: 0.75 },
        });
      }
      return { nodes, edges, positions };
    }

    // structural signature: does the node/edge SET differ? (ignores status/label)
    // ★Topology = dep edges AND parent (container) edges. A parent re-point changes the
    // OWNER GROUPING — and, while an owner is collapsed, which nodes are even VISIBLE
    // (buildGraph hides a collapsed owner's children, keyed off an.parentOf). If the sig
    // ignored parent, a board poll that only changed tasks[].parent would read as fresh=false
    // → apply() reuses stale positions and never re-fits → a newly-visible node lands at {0,0}
    // off-screen. So fold parent edges into the signature too (status/label still ignored).
    function structSig(board) {
      const tasks = Array.isArray(board.tasks) ? board.tasks : [];
      const ids = tasks.map(t => t.id).sort();
      const idset = new Set(ids);
      const edges = [];
      for (const t of tasks) for (const d of (t.deps || [])) if (idset.has(d)) edges.push(d + '>' + t.id);
      edges.sort();
      // parent (container) edges — child→owner, only when the owner id exists. Distinct
      // namespace ('^') from dep edges ('>') so a dep edge and a parent edge between the
      // same pair never collide in the signature.
      const pedges = [];
      for (const t of tasks) if (typeof t.parent === 'string' && t.parent && idset.has(t.parent)) pedges.push(t.id + '^' + t.parent);
      pedges.sort();
      return ids.join(',') + '|' + edges.join(',') + '|' + pedges.join(',');
    }

    // ---- main component ---------------------------------------------------
    function Board() {
      const [board, setBoard] = useState(null);
      const [nodes, setNodes] = useState([]);
      const [edges, setEdges] = useState([]);
      const [err, setErr] = useState(null);
      const [sel, setSel] = useState(null);  // selected task id (lineage anchor)
      // collapsed owners (D3 nested-DAG): a Set of owner ids the user has folded shut.
      // Their children are hidden + their cross-group edges reroute to the owner. State,
      // not persisted (a fresh load shows the full graph). selRef-style ref so the stable
      // toggleCollapse / render callbacks read the live set without re-subscribing.
      const [collapsed, setCollapsed] = useState(() => new Set());
      const collapsedRef = useRef(collapsed);
      collapsedRef.current = collapsed;
      // discuss-history sidecars, fetched from the OPTIONAL read-only /decisions.json
      // route (added by a newer view-server). Stays [] on any failure — an older
      // server returns 404 here and the whole history feature silently no-ops.
      const [decisions, setDecisions] = useState([]);
      // view mode: 'graph' (xyflow DAG) | 'board' (Kanban card board) | 'list'
      // (status-board) | 'timeline' (the time/gantt swimlanes). Persisted in
      // localStorage (key ccm-view); default 'graph'. Migrate gracefully: any
      // unknown / legacy value falls back to 'graph'.
      const [view, setView] = useState(() => {
        try {
          const v = localStorage.getItem('ccm-view');
          return (v === 'list' || v === 'board' || v === 'timeline' || v === 'graph') ? v : 'graph';
        } catch (_e) { return 'graph'; }
      });
      const setViewPersist = useCallback((v) => {
        setView(v);
        try { localStorage.setItem('ccm-view', v); } catch (_e) {}
      }, []);
      // theme: 'dark' | 'light'. The root attribute is already set (initialTheme
      // ran at module load); mirror it into state so a flip re-renders and the
      // JS-resolved colors (edges, spine, minimap) re-resolve. Persisted under
      // ccm-theme; default came from stored pref → OS → dark.
      const [theme, setTheme] = useState(() => currentTheme());
      const sigRef = useRef(null);
      const posRef = useRef(new Map());
      const boardRef = useRef(null);
      const selRef = useRef(null);
      const rf = useReactFlow();
      const didFit = useRef(false);

      // analysis recomputed whenever the board changes
      const an = useMemo(() => {
        if (!board) return null;
        return analyze(board.tasks, board.owner);
      }, [board]);
      const anRef = useRef(null);
      anRef.current = an;
      boardRef.current = board;
      selRef.current = sel;

      // toggleCollapse(id) — fold/unfold an owner. Stable callback (functional setState);
      // it flips id in the collapsed Set and re-renders FRESH (collapse changes the visible
      // node set, so dagre must re-layout + re-fit, like a topology change). Defined as a
      // ref-target so node tiles can call it; the actual re-render is driven by the
      // collapsed-state effect below (keeps render's closure simple).
      const toggleCollapse = useCallback((id) => {
        setCollapsed((prev) => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id); else next.add(id);
          return next;
        });
      }, []);

      // (re)render the graph from current board + analysis + selection. Reads the live
      // collapsed set via ref + passes the stable toggle so owner tiles can fold/unfold.
      // `fresh` drives the dagre RE-LAYOUT (new visible/topology set → recompute positions);
      // the staggered entrance fade (`enter`) is a SEPARATE one-shot — it must play only on
      // the very FIRST paint, NEVER on a re-layout. Coupling the two (passing `fresh` as
      // firstLayout) made every collapse/expand replay the whole graph's fade-from-opacity-0
      // — the owner's tile (high stagger index) held opacity:0 for ~0.7s, reading as "the
      // owner vanished on collapse" (#bug②). firstPaintRef flips false after the first paint.
      const firstPaintRef = useRef(true);
      const render = useCallback((b, analysis, selection, fresh) => {
        const entrance = firstPaintRef.current;
        const { nodes: nn, edges: ee, positions } =
          buildGraph(b, analysis, selection, fresh ? null : posRef.current, entrance,
            collapsedRef.current, toggleCollapse);
        if (fresh) posRef.current = positions;
        firstPaintRef.current = false;
        setNodes(nn);
        setEdges(ee);
      }, [toggleCollapse]);

      // flip day/night — set the root attribute, invalidate the cssVar cache so
      // edges/spine/minimap re-resolve, persist, and re-render the graph in place
      // (fresh=false → keep dagre positions, keep selection, keep poll state; we
      // only restyle, never re-layout). The CSS [data-theme] block restyles the
      // rest; the graph rebuild repaints the JS-resolved edge strokes.
      const toggleTheme = useCallback(() => {
        const next = currentTheme() === 'light' ? 'dark' : 'light';
        applyThemeAttr(next);
        clearCssCache();
        try { localStorage.setItem(THEME_KEY, next); } catch (_e) {}
        setTheme(next);
        const b = boardRef.current, a = anRef.current;
        if (b && a) render(b, a, selRef.current, false);
      }, [render]);

      const apply = useCallback((b) => {
        const sig = structSig(b);
        const analysis = analyze(b.tasks, b.owner);
        const fresh = sig !== sigRef.current;
        if (fresh) sigRef.current = sig;
        // keep selection only if the node still exists
        let s = selRef.current;
        if (s && !analysis.byId.has(s)) s = null;
        render(b, analysis, s, fresh);
        if (s !== selRef.current) setSel(s);
        if (fresh) {
          // re-fit on every topology change (nodes added/removed) — on a live
          // 2s-polling viewer, newly dispatched nodes must not land off-screen.
          // structSig is topology-only, so status-only polls aren't `fresh` and
          // won't fight the user's manual pan/zoom mid-status-update.
          didFit.current = true;
          setTimeout(() => rf.fitView({ padding: 0.16 }), 30);
        }
        setBoard(b);
      }, [rf, render]);

      useEffect(() => {
        let alive = true;
        async function poll() {
          try {
            const r = await fetch('/board.json', { cache: 'no-store' });
            if (!alive) return;
            if (!r.ok) { return; } // mid-write -> skip this tick, keep last good render
            const b = await r.json();
            if (!alive) return;
            setErr(null);
            apply(b);
          } catch (_e) { /* transient -> retry next tick */ }
        }
        poll();
        const iv = setInterval(poll, 2000);
        return () => { alive = false; clearInterval(iv); };
      }, [apply]);

      // ---- collapse-change re-render (D3 nested-DAG) ------------------------
      // Folding / unfolding an owner changes the VISIBLE node set, so the DAG must
      // re-layout (dagre) and re-fit — exactly like a topology change. Re-render FRESH
      // from the current board + analysis whenever the collapsed set changes. Skip the
      // initial mount (no board yet / empty set) so this never double-renders the first
      // poll. Pure view-state; the board itself is untouched (read-only viewer invariant).
      const collapseInit = useRef(true);
      useEffect(() => {
        if (collapseInit.current) { collapseInit.current = false; return; }
        const b = boardRef.current, a = anRef.current;
        if (!b || !a) return;
        render(b, a, selRef.current, true); // fresh=true -> re-layout the new visible set
        didFit.current = true;
        setTimeout(() => { try { rf.fitView({ padding: 0.16 }); } catch (_e) {} }, 30);
      }, [collapsed, render, rf]);

      // ---- discuss history poll — OPTIONAL, fail-silent ---------------------
      // Pull /decisions.json on the same 2s cadence as the board. This route is
      // served only by a newer view-server; on an older server it 404s. Every
      // failure path (404, network error, non-array body) collapses to keeping
      // the last good list — never throws, never disturbs the board render. A
      // node with no sidecars simply has no group → its history section is omitted.
      useEffect(() => {
        let alive = true;
        async function pollDecisions() {
          try {
            const r = await fetch('/decisions.json', { cache: 'no-store' });
            if (!alive) return;
            if (!r.ok) { return; } // 404 (old server) or mid-write -> silently skip
            const d = await r.json();
            if (!alive) return;
            setDecisions(Array.isArray(d) ? d : []);
          } catch (_e) { /* old server / transient -> keep last, stay silent */ }
        }
        pollDecisions();
        const iv = setInterval(pollDecisions, 2000);
        return () => { alive = false; clearInterval(iv); };
      }, []);

      // group decision sidecars by node_id, newest-first within each group. Used
      // by the detail rail to show a node's discuss history. Guards every field:
      // a malformed entry (missing node_id, non-string stamps) degrades, never throws.
      const decisionsByNode = useMemo(() => {
        const m = new Map();
        const list = Array.isArray(decisions) ? decisions : [];
        for (const d of list) {
          if (!d || typeof d !== 'object') continue;
          const nid = (d.node_id != null && String(d.node_id).trim()) ? String(d.node_id).trim() : null;
          if (!nid) continue;
          if (!m.has(nid)) m.set(nid, []);
          m.get(nid).push(d);
        }
        // sort each group by round (then resolved_at) ascending; the latest is last.
        for (const arr of m.values()) {
          arr.sort((a, b) => {
            const ra = Number(a.round), rb = Number(b.round);
            const aHas = Number.isFinite(ra), bHas = Number.isFinite(rb);
            if (aHas && bHas && ra !== rb) return ra - rb;
            const ta = parseTs(typeof a.resolved_at === 'string' ? a.resolved_at : '');
            const tb = parseTs(typeof b.resolved_at === 'string' ? b.resolved_at : '');
            if (ta != null && tb != null) return ta - tb;
            return 0;
          });
        }
        return m;
      }, [decisions]);

      // selection handlers — re-render graph (lineage) without re-layout
      const select = useCallback((id) => {
        setSel(id);
        const b = boardRef.current, a = anRef.current;
        if (b && a) render(b, a, id, false);
      }, [render]);

      const onNodeClick = useCallback((_e, node) => { select(node.id); }, [select]);
      const onPaneClick = useCallback(() => { select(null); }, [select]);

      const progress = useMemo(() => {
        const tasks = (board && Array.isArray(board.tasks)) ? board.tasks : [];
        const done = tasks.filter(t => DONE_STATUSES.has(t.status)).length;
        return { done, total: tasks.length };
      }, [board]);

      const counts = useMemo(() => {
        const tasks = (board && Array.isArray(board.tasks)) ? board.tasks : [];
        const c = {};
        for (const t of tasks) c[t.status] = (c[t.status] || 0) + 1;
        return c;
      }, [board]);

      const pct = progress.total ? Math.round((progress.done / progress.total) * 100) : 0;
      const branch = board && board.git && board.git.branch ? board.git.branch : null;
      const userGates = an ? an.userGateIds.length : 0;
      const nodeCount = progress.total;

      const selTask = (board && sel) ? (board.tasks || []).find(t => t.id === sel) : null;

      return h('div', { id: 'app' },
        h('header', { className: 'bar' },
          // identity nameplate
          h('div', { className: 'ident' },
            h('span', { className: 'beacon' }),
            h('div', { className: 'mark-wrap' },
              h('span', { className: 'mark' }, 'cc-master'),
              h('span', { className: 'sub' }, 'mission control'),
            ),
          ),
          // mission line
          h('div', { className: 'goalwrap' },
            h('span', { className: 'label' }, 'objective'),
            h('span', { className: 'goal', title: board ? board.goal : '' },
              board ? (board.goal || 'no goal set') : 'acquiring board…'),
          ),
          // telemetry readouts
          h('div', { className: 'readouts' },
            // view toggle — GRAPH (xyflow DAG) | BOARD (Kanban) | LIST (status-board) | TIMELINE (gantt)
            h('div', { className: 'viewtoggle', role: 'group', 'aria-label': 'view mode' },
              h('button', {
                type: 'button',
                className: view === 'graph' ? 'on' : '',
                'aria-pressed': view === 'graph',
                title: 'graph view — the dependency DAG',
                onClick: () => setViewPersist('graph'),
              }, h('span', { className: 'tg' }, '⬡'), 'graph'),
              h('button', {
                type: 'button',
                className: view === 'board' ? 'on' : '',
                'aria-pressed': view === 'board',
                title: 'board view — the Kanban card board',
                onClick: () => setViewPersist('board'),
              }, h('span', { className: 'tg' }, '▦'), 'board'),
              h('button', {
                type: 'button',
                className: view === 'list' ? 'on' : '',
                'aria-pressed': view === 'list',
                title: 'list view — the status-board',
                onClick: () => setViewPersist('list'),
              }, h('span', { className: 'tg' }, '☰'), 'list'),
              h('button', {
                type: 'button',
                className: view === 'timeline' ? 'on' : '',
                'aria-pressed': view === 'timeline',
                title: 'timeline view — the time / gantt swimlanes',
                onClick: () => setViewPersist('timeline'),
              }, h('span', { className: 'tg' }, '▤'), 'timeline'),
            ),
            // day/night toggle — single icon button; glyph shows the DESTINATION
            // (☀ when dark → click for day; ☾ when light → click for night).
            // aria-pressed reflects "light theme is on".
            h('button', {
              type: 'button',
              className: 'themetoggle',
              'aria-pressed': theme === 'light',
              'aria-label': theme === 'light'
                ? 'switch to night (dark) theme'
                : 'switch to day (light) theme',
              title: theme === 'light' ? 'night theme' : 'day theme',
              onClick: toggleTheme,
            }, h('span', { className: 'glyph', 'aria-hidden': 'true' }, theme === 'light' ? '☾' : '☀')),
            h('div', { className: 'vrule' }),
            h('div', { className: 'readout' },
              h('span', { className: 'rl' }, 'progress'),
              h('span', { className: 'rv' },
                progress.done, h('span', { className: 'unit' }, '/' + progress.total),
                h('span', { className: 'unit' }, '  ' + pct + '%'),
              ),
              h('div', { className: 'meter' }, h('i', { style: { width: pct + '%' } })),
            ),
            branch ? h('div', { className: 'vrule' }) : null,
            branch ? h('div', { className: 'readout branch' },
              h('span', { className: 'rl' }, 'branch'),
              h('span', { className: 'rv' }, branch),
            ) : null,
            userGates > 0 ? h('div', { className: 'vrule' }) : null,
            userGates > 0 ? h('div', { className: 'alarm' },
              h('span', { className: 'dot' }),
              h('span', { className: 'n' }, userGates),
              'awaiting you',
            ) : null,
          ),
        ),
        h('div', { id: 'stage' },
          // left analytics rail
          h(Insights, { an, board, progress, pct, nodeCount, onPick: select }),
          // center: BOARD view (Kanban card board) — same live board, same
          // analyze(), same select(); lanes by workflow stage, cards between a
          // node and a row. Rails stay mounted (as in list view).
          view === 'board' ? h(BoardView, {
            an, board, sel, onPick: select,
          }) : null,
          // center: LIST view (status-board) — same live board, same analyze(),
          // same select(); replaces the canvas while keeping rails intact.
          view === 'list' ? h(ListView, {
            an, board, progress, pct, sel, onPick: select,
          }) : null,
          // center: TIMELINE view (time / gantt swimlanes) — same live board,
          // same analyze(), same select(); each task is a bar on a shared time
          // axis, parallel tasks stack on their own lanes so OVERLAP reads as
          // PARALLELISM at a glance, the critical chain is amber-spined.
          view === 'timeline' ? h(TimelineView, {
            an, board, sel, onPick: select,
          }) : null,
          // center canvas — GRAPH view. Kept mounted only in graph mode so xyflow
          // doesn't measure/animate while hidden; nodes/edges state still updates.
          view === 'graph' ? h('div', { id: 'flow', className: sel ? 'has-selection' : '' },
            err ? h('div', { className: 'err' }, err) : null,
            h(ReactFlow, {
              nodes, edges, nodeTypes,
              fitView: true,
              minZoom: 0.1,
              proOptions: { hideAttribution: true },
              nodesDraggable: true,
              nodesConnectable: false,
              elementsSelectable: true,
              onNodeClick,
              onPaneClick,
              defaultEdgeOptions: { type: 'smoothstep' },
            },
              h(Background, {
                variant: BackgroundVariant.Dots,
                gap: 22, size: 1, color: cssVar('--grid'),
              }),
              h(Controls, { showInteractive: false }),
              // MiniMap: only worth showing on larger graphs — below ~10 nodes it
              // adds nothing but a tiny dark inset. Auto-hide under the threshold.
              nodeCount > 10 ? h(MiniMap, {
                // keyed on theme so a switch remounts it with fresh colors
                key: 'mm-' + theme,
                pannable: true, zoomable: true,
                // bg / mask / stroke from the concrete --mm-* tokens (plain
                // hex/rgba — these DO resolve, unlike the oklch lamp vars), so
                // the minimap tracks day/night too.
                bgColor: cssVar('--mm-bg'),
                maskColor: cssVar('--mm-mask'),
                // CONCRETE solid colors per status — the minimap SVG does NOT
                // resolve our oklch()/CSS-var lamps, so a var lookup leaves the
                // rects unfilled (the empty-dark-box bug). Plain hex fills it;
                // minimapColor is keyed on the active theme.
                nodeColor: (n) => minimapColor(n.data && n.data.status),
                nodeStrokeColor: cssVar('--mm-stroke'),
                nodeStrokeWidth: 3,
                nodeBorderRadius: 3,
              }) : null,
            ),
            h(Legend, { counts, total: progress.total }),
          ) : null,
          // right detail rail (slides in on selection)
          h(Detail, { task: selTask, an, board,
            discussions: (selTask ? (decisionsByNode.get(selTask.id) || []) : []),
            onClose: () => select(null), onPick: select }),
        ),
      );
    }

    // ---- INSIGHTS RAIL — derived analytics readout -------------------------
    function Insights({ an, board, progress, pct, nodeCount, onPick }) {
      if (!an || !board) {
        return h('div', { id: 'insights' },
          h('div', { className: 'ihead' }, 'analysis'),
          h('div', { className: 'metric' },
            h('div', { className: 'mv dim' }, 'acquiring board…')),
        );
      }
      const idTitle = (id) => {
        const t = an.byId.get(id);
        const ti = t && (t.title || '').trim();
        return ti || id;
      };
      const seg = (id) => h('span', {
        className: 'seg', key: id, onClick: () => onPick(id), title: idTitle(id),
      }, id);

      const overWip = (typeof board.wip_limit === 'number') && an.wip > board.wip_limit;

      const rows = [];

      // critical path
      rows.push(h('div', { className: 'metric', key: 'cp' },
        h('div', { className: 'ml' }, h('span', { className: 'ic' }, '⟋'), 'critical path'),
        an.critChain.length
          ? h('div', { className: 'chain' },
              an.critChain.flatMap((id, i) =>
                i === 0 ? [seg(id)] : [h('span', { className: 'arrow', key: 'a' + i }, '→'), seg(id)]))
          : h('div', { className: 'mv dim' }, '—'),
        h('div', { className: 'msub' }, 'length ' + an.critLen + ' · longest dependency chain'),
      ));

      // highest impact
      rows.push(h('div', { className: 'metric', key: 'imp' },
        h('div', { className: 'ml' }, h('span', { className: 'ic' }, '◈'), 'highest impact'),
        an.impactNode && an.impactMax > 0
          ? h('div', { className: 'mv' },
              h('span', { className: 'pill-id', onClick: () => onPick(an.impactNode) }, an.impactNode),
              '  ', idTitle(an.impactNode))
          : h('div', { className: 'mv dim' }, 'no node gates others'),
        an.impactMax > 0 ? h('div', { className: 'msub' }, 'gates ' + an.impactMax + ' downstream tasks') : null,
      ));

      // top convergence
      rows.push(h('div', { className: 'metric', key: 'conv' },
        h('div', { className: 'ml' }, h('span', { className: 'ic' }, '⋈'), 'top convergence'),
        an.convNode && an.convMax >= CONV_MIN
          ? h('div', { className: 'mv' },
              h('span', { className: 'pill-id', onClick: () => onPick(an.convNode) }, an.convNode),
              '  ', idTitle(an.convNode))
          : h('div', { className: 'mv dim' }, 'no multi-dep join'),
        an.convMax >= CONV_MIN ? h('div', { className: 'msub' }, an.convMax + ' dependencies aggregate here') : null,
      ));

      // bottleneck
      const bt = an.bneck ? an.byId.get(an.bneck) : null;
      const btDur = bt ? fmtDuration(taskDuration(bt)) : null;
      rows.push(h('div', { className: 'metric flag', key: 'bn' },
        h('div', { className: 'ml' }, h('span', { className: 'ic' }, '⚠'), 'bottleneck'),
        bt
          ? h('div', { className: 'mv' },
              h('span', { className: 'pill-id', onClick: () => onPick(an.bneck) }, an.bneck),
              '  ', idTitle(an.bneck))
          : h('div', { className: 'mv dim' }, 'none — nothing stalling'),
        bt ? h('div', { className: 'msub' },
          (STATUS_LABEL[bt.status] || bt.status)
          + (an.impact.get(an.bneck) > 0 ? ' · gates ' + an.impact.get(an.bneck) : '')
          + (btDur != null ? ' · ' + btDur : '')) : null,
      ));

      // WIP
      const wipLimit = (typeof board.wip_limit === 'number') ? board.wip_limit : null;
      rows.push(h('div', { className: 'metric' + (overWip ? ' warnwip' : ''), key: 'wip' },
        h('div', { className: 'ml' }, h('span', { className: 'ic' }, '≡'), 'work in flight'),
        h('div', { className: 'mv mono' },
          an.wip + (wipLimit != null ? ' / ' + wipLimit : '') + (overWip ? '  ⚠ over' : '')),
        h('div', { className: 'msub' }, wipLimit != null ? 'in_flight vs wip_limit' : 'in_flight (no wip_limit set)'),
      ));

      // awaiting user
      rows.push(h('div', { className: 'metric' + (an.userGateIds.length ? ' flag' : ''), key: 'au' },
        h('div', { className: 'ml' }, h('span', { className: 'ic' }, '◴'), 'awaiting user'),
        h('div', { className: 'mv mono' }, String(an.userGateIds.length)),
        (an.userGateIds.length && fmtElapsed(an.earliestGateElapsedMs) != null)
          ? h('div', { className: 'msub' }, 'oldest gate ' + fmtElapsed(an.earliestGateElapsedMs) + ' waiting')
          : h('div', { className: 'msub' }, 'human decisions pending'),
      ));

      // overall elapsed
      rows.push(h('div', { className: 'metric', key: 'el' },
        h('div', { className: 'ml' }, h('span', { className: 'ic' }, '◷'), 'orchestration age'),
        h('div', { className: 'mv mono' }, an.totalElapsedMs != null ? fmtElapsed(an.totalElapsedMs) : '—'),
        h('div', { className: 'msub' }, progress.done + '/' + progress.total + ' done · ' + pct + '%'),
      ));

      return h('div', { id: 'insights' },
        h('div', { className: 'ihead' }, 'analysis · ' + nodeCount + ' tasks'),
        ...rows,
      );
    }

    function msFromDispatch(t) {
      const ts = startTs(t);
      return ts != null ? Date.now() - ts : null;
    }

    // ---- BOARD VIEW — the Kanban / agile card board ------------------------
    // The third view: workflow stages become lanes (columns), tasks become
    // compact cards (density BETWEEN a graph node and a list row). Same live
    // board + analyze() + select() + clock + isAwaitingUser() as the other two.
    // Lanes in a fixed order, EMPTY ones omitted; each task in exactly ONE lane:
    //   AWAITING YOU (leftmost when present) → READY → IN FLIGHT → BLOCKED
    //   → DONE/VERIFIED → NEEDS ATTENTION.
    // Within a lane, cards sort by downstream impact (criticality) desc, id tie.
    function BoardView({ an, board, sel, onPick }) {
      if (!an || !board) {
        return h('div', { id: 'boardview' },
          h('div', { className: 'bvempty' }, 'acquiring board…'));
      }
      const tasks = Array.isArray(board.tasks) ? board.tasks : [];

      // partition into lanes. AWAITING-YOU pulls ANY awaiting-user task out FIRST
      // (its blocked ones are thus excluded from the BLOCKED lane — each task lands
      // in exactly one lane). Remaining lanes are status-driven, mutually exclusive.
      const gateIds = new Set(an.userGateIds);
      const lanes = {
        gate: [], ready: [], in_flight: [], blocked: [], done: [], attn: [],
      };
      for (const t of tasks) {
        if (gateIds.has(t.id)) { lanes.gate.push(t); continue; }
        const s = t.status;
        if (s === 'ready') lanes.ready.push(t);
        else if (s === 'in_flight') lanes.in_flight.push(t);
        else if (s === 'blocked') lanes.blocked.push(t);
        else if (DONE_STATUSES.has(s)) lanes.done.push(t);
        else if (NEEDS_ATTN.has(s)) lanes.attn.push(t);
        else lanes.attn.push(t); // unknown statuses surface, never vanish
      }
      // sort each lane by downstream impact desc (criticality), id as tiebreak
      const byImpact = (a, b) =>
        (an.impact.get(b.id) || 0) - (an.impact.get(a.id) || 0) ||
        String(a.id).localeCompare(String(b.id));
      for (const k of Object.keys(lanes)) lanes[k].sort(byImpact);

      // lane descriptors, in render order
      const LANES = [
        { key: 'gate',      cls: 'gate', icon: '⏸', name: 'awaiting you',     kind: 'gate' },
        { key: 'ready',     cls: '',     icon: '◷', name: 'ready',            kind: 'ready' },
        { key: 'in_flight', cls: '',     icon: '▶', name: 'in flight',        kind: 'inflight' },
        { key: 'blocked',   cls: '',     icon: '⛔', name: 'blocked',          kind: 'blocked' },
        { key: 'done',      cls: '',     icon: '✓', name: 'done · verified',  kind: 'done' },
        { key: 'attn',      cls: '',     icon: '⚠', name: 'needs attention',  kind: 'attn' },
      ];

      const laneEls = LANES.filter(l => lanes[l.key].length).map(l =>
        h('div', { className: 'bvlane ' + l.cls, key: l.key },
          h('div', { className: 'lanehead' },
            h('span', { className: 'lic' }, l.icon),
            h('span', { className: 'lnm' }, l.name),
            h('span', { className: 'lct' }, lanes[l.key].length),
          ),
          h('div', { className: 'lanebody' },
            ...lanes[l.key].map(t => h(BoardCard, {
              key: t.id, task: t, an, kind: l.kind,
              selected: t.id === sel, onPick,
            })),
          ),
        ),
      );

      return h('div', { id: 'boardview' },
        laneEls.length
          ? h('div', { className: 'bvlanes' }, ...laneEls)
          : h('div', { className: 'bvempty' }, 'no tasks on the board'),
      );
    }

    // a single board card — its own component so the in_flight clock can tick via
    // useSecondTick scoped to exactly the cards that need it. Density sits between
    // a graph node and a list row: lamp + id + clamped 2-line title + a chip row
    // (gates / ⋈ / ⟋ crit / ⚠ bottleneck) + ONE per-stage detail line.
    function BoardCard({ task: t, an, kind, selected, onPick }) {
      const status = t.status;
      const userGate = isAwaitingUser(t);
      // live clock: in_flight cards (dispatched & running) tick once/second.
      const running = status === 'in_flight' && startTs(t) != null;
      useSecondTick(running);

      const cls = ['bvcard', 's-' + (status || 'unknown')];
      if (userGate) cls.push('usergate');
      if (an.critSet.has(t.id)) cls.push('crit');
      if (an.bneck === t.id) cls.push('bneck');
      if (selected) cls.push('sel');
      const lamp = userGate ? cssVar('--alert') : statusColor(status);

      // ---- structural chips (reuse analyze()) --------------------------------
      const impact = an.impact.get(t.id) || 0;
      const inDeg = an.inDeg.get(t.id) || 0;
      const chips = [];
      if (impact > 0) chips.push(
        h('span', { className: 'bchip impact' + (impact >= IMPACT_HOT ? ' hot' : ''), key: 'imp',
          title: 'gates ' + impact + ' downstream tasks' },
          'gates', h('span', { className: 'cn' }, impact)));
      if (inDeg >= CONV_MIN) chips.push(
        h('span', { className: 'bchip conv', key: 'cv', title: 'convergence — ' + inDeg + ' direct deps' },
          '⋈', h('span', { className: 'cn' }, inDeg)));
      if (an.critSet.has(t.id)) chips.push(
        h('span', { className: 'bchip crit', key: 'cr', title: 'on the critical path' }, '⟋ crit'));
      if (an.bneck === t.id) chips.push(
        h('span', { className: 'bchip bneck', key: 'bn', title: 'bottleneck — stalling the most work' }, '⚠ bottleneck'));

      // ---- ONE per-stage detail line -----------------------------------------
      // in_flight → live clock; done → TOOK <dur>; blocked → ⛔ <blocked_on/dep>;
      // awaiting-you → ⏸ awaiting you (dominant on combined nodes).
      let detail = null;
      if (userGate) {
        detail = h('div', { className: 'cdetail gate' },
          h('span', { className: 'gpause' }, h('i'), h('i')),
          h('span', { className: 'dv' }, 'awaiting you'));
      } else if (kind === 'inflight') {
        if (running) {
          const clk = fmtElapsed(Date.now() - startTs(t));
          if (clk != null) detail = h('div', { className: 'cdetail clk' },
            h('span', { className: 'cglyph' }, '◷'), h('span', { className: 'dv' }, clk));
        }
      } else if (kind === 'done') {
        const durStr = fmtDuration(taskDuration(t));
        if (durStr != null) detail = h('div', { className: 'cdetail took' },
          h('span', { className: 'dk' }, 'took'), h('span', { className: 'dv' }, durStr));
      } else if (kind === 'blocked') {
        // blocked_on (non-user) wins; else the first unfinished upstream dep.
        let on = null;
        if (t.blocked_on && t.blocked_on !== 'user') {
          on = String(t.blocked_on);
        } else {
          const deps = an.upstream.get(t.id) || [];
          const blockers = deps.filter(d => {
            const dt = an.byId.get(d);
            return dt && !DONE_STATUSES.has(dt.status);
          });
          const showDeps = blockers.length ? blockers : deps;
          if (showDeps.length) on = showDeps.join(', ');
        }
        if (on != null) detail = h('div', { className: 'cdetail bon' },
          h('span', { className: 'dk' }, '⛔'), h('span', { className: 'dv' }, on));
      }

      const title = (t.title || '').trim();

      return h('div', {
        className: cls.join(' '),
        onClick: () => onPick(t.id),
        style: { '--lamp': lamp },
      },
        h('div', { className: 'cardtop' },
          h('span', { className: 'lamp', style: { background: lamp, color: lamp } }),
          h('span', { className: 'cid' }, t.id),
        ),
        h('div', { className: 'ctitle' + (title ? '' : ' empty') }, title || 'untitled'),
        chips.length ? h('div', { className: 'cchips' }, ...chips) : null,
        detail,
      );
    }

    // ---- LIST VIEW — the status-board (TUI status-board's web twin) --------
    // Same live board + analyze() + select() as the DAG; a scannable, status-
    // grouped column. Sections in a fixed priority order, EMPTY ones omitted:
    //   AWAITING YOU (top, most prominent) → IN FLIGHT → BLOCKED → READY
    //   → DONE/VERIFIED → NEEDS ATTENTION.
    // Within each section, rows sort by downstream impact (criticality) desc so
    // the heaviest items float up. Each row earns the graph's analytics in list
    // form: gates N / ⋈ N fan-in / ⟋ critical / ⚠ bottleneck chips.
    const NEEDS_ATTN = new Set(['stale', 'failed', 'escalated', 'uncertain']);
    function ListView({ an, board, progress, pct, sel, onPick }) {
      if (!an || !board) {
        return h('div', { id: 'listview' },
          h('div', { className: 'lvempty' }, 'acquiring board…'));
      }
      const tasks = Array.isArray(board.tasks) ? board.tasks : [];

      // partition into sections. AWAITING-YOU pulls ANY blocked_on:'user' task
      // out FIRST (regardless of status) so a user gate is never buried; the
      // remaining sections are status-driven and mutually exclusive with it.
      const gateIds = new Set(an.userGateIds);
      const buckets = {
        gate: [], in_flight: [], blocked: [], ready: [], done: [], attn: [],
      };
      for (const t of tasks) {
        if (gateIds.has(t.id)) { buckets.gate.push(t); continue; }
        const s = t.status;
        if (s === 'in_flight') buckets.in_flight.push(t);
        else if (s === 'blocked') buckets.blocked.push(t);
        else if (s === 'ready') buckets.ready.push(t);
        else if (DONE_STATUSES.has(s)) buckets.done.push(t);
        else if (NEEDS_ATTN.has(s)) buckets.attn.push(t);
        else buckets.attn.push(t); // unknown statuses surface, never vanish
      }
      // sort each bucket by downstream impact desc (criticality), id as tiebreak
      const byImpact = (a, b) =>
        (an.impact.get(b.id) || 0) - (an.impact.get(a.id) || 0) ||
        String(a.id).localeCompare(String(b.id));
      for (const k of Object.keys(buckets)) buckets[k].sort(byImpact);

      // section descriptors, in render order
      const SECTIONS = [
        { key: 'gate',      cls: 'gate', icon: '⏸', name: 'awaiting you',     kind: 'gate' },
        { key: 'in_flight', cls: '',     icon: '▶', name: 'in flight',        kind: 'inflight' },
        { key: 'blocked',   cls: '',     icon: '⛔', name: 'blocked',          kind: 'blocked' },
        { key: 'ready',     cls: '',     icon: '◷', name: 'ready',            kind: 'ready' },
        { key: 'done',      cls: '',     icon: '✓', name: 'done / verified',  kind: 'done' },
        { key: 'attn',      cls: '',     icon: '⚠', name: 'needs attention',  kind: 'attn' },
      ];

      const sections = SECTIONS.filter(s => buckets[s.key].length).map(s =>
        h('div', { className: 'lvsect ' + s.cls, key: s.key },
          h('div', { className: 'shead' },
            h('span', { className: 'sic' }, s.icon),
            h('span', { className: 'snm' }, s.name),
            h('span', { className: 'scount' }, buckets[s.key].length),
            h('span', { className: 'srule' }),
          ),
          ...buckets[s.key].map(t => h(ListRow, {
            key: t.id, task: t, an, kind: s.kind,
            selected: t.id === sel, onPick,
          })),
        ),
      );

      const userGates = an.userGateIds.length;

      return h('div', { id: 'listview' },
        // condensed insights strip — mirrors the rail, one horizontal line
        h('div', { className: 'lvstrip' },
          h('div', { className: 'si grow' },
            h('span', { className: 'sl' }, 'objective'),
            h('span', { className: 'sv', title: board.goal || '' }, board.goal || 'no goal set'),
          ),
          h('div', { className: 'si' },
            h('span', { className: 'sl' }, 'progress'),
            h('span', { className: 'sv' }, progress.done + '/' + progress.total + ' · ' + pct + '%'),
          ),
          h('div', { className: 'si' },
            h('span', { className: 'sl' }, 'critical path'),
            h('span', { className: 'sv' }, String(an.critLen)),
          ),
          h('div', { className: 'si' },
            h('span', { className: 'sl' }, 'wip'),
            h('span', { className: 'sv' }, String(an.wip)),
          ),
          h('div', { className: 'si' + (userGates ? ' flag' : '') },
            h('span', { className: 'sl' }, 'awaiting you'),
            h('span', { className: 'sv' }, String(userGates)),
          ),
        ),
        sections.length ? sections : h('div', { className: 'lvempty' }, 'no tasks on the board'),
      );
    }

    // a single list row — its own component so the in_flight clock can tick via
    // useSecondTick scoped to exactly the rows that need it.
    function ListRow({ task: t, an, kind, selected, onPick }) {
      const status = t.status;
      const userGate = isAwaitingUser(t);
      // live clock: in_flight (or any user-gate row dispatched & running) ticks.
      const running = status === 'in_flight' && startTs(t) != null;
      useSecondTick(running);

      const cls = ['lvrow', 's-' + (status || 'unknown')];
      if (userGate) cls.push('usergate');
      if (selected) cls.push('sel');
      const lamp = userGate ? cssVar('--alert') : statusColor(status);

      // ---- per-status detail line --------------------------------------------
      const parts = [];
      if (userGate) {
        const elStr = fmtElapsed(msFromDispatch(t));
        parts.push(h('span', { className: 'dpart gate', key: 'g' },
          h('span', { className: 'dk' }, 'gate'),
          'awaiting your decision' + (elStr != null ? ' · ' + elStr : '')));
      }
      if (kind === 'inflight' || running) {
        if (running) {
          const elapsed = Date.now() - startTs(t);
          const clk = fmtElapsed(elapsed);
          if (clk != null) parts.push(h('span', { className: 'dpart clk', key: 'clk' },
            h('span', { className: 'cglyph' }, '◷'), 'running ' + clk));
        }
        if (t.mechanism) parts.push(h('span', { className: 'dpart', key: 'mech' },
          h('span', { className: 'dk' }, 'via'), t.mechanism + (t.handle ? ' · ' + t.handle : '')));
      } else if (kind === 'blocked' && !userGate) {
        const deps = an.upstream.get(t.id) || [];
        const blockers = deps.filter(d => {
          const dt = an.byId.get(d);
          return dt && !DONE_STATUSES.has(dt.status);
        });
        const showDeps = blockers.length ? blockers : deps;
        if (t.blocked_on && t.blocked_on !== 'user') {
          parts.push(h('span', { className: 'dpart bon', key: 'bon' },
            h('span', { className: 'dk' }, 'blocked on'), String(t.blocked_on)));
        } else if (showDeps.length) {
          parts.push(h('span', { className: 'dpart bon', key: 'bon' },
            h('span', { className: 'dk' }, 'blocked on'), showDeps.join(', ')));
        }
      } else if (kind === 'done') {
        const dur = taskDuration(t);
        const durStr = fmtDuration(dur);
        if (durStr != null) parts.push(h('span', { className: 'dpart', key: 'dur' },
          h('span', { className: 'dk' }, 'took'), durStr));
        if (t.artifact) parts.push(h('span', { className: 'dpart art', key: 'art' },
          h('span', { className: 'dk' }, 'artifact'), String(t.artifact)));
      } else if (kind === 'attn') {
        const elStr = fmtElapsed(msFromDispatch(t));
        parts.push(h('span', { className: 'dpart bon', key: 'st' },
          h('span', { className: 'dk' }, 'status'),
          (STATUS_LABEL[status] || status) + (elStr != null ? ' · ' + elStr : '')));
      }

      // ---- structural chips (right cluster) ----------------------------------
      const impact = an.impact.get(t.id) || 0;
      const inDeg = an.inDeg.get(t.id) || 0;
      const chips = [];
      if (an.critSet.has(t.id)) chips.push(
        h('span', { className: 'lchip crit', key: 'cr', title: 'on the critical path' }, '⟋ crit'));
      if (an.bneck === t.id) chips.push(
        h('span', { className: 'lchip bneck', key: 'bn', title: 'bottleneck — stalling the most work' }, '⚠ bottleneck'));
      if (impact > 0) chips.push(
        h('span', { className: 'lchip impact' + (impact >= IMPACT_HOT ? ' hot' : ''), key: 'imp',
          title: 'gates ' + impact + ' downstream tasks' },
          'gates', h('span', { className: 'cn' }, impact)));
      if (inDeg >= CONV_MIN) chips.push(
        h('span', { className: 'lchip conv', key: 'cv', title: 'convergence — ' + inDeg + ' direct deps' },
          '⋈', h('span', { className: 'cn' }, inDeg)));

      const title = (t.title || '').trim();

      return h('div', {
        className: cls.join(' '),
        onClick: () => onPick(t.id),
        style: { '--lamp': lamp },
      },
        h('span', { className: 'lamp', style: { background: lamp, color: lamp } }),
        h('div', { className: 'body' },
          h('div', { className: 'line1' },
            h('span', { className: 'rid' }, t.id),
            h('span', { className: 'rtitle' + (title ? '' : ' empty') }, title || 'untitled'),
          ),
          parts.length ? h('div', { className: 'detailline' }, ...parts) : null,
        ),
        chips.length ? h('div', { className: 'chips' }, ...chips) : null,
      );
    }

    // ---- TIMELINE VIEW — the time / gantt swimlanes ------------------------
    // The fourth view: every task is one bar on a SHARED x-scale, each on its
    // own lane (row), so two bars covering the same x-range visibly overlap —
    // overlap reads as parallelism. Same live board + analyze() + select() +
    // clock + isAwaitingUser() as the other three.
    //
    // Two axis modes, auto-selected so the chart is meaningful on ANY board:
    //   • REAL-TIME — gated on meta.template_version (this-release-or-later board)
    //     AND ≥2 tasks carrying a parseable started_at (created_at fallback)
    //     spanning a non-zero range. Spans come from REUSED helpers: done/verified
    //     use taskDuration() (finished_at − started_at, log-span fallback);
    //     in_flight runs started_at → now (grows live under the 2s poll + 1s
    //     ticker); ready/blocked with no start render as a pip at created_at/anchor.
    //     started_at ≡ legacy dispatched_at, finished_at ≡ legacy completed_at
    //     (read-fallback so revived archived boards still render).
    //   • TOPOLOGICAL — fallback when real timestamps are too sparse (the dogfood
    //     reality: most boards carry none). The x-axis becomes longest-path DEPTH
    //     from roots (computed off an.upstream — REUSED adjacency, not re-derived):
    //     a task at depth d spans [d−1, d]; siblings at the same depth overlap, so
    //     the structural parallelism + critical chain still read at a glance.
    // Lanes ordered by (start asc, critical first, impact desc, id) so the chart
    // flows top-left → bottom-right along the spine.

    // longest-path depth (1-based) ending at each id, off REUSED an.upstream.
    // Memoized DFS with a cycle guard, mirroring analyze()'s lenEndingAt — kept
    // local (analyze exposes adjacency, not per-node depth) so we don't widen its
    // return shape just for this view.
    function depthMap(an, ids) {
      const memo = new Map();
      const visiting = new Set();
      function depthOf(id) {
        if (memo.has(id)) return memo.get(id);
        if (visiting.has(id)) return 1; // cycle guard
        visiting.add(id);
        let best = 1;
        for (const d of (an.upstream.get(id) || [])) {
          if (!ids.has(d)) continue;
          best = Math.max(best, 1 + depthOf(d));
        }
        visiting.delete(id);
        memo.set(id, best);
        return best;
      }
      const m = new Map();
      for (const id of ids) m.set(id, depthOf(id));
      return m;
    }

    function TimelineView({ an, board, sel, onPick }) {
      // mount a 1s ticker whenever any task is in_flight so live bars + the NOW
      // marker advance between the 2s polls (scoped to this view only).
      const tasksRaw = (board && Array.isArray(board.tasks)) ? board.tasks : [];
      const anyRunning = tasksRaw.some(t => t.status === 'in_flight' && startTs(t) != null);
      useSecondTick(anyRunning);

      if (!an || !board) {
        return h('div', { id: 'timelineview' },
          h('div', { className: 'tlempty' }, 'acquiring board…'));
      }
      const tasks = tasksRaw;
      if (!tasks.length) {
        return h('div', { id: 'timelineview' },
          h('div', { className: 'tlempty' }, 'no tasks on the board'));
      }
      const idSet = new Set(tasks.map(t => t.id));
      const now = Date.now();

      // ---- decide the axis mode -------------------------------------------
      // real-time anchors = parseable started_at (created_at as the queued-node
      // fallback so a not-yet-started node still anchors). Choosing the REAL-TIME
      // axis only pays off when MOST tasks carry a timestamp — otherwise the
      // un-anchored majority collapse into pips at "now" and the chart reads as a
      // pile on the right edge (the dogfood reality: many boards timestamp few/no
      // tasks). So: require ≥2 anchors, a non-zero span, AND coverage over half
      // the board; else fall back to the TOPOLOGICAL depth axis.
      // VERSION GATE: only trust the real-time axis on a this-release-or-later
      // board (meta.template_version present). On a LEGACY board (no version) a
      // few lingering old stamps must NOT flip the axis — they'd squash the
      // majority of un-stamped nodes into a pile at the now-edge. Legacy boards
      // stay topological and show a clear "no time schema" footer hint.
      const verGated = templateVersion(board) >= TIME_SCHEMA_MIN_VERSION;
      const anchors = [];
      for (const t of tasks) {
        const a = startTs(t) ?? createTs(t);
        if (a != null) anchors.push(a);
      }
      let mode = 'topo';
      if (verGated && anchors.length >= 2 && anchors.length >= Math.ceil(tasks.length / 2)) {
        const span = Math.max(...anchors) - Math.min(...anchors);
        if (span > 0) mode = 'time';
      }

      // ---- compute each task's [start, end] on the chosen scale -----------
      // rows: { t, start, end, pip, running } in raw scale units (ms epoch for
      // 'time', depth units for 'topo'); pip = no derivable extent (a dot).
      const rows = [];
      let lo = Infinity, hi = -Infinity;
      if (mode === 'time') {
        for (const t of tasks) {
          const disp = startTs(t);
          // bar start anchors on started_at; a not-yet-started node with only a
          // created_at anchors there instead (reads as "queued at created" — a pip
          // — rather than piling at now). A real span only grows from disp.
          let start = disp != null ? disp : createTs(t);
          let end = null, pip = false, running = false;
          const dur = taskDuration(t); // REUSED span derivation
          if (t.status === 'in_flight' && disp != null) {
            end = now; running = true;
          } else if (DONE_STATUSES.has(t.status) && dur && disp != null) {
            end = disp + dur.ms;
          } else if (disp != null && dur && dur.ms > 0) {
            end = disp + dur.ms; running = !!dur.running;
          }
          if (start == null) {
            // no real anchor → a pip at "now" so it still shows on the axis
            start = now; end = now; pip = true;
          } else if (disp == null) {
            // anchored only at created_at (queued, not started) → a pip at created
            end = start; pip = true;
          } else if (end == null || end <= start) {
            end = start; pip = true; // anchored but no extent → a pip at start
          }
          rows.push({ t, start, end, pip, running });
          lo = Math.min(lo, start); hi = Math.max(hi, end);
        }
      } else {
        const depth = depthMap(an, idSet); // REUSED an.upstream adjacency
        for (const t of tasks) {
          const d = depth.get(t.id) || 1;
          const start = d - 1, end = d;
          rows.push({ t, start, end, pip: false, running: t.status === 'in_flight' });
          lo = Math.min(lo, start); hi = Math.max(hi, end);
        }
      }
      if (!Number.isFinite(lo) || !Number.isFinite(hi)) { lo = 0; hi = 1; }
      let total = hi - lo;
      if (total <= 0) total = 1; // single-point board → avoid div-by-zero

      // ---- lane order: start asc, critical first, impact desc, id ----------
      rows.sort((a, b) =>
        a.start - b.start ||
        (an.critSet.has(b.t.id) ? 1 : 0) - (an.critSet.has(a.t.id) ? 1 : 0) ||
        (an.impact.get(b.t.id) || 0) - (an.impact.get(a.t.id) || 0) ||
        String(a.t.id).localeCompare(String(b.t.id)));

      // ---- axis tick labels ------------------------------------------------
      // 5 evenly-spaced ticks across the span; labels are clock-times in 'time'
      // mode, depth indices in 'topo' mode. (left% across the track.)
      const TICKS = 5;
      const ticks = [];
      for (let i = 0; i < TICKS; i++) {
        const f = i / (TICKS - 1);
        const at = lo + total * f;
        let lab;
        if (mode === 'time') {
          // elapsed-from-start reads cleaner than wall-clock on a relative chart
          lab = i === 0 ? 'start' : ('+' + (fmtElapsed(at - lo) || '0'));
        } else {
          lab = 'depth ' + Math.round(at);
        }
        ticks.push({ f, lab });
      }
      // dedupe consecutive identical labels (short boards) so ticks don't repeat
      const tickEls = ticks.map((tk, i) =>
        h('span', { className: 'axtick', key: i, style: { left: (tk.f * 100) + '%' } }, tk.lab));

      // vertical gridlines at the same fractions (faint instrument ruling)
      const gridEls = ticks.map((tk, i) =>
        h('i', { key: i, style: { left: (tk.f * 100) + '%' } }));

      // the live NOW marker — only in real-time mode while something runs and
      // now sits within the plotted span. Wrapped in a track-aligned overlay
      // (.tlnowlayer) so its f% basis is the same plotting strip the bars/grid
      // live on: bars/grid position left% inside .tltrack, which sits after the
      // label gutter (--tl-gutter) and inside the track's 16px side margins.
      // The overlay reproduces exactly that box, so the line lands pixel-aligned
      // with the bar/grid at the same f (was: left% on the gutter-inclusive
      // .tllanes container → horizontally offset from every bar/tick).
      let nowEl = null;
      if (mode === 'time' && anyRunning && now >= lo && now <= hi) {
        const f = (now - lo) / total;
        nowEl = h('div', { className: 'tlnowlayer' },
          h('div', { className: 'tlnow', style: { left: (f * 100) + '%' } }));
      }

      const laneEls = rows.map(r =>
        h(TimelineLane, {
          key: r.t.id, row: r, an, lo, total, mode,
          selected: r.t.id === sel, onPick, gridEls,
        }));

      // ---- the bottom legend strip ----------------------------------------
      const foot = h('div', { className: 'tlfoot' },
        h('span', { className: 'fk' }, h('span', { className: 'spinebar' }), 'critical chain'),
        mode === 'time'
          ? h('span', { className: 'fk' }, h('span', { className: 'nowbar' }), 'now · live')
          : null,
        h('span', { className: 'fk' },
          mode === 'time'
            ? 'axis · real time (start → finish)'
            : (verGated
                ? 'axis · topological depth (no timestamps — structural fallback)'
                : 'axis · topological depth (legacy board, no time schema — structural fallback)')),
      );

      return h('div', { id: 'timelineview' },
        // sticky axis header: label gutter + ruled scale
        h('div', { className: 'tlaxis' },
          h('div', { className: 'axhead' },
            h('span', { className: 'axl' }, 'timeline'),
            h('span', { className: 'axmode' }, mode === 'time' ? 'time' : 'depth'),
          ),
          h('div', { className: 'axscale' }, ...tickEls),
        ),
        // lanes — each a shared-scale track; NOW marker overlays the whole area
        h('div', { className: 'tllanes', style: { position: 'relative' } },
          nowEl,
          ...laneEls,
        ),
        foot,
      );
    }

    // a single timeline lane: the left label gutter + the shared-scale track that
    // carries this task's bar. Own component so the in_flight clock can tick via
    // useSecondTick scoped to exactly the lanes that need it.
    function TimelineLane({ row, an, lo, total, mode, selected, onPick, gridEls }) {
      const t = row.t;
      const status = t.status;
      const userGate = isAwaitingUser(t);
      const running = status === 'in_flight' && startTs(t) != null;
      useSecondTick(running);

      // NOT-STARTED = a queued task with no start anchor (started_at absent) AND a
      // ready/blocked status. Rendered as a desaturated grey bar/pip — kept in the
      // panorama, just visibly behind any started/done bar. A task that DID stamp
      // started_at reads as launched (isNotStarted is false) even if its status
      // looks queued; a task awaiting the USER is still "in play" so it keeps its
      // alert lamp, not the grey treatment. Holds in BOTH axis modes.
      const notStarted = isNotStarted(t) && !userGate;
      const lamp = userGate ? cssVar('--alert') : statusColor(status);

      // bar geometry on the shared scale (live for in_flight: recompute end=now)
      let start = row.start, end = row.end, pip = row.pip;
      if (mode === 'time' && running) { end = Date.now(); if (end <= start) { end = start; pip = true; } }
      const leftF = (start - lo) / total;
      const widthF = pip ? 0 : (end - start) / total;
      const leftPct = Math.max(0, Math.min(100, leftF * 100));
      const widthPct = Math.max(0, Math.min(100 - leftPct, widthF * 100));

      const laneCls = ['tllane', 's-' + (status || 'unknown')];
      if (userGate) laneCls.push('usergate');
      if (notStarted) laneCls.push('notstarted');
      if (selected) laneCls.push('sel');

      const barCls = ['tlbar'];
      if (pip) barCls.push('pip');
      // not-started overrides crit/bneck colour accents so a queued node never
      // reads as a live amber spine — it is greyed regardless of its DAG role.
      if (notStarted) barCls.push('notstarted');
      else {
        if (an.critSet.has(t.id)) barCls.push('crit');
        if (an.bneck === t.id) barCls.push('bneck');
      }
      if (userGate) barCls.push('usergate');
      if (running) barCls.push('running');
      if (selected) barCls.push('sel');

      // in-bar label — a live clock for in_flight, took-duration for done, else
      // the id. Only legible on a wide-enough bar; CSS truncates with ellipsis.
      let blabel = null;
      if (!pip) {
        if (running) {
          const clk = fmtElapsed(Date.now() - startTs(t));
          if (clk != null) blabel = h('span', { className: 'blabel' },
            h('span', { className: 'cglyph' }, '◷'), clk);
        } else if (DONE_STATUSES.has(status)) {
          const durStr = fmtDuration(taskDuration(t));
          blabel = h('span', { className: 'blabel' }, durStr != null ? durStr : t.id);
        }
        if (blabel == null) blabel = h('span', { className: 'blabel' }, t.id);
      }

      const title = (t.title || '').trim();
      const barTitle = t.id + (title ? ' · ' + title : '') +
        ' · ' + (STATUS_LABEL[status] || status) +
        (mode === 'time' && !pip ? ' · ' + (fmtElapsed(end - start) || '') : '');

      const bar = h('div', {
        className: barCls.join(' '),
        title: barTitle,
        onClick: (e) => { e.stopPropagation(); onPick(t.id); },
        style: pip
          ? { left: leftPct + '%', '--lamp': lamp }
          : { left: leftPct + '%', width: widthPct + '%', '--lamp': lamp },
      },
        pip ? null : h('span', { className: 'cap' }),
        blabel,
      );

      return h('div', { className: laneCls.join(' '), style: { '--lamp': lamp } },
        h('div', {
          className: 'tllabel', onClick: () => onPick(t.id), style: { '--lamp': lamp },
        },
          h('span', { className: 'lamp', style: { background: lamp, color: lamp } }),
