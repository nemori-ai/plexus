<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄喵 · Tomato Cat Pomodoro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');

:root{
  --cream:#f5f2e8;
  --cream-2:#efe9da;
  --brick:#c4736b;
  --brick-d:#a85d57;
  --orange:#d18a5c;
  --amber:#e6b068;
  --amber-glow:#f0c178;
  --brown:#8b6f47;
  --shadow:#5a4a3a;
  --gray:#a8a196;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}

body{
  font-family:'DM Mono',ui-monospace,monospace;
  color:var(--brown);
  background:
    radial-gradient(circle at 20% 10%, rgba(230,176,104,.18), transparent 45%),
    radial-gradient(circle at 85% 90%, rgba(196,115,107,.16), transparent 45%),
    linear-gradient(160deg,var(--cream) 0%, var(--cream-2) 100%);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:clamp(1rem,4vw,2.5rem) 1rem 3rem;
  transition:filter .8s ease;
}
/* whole UI desaturates during forced walk */
body.grayscale{filter:grayscale(1) brightness(.97)}

/* ---------- header ---------- */
header{text-align:center;margin-bottom:clamp(.6rem,3vw,1.4rem)}
header h1{
  color:var(--brick);
  font-weight:500;
  font-size:clamp(1.5rem,5vw,2.1rem);
  letter-spacing:.04em;
}
header .sub{
  margin-top:.25rem;
  font-size:.8rem;
  color:var(--gray);
  letter-spacing:.1em;
}
.fat-badge{
  display:inline-flex;align-items:center;gap:.4rem;
  margin-top:.7rem;
  font-size:.78rem;color:var(--orange);
  background:rgba(209,138,92,.12);
  padding:.25rem .8rem;border-radius:999px;
  border:1px dashed rgba(209,138,92,.5);
}

/* ---------- card ---------- */
.card{
  width:min(440px,100%);
  background:rgba(255,255,255,.32);
  border:1px solid rgba(139,111,71,.14);
  border-radius:22px;
  padding:clamp(1.2rem,5vw,2rem);
  box-shadow:0 12px 34px rgba(90,74,58,.12), inset 0 1px 0 rgba(255,255,255,.5);
  backdrop-filter:blur(8px);
  text-align:center;
}

.state-label{
  font-size:clamp(.9rem,3.5vw,1.05rem);
  letter-spacing:.12em;
  color:var(--orange);
  min-height:1.4em;
  transition:color .4s ease;
}
.state-label.break{color:var(--brick)}

/* ---------- cat ---------- */
.cat-wrap{
  width:clamp(150px,42vw,210px);
  margin:.4rem auto .2rem;
  aspect-ratio:28/26;
  display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 6px 8px rgba(90,74,58,.18));
}
.cat-svg{width:100%;height:100%;display:block}
.cat-svg.breathing{animation:breathe 3.4s ease-in-out infinite}
.cat-svg.shake{animation:shake .5s ease}
.cat-svg.stretch{animation:stretch .7s cubic-bezier(.2,1.4,.4,1)}
@keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-2.5px) scale(1.025)}}
@keyframes shake{0%,100%{transform:translateX(0) rotate(0)}15%{transform:translateX(-5px) rotate(-5deg)}30%{transform:translateX(5px) rotate(5deg)}45%{transform:translateX(-4px) rotate(-4deg)}60%{transform:translateX(4px) rotate(4deg)}80%{transform:translateX(-2px) rotate(-2deg)}}
@keyframes stretch{0%{transform:scaleY(.78) scaleX(1.05)}45%{transform:scaleY(1.16) scaleX(.93)}72%{transform:scaleY(.97)}100%{transform:scale(1)}}

/* ---------- timer ---------- */
.timer{
  font-size:clamp(3.2rem,17vw,4.6rem);
  font-weight:500;
  line-height:1;
  letter-spacing:.04em;
  color:var(--amber);
  text-shadow:0 2px 0 rgba(196,115,107,.18), 0 0 18px rgba(230,176,104,.55);
  font-variant-numeric:tabular-nums;
  margin:.3rem 0 .2rem;
}

.dots{display:flex;gap:.55rem;justify-content:center;margin:.6rem 0 1.1rem}
.dot{
  width:13px;height:13px;border-radius:50%;
  background:rgba(139,111,71,.18);
  border:1.5px solid rgba(139,111,71,.3);
  transition:all .35s ease;
}
.dot.done{background:var(--brick);border-color:var(--brick-d);box-shadow:0 0 8px rgba(196,115,107,.55)}

/* ---------- controls ---------- */
.controls{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap}
button{
  font-family:inherit;cursor:pointer;
  border:none;border-radius:12px;
  padding:.6rem 1.1rem;font-size:.9rem;letter-spacing:.06em;
  color:#fff;background:var(--brick);
  box-shadow:0 4px 0 var(--brick-d);
  transition:transform .08s ease, box-shadow .08s ease, background .2s;
}
button:active{transform:translateY(3px);box-shadow:0 1px 0 var(--brick-d)}
button.ghost{
  background:rgba(139,111,71,.1);color:var(--brown);
  box-shadow:0 4px 0 rgba(139,111,71,.22);
}
button.ghost:active{box-shadow:0 1px 0 rgba(139,111,71,.22)}
button:disabled{cursor:not-allowed;opacity:.85}

/* ---------- task panel ---------- */
.task-panel{width:min(440px,100%);margin-top:1.1rem}
.task-toggle{
  width:100%;text-align:left;background:rgba(255,255,255,.3);
  color:var(--brown);box-shadow:none;border:1px solid rgba(139,111,71,.14);
  display:flex;justify-content:space-between;align-items:center;
  font-size:.88rem;letter-spacing:.08em;
}
.task-toggle:active{transform:none}
.task-toggle .arr{transition:transform .3s ease}
.task-panel.open .task-toggle .arr{transform:rotate(180deg)}
.task-body{
  max-height:0;overflow:hidden;transition:max-height .35s ease;
}
.task-panel.open .task-body{max-height:240px}
.task-body textarea{
  width:100%;margin-top:.5rem;min-height:120px;resize:vertical;
  font-family:inherit;font-size:.9rem;line-height:1.7;color:var(--brown);
  background:rgba(255,255,255,.45);
  border:1px solid rgba(139,111,71,.18);border-radius:12px;
  padding:.8rem;outline:none;
}
.task-body textarea::placeholder{color:var(--gray)}

/* ---------- settings ---------- */
.settings{
  width:min(440px,100%);margin-top:.9rem;
  display:flex;gap:.55rem;flex-wrap:wrap;justify-content:center;align-items:center;
}
.settings button{background:rgba(255,255,255,.3);color:var(--brown);box-shadow:none;border:1px solid rgba(139,111,71,.14);font-size:.82rem}
.settings button:active{transform:none}
.settings select{
  font-family:inherit;font-size:.82rem;color:var(--brown);
  background:rgba(255,255,255,.3);border:1px solid rgba(139,111,71,.14);
  border-radius:12px;padding:.5rem .6rem;outline:none;cursor:pointer;
}
.settings button.off{opacity:.55}

footer{margin-top:2rem;font-size:.72rem;color:var(--gray);font-style:italic;text-align:center;max-width:420px;line-height:1.7}

/* ---------- overlays ---------- */
.overlay{
  position:fixed;inset:0;z-index:50;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem 1.5rem;text-align:center;
  opacity:0;transition:opacity .5s ease;
}
.overlay.show{display:flex;opacity:1}

/* break */
.break-overlay{background:
  radial-gradient(circle at 50% 40%, rgba(230,176,104,.22), transparent 60%),
  linear-gradient(160deg,var(--cream),var(--cream-2));
}
.break-overlay .small-cat{width:clamp(120px,32vw,170px);margin-bottom:1.2rem}
.break-overlay .msg{
  font-size:clamp(1.15rem,4.5vw,1.6rem);line-height:1.8;color:var(--brown);
  max-width:18ch;letter-spacing:.03em;
}
.break-overlay .b-timer{margin-top:1.6rem;font-size:1.6rem;color:var(--brick);font-variant-numeric:tabular-nums}
.break-overlay .b-label{margin-top:.3rem;font-size:.8rem;letter-spacing:.1em;color:var(--gray)}

/* forced walk */
.walk-overlay{background:linear-gradient(160deg,#ece9e1,#e2ded4)}
.walk-overlay .walk-cat{width:clamp(150px,38vw,200px);margin-bottom:1.4rem}
.walk-overlay .walk-title{
  font-size:clamp(1.6rem,7vw,2.6rem);font-weight:500;color:#4a4239;letter-spacing:.08em;
}
.walk-overlay .walk-note{margin-top:.7rem;font-size:.9rem;color:#7d756a;letter-spacing:.06em}
.walk-overlay .w-timer{margin-top:1.4rem;font-size:clamp(2.4rem,11vw,3.4rem);color:#6b635a;font-variant-numeric:tabular-nums}
.walk-overlay .hint{height:1.4em;margin-top:.6rem;font-size:.82rem;color:var(--brick);opacity:0;transition:opacity .3s}
.walk-overlay .hint.show{opacity:1}
.back-btn{
  margin-top:1.4rem;background:#9a948a;box-shadow:0 4px 0 #7d766c;font-size:1rem;padding:.8rem 1.8rem;
}
.back-btn.ready{background:var(--brick);box-shadow:0 4px 0 var(--brick-d)}

/* message modal */
.modal{background:rgba(50,42,34,.45);backdrop-filter:blur(3px)}
.modal-box{
  background:var(--cream);border-radius:20px;padding:1.6rem;
  width:min(420px,100%);box-shadow:0 18px 40px rgba(0,0,0,.25);
  text-align:left;
}
.modal-box h3{color:var(--brick);font-weight:500;margin-bottom:.3rem}
.modal-box p{font-size:.8rem;color:var(--gray);margin-bottom:.8rem}
.modal-box textarea{
  width:100%;min-height:170px;resize:vertical;font-family:inherit;font-size:.9rem;line-height:1.8;
  color:var(--brown);background:rgba(255,255,255,.6);border:1px solid rgba(139,111,71,.2);
  border-radius:12px;padding:.8rem;outline:none;
}
.modal-actions{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1rem}

@media (max-width:480px){
  .timer{margin-top:.1rem}
}
</style>
</head>
<body>

<header>
  <h1>番茄喵</h1>
  <div class="sub">TOMATO CAT · 专属于我的计时器</div>
  <div class="fat-badge"><span id="fatEmoji">🐱</span><span id="fatLabel">普通喵</span></div>
</header>

<main class="card">
  <div class="state-label" id="stateLabel">准备好了吗</div>
  <div class="cat-wrap" id="catWrap"></div>
  <div class="timer" id="timer">25:00</div>
  <div class="dots" id="dots"></div>
  <div class="controls">
    <button id="startBtn">开始</button>
    <button id="resetBtn" class="ghost">重置</button>
    <button id="skipBtn" class="ghost">跳过</button>
  </div>
</main>

<section class="task-panel" id="taskPanel">
  <button class="task-toggle" id="taskToggle">今天的三件事 <span class="arr">▾</span></button>
  <div class="task-body">
    <textarea id="tasks" placeholder="今天，只写三件事…&#10;1.&#10;2.&#10;3."></textarea>
  </div>
</section>

<div class="settings">
  <button id="soundBtn">🔔 声音</button>
  <select id="soundType" title="提示音">
    <option value="bell">铃 · bell</option>
    <option value="marimba">木琴 · marimba</option>
    <option value="chirp">鸟鸣 · chirp</option>
  </select>
  <button id="msgBtn">✎ 编辑碎念</button>
</div>

<footer>"属于我的计时器。不是定制主题色那种'属于我'，<br>是真的装了我自己规矩的那种。"</footer>

<!-- break overlay -->
<div class="overlay break-overlay" id="breakOverlay">
  <div class="small-cat" id="breakCat"></div>
  <div class="msg" id="breakMsg"></div>
  <div class="b-timer" id="breakTimer">5:00</div>
  <div class="b-label">短休息中 · 待会儿见</div>
  <button class="ghost" id="endBreakBtn" style="margin-top:1.4rem">结束休息</button>
</div>

<!-- forced walk overlay -->
<div class="overlay walk-overlay" id="walkOverlay">
  <div class="walk-cat" id="walkCat"></div>
  <div class="walk-title">去走走，别带手机</div>
  <div class="walk-note">第 4 个番茄结束了 · 站起来，离开屏幕</div>
  <div class="w-timer" id="walkTimer">10:00</div>
  <div class="hint" id="walkHint">还没到时间呢，再走走…</div>
  <button class="back-btn" id="backBtn">我回来了</button>
</div>

<!-- edit messages modal -->
<div class="overlay modal" id="msgModal">
  <div class="modal-box">
    <h3>休息时的碎念</h3>
    <p>每行一句，是你自己想对自己说的话。休息时随机挑一句。</p>
    <textarea id="msgText"></textarea>
    <div class="modal-actions">
      <button class="ghost" id="msgCancel">取消</button>
      <button id="msgSave">保存</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* =========================================================
   番茄喵 — single-file pomodoro
   ========================================================= */

const KEY='tomatocat.v1';
const WORK=25*60, SHORT=5*60, WALK=10*60;
const FAT_NAMES=['普通喵','微胖喵','胖喵','非常胖','圆滚滚'];
const FAT_EMOJI=['🐱','😺','😼','🐈','⚪'];
const DEFAULT_MSGS=[
  "窗户外面一直有鸟叫，我一直没认真听过。",
  "手不知道什么时候开始握着的，松开。",
  "喝点水，不是因为该喝，是因为想喝。",
  "看看远处，让眼睛走得比屏幕远一点。",
  "肩膀沉下来，不用一直扛着。",
  "深呼吸一次，慢慢的，没人在等。"
];

function todayKey(){
  const d=new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

/* ---------- state ---------- */
let S={
  mode:'work',          // work | short | walk
  running:false,
  remaining:WORK,
  endAt:null,
  completedInCycle:0,   // work sessions done in current 4-cycle (0..4)
  walkDone:false,
  catLevel:0,           // 0..4 fatness
  cyclesToday:0,
  date:todayKey(),
  messages:DEFAULT_MSGS.slice(),
  tasks:'',
  soundOn:true,
  soundType:'bell'
};

function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw){ Object.assign(S, JSON.parse(raw)); }
  }catch(e){}
  // daily reset
  if(S.date!==todayKey()){
    S.date=todayKey();
    S.catLevel=0;
    S.cyclesToday=0;
    S.completedInCycle=0;
    S.tasks='';
    S.mode='work'; S.running=false; S.remaining=WORK; S.endAt=null; S.walkDone=false;
  }
  if(!Array.isArray(S.messages)||!S.messages.length) S.messages=DEFAULT_MSGS.slice();
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }

/* =========================================================
   PIXEL-ART CAT GENERATOR (parametric, 5 fatness + sleep)
   ========================================================= */
const C={
  fur:'#e8a261', furD:'#d2873f',
  body:'#c4736b', bodyD:'#a85d57',
  belly:'#e2b3aa',
  out:'#5a4a3a',
  pink:'#e8949c',
  eye:'#4a3b2e',
  leaf:'#7fa86b', leafD:'#5f8a4d',
  white:'#fff7ea'
};
const GW=28, GH=26;

function blank(){ const g=[]; for(let y=0;y<GH;y++){g.push(new Array(GW).fill(null));} return g; }
function px(g,x,y,c){ x=Math.round(x);y=Math.round(y); if(x>=0&&x<GW&&y>=0&&y<GH) g[y][x]=c; }
function drawEllipse(g,cx,cy,rx,ry,fill,outline){
  const inside=(x,y)=>{const dx=(x-cx)/rx,dy=(y-cy)/ry;return dx*dx+dy*dy<=1;};
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    if(inside(x,y)){
      const edge=!inside(x-1,y)||!inside(x+1,y)||!inside(x,y-1)||!inside(x,y+1);
      g[y][x]= (edge&&outline)?outline:fill;
    }
  }
}

function buildCat(level, pose){
  // pose: 'awake' | 'rest' | 'sleep'
  const g=blank();
  const cx=14;
  const sleeping = pose==='sleep';
  const bodyRx = 6 + level*1.4;
  const bodyRy = 6 + level*0.55 + (sleeping?1.2:0);
  const bodyCy = 17 + (sleeping?1:0);
  const headCy = sleeping?14:10;
  const headRx=5.3, headRy=4.8;

  // ---- tail (behind, drawn first; curl on lower right) ----
  const tx=cx+bodyRx*0.78;
  [[tx,bodyCy+2],[tx+1.4,bodyCy+1],[tx+2,bodyCy-.5],[tx+1.6,bodyCy-2],[tx+.4,bodyCy-2.8]]
    .forEach(p=>{px(g,p[0],p[1],C.fur);px(g,p[0]+0.0,p[1]+0.0,C.fur);});
  // tail outline-ish
  [[tx-0.6,bodyCy+2.4],[tx+2.6,bodyCy-.3]].forEach(p=>px(g,p[0],p[1],C.furD));

  // ---- body (tomato red) ----
  drawEllipse(g,cx,bodyCy,bodyRx,bodyRy,C.body,C.bodyD);
  // belly patch
  drawEllipse(g,cx,bodyCy+1.4,bodyRx*0.55,bodyRy*0.62,C.belly,null);

  // ---- front paws ----
  const pawY=bodyCy+bodyRy-1.3;
  drawEllipse(g,cx-2.4,pawY,1.7,1.4,C.fur,C.furD);
  drawEllipse(g,cx+2.4,pawY,1.7,1.4,C.fur,C.furD);

  // ---- ears ----
  const eb=Math.round(headCy-headRy+0.3);
  // left ear
  px(g,cx-4,eb,C.fur);px(g,cx-3,eb,C.fur);px(g,cx-2,eb,C.fur);
  px(g,cx-4,eb-1,C.fur);px(g,cx-3,eb-1,C.fur);
  px(g,cx-4,eb-2,C.out);px(g,cx-5,eb,C.out);
  px(g,cx-3,eb,C.pink);
  // right ear
  px(g,cx+4,eb,C.fur);px(g,cx+3,eb,C.fur);px(g,cx+2,eb,C.fur);
  px(g,cx+4,eb-1,C.fur);px(g,cx+3,eb-1,C.fur);
  px(g,cx+4,eb-2,C.out);px(g,cx+5,eb,C.out);
  px(g,cx+3,eb,C.pink);

  // ---- tomato stem / leaf on top ----
  px(g,cx,eb-3,C.leaf);px(g,cx-1,eb-3,C.leafD);px(g,cx+1,eb-3,C.leaf);
  px(g,cx,eb-4,C.leafD);

  // ---- head (orange) ----
  drawEllipse(g,cx,headCy,headRx,headRy,C.fur,C.furD);

  // ---- eyes ----
  if(sleeping){
    // flat closed eyes "— —"
    [-3,-2,-1].forEach(d=>px(g,cx+d,headCy,C.eye));
    [1,2,3].forEach(d=>px(g,cx+d,headCy,C.eye));
  }else{
    // happy caret eyes "ᵔ ᵔ"
    px(g,cx-3,headCy,C.eye);px(g,cx-2,headCy-1,C.eye);px(g,cx-1,headCy,C.eye);
    px(g,cx+1,headCy,C.eye);px(g,cx+2,headCy-1,C.eye);px(g,cx+3,headCy,C.eye);
  }

  // ---- nose + tiny mouth ----
  px(g,cx,headCy+2,C.pink);
  px(g,cx-1,headCy+3,C.out);px(g,cx+1,headCy+3,C.out);

  // ---- cheeks / blush ----
  px(g,cx-4,headCy+1,C.pink);px(g,cx-4,headCy+2,C.pink);
  px(g,cx+4,headCy+1,C.pink);px(g,cx+4,headCy+2,C.pink);

  // ---- whiskers ----
  px(g,cx-6,headCy+1,C.furD);px(g,cx-5,headCy+1,C.furD);
  px(g,cx+6,headCy+1,C.furD);px(g,cx+5,headCy+1,C.furD);

  // ---- Zzz for sleep ----
  let extra='';
  if(sleeping){
    extra='<text x="22" y="7" font-size="3.2" fill="#7d756a" font-family="monospace">z</text>'
        +'<text x="24" y="4.5" font-size="2.4" fill="#9a948a" font-family="monospace">z</text>';
  }
  return svgFromGrid(g, extra);
}

function svgFromGrid(g, extra){
  const parts=[];
  for(let y=0;y<GH;y++){
    let x=0;
    while(x<GW){
      const c=g[y][x];
      if(!c){x++;continue;}
      let x2=x;
      while(x2+1<GW && g[y][x2+1]===c) x2++;
      parts.push('<rect x="'+x+'" y="'+y+'" width="'+(x2-x+1)+'" height="1" fill="'+c+'"/>');
      x=x2+1;
    }
  }
  return '<svg class="cat-svg" viewBox="0 0 '+GW+' '+GH+'" xmlns="http://www.w3.org/2000/svg" '
       + 'shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">'
       + parts.join('') + (extra||'') + '</svg>';
}

/* =========================================================
   SOUND — true mute, WebAudio chimes
   ========================================================= */
let actx=null;
function ensureAudio(){
  if(!S.soundOn) return null;
  try{
    if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
    return actx;
  }catch(e){ return null; }
}
function note(ctx,freq,delay,dur,wave,peak,glideTo){
  const o=ctx.createOscillator(), gn=ctx.createGain();
  o.type=wave; o.connect(gn); gn.connect(ctx.destination);
  const s=ctx.currentTime+delay;
  o.frequency.setValueAtTime(freq,s);
  if(glideTo) o.frequency.exponentialRampToValueAtTime(glideTo,s+dur*0.9);
  gn.gain.setValueAtTime(0.0001,s);
  gn.gain.exponentialRampToValueAtTime(peak,s+0.02);
  gn.gain.exponentialRampToValueAtTime(0.0001,s+dur);
  o.start(s); o.stop(s+dur+0.05);
}
function chime(){
  // TRUE MUTE: when off, never touch audio at all
  if(!S.soundOn) return;
  const ctx=ensureAudio(); if(!ctx) return;
  const t=S.soundType;
  if(t==='bell'){
    note(ctx,880,0,0.9,'sine',0.16);
    note(ctx,1318,0.12,0.9,'sine',0.12);
  }else if(t==='marimba'){
    note(ctx,523,0,0.35,'triangle',0.18);
    note(ctx,784,0.13,0.4,'triangle',0.14);
    note(ctx,1046,0.26,0.5,'triangle',0.10);
  }else{ // chirp
    note(ctx,680,0,0.18,'sine',0.14,1100);
    note(ctx,900,0.16,0.2,'sine',0.12,1400);
  }
}

/* =========================================================
   DOM
   ========================================================= */
const $=id=>document.getElementById(id);
const els={
  body:document.body,
  state:$('stateLabel'), catWrap:$('catWrap'), timer:$('timer'), dots:$('dots'),
  start:$('startBtn'), reset:$('resetBtn'), skip:$('skipBtn'),
  fatLabel:$('fatLabel'), fatEmoji:$('fatEmoji'),
  taskPanel:$('taskPanel'), taskToggle:$('taskToggle'), tasks:$('tasks'),
  soundBtn:$('soundBtn'), soundType:$('soundType'), msgBtn:$('msgBtn'),
  breakOverlay:$('breakOverlay'), breakCat:$('breakCat'), breakMsg:$('breakMsg'),
  breakTimer:$('breakTimer'), endBreak:$('endBreakBtn'),
  walkOverlay:$('walkOverlay'), walkCat:$('walkCat'), walkTimer:$('walkTimer'),
  walkHint:$('walkHint'), back:$('backBtn'),
  msgModal:$('msgModal'), msgText:$('msgText'), msgSave:$('msgSave'), msgCancel:$('msgCancel')
};

function fmt(sec){
  sec=Math.max(0,Math.ceil(sec));
  const m=Math.floor(sec/60), s=sec%60;
  return m+':'+(s<10?'0':'')+s;
}

/* ---------- rendering ---------- */
function renderCat(){
  let pose='rest';
  if(S.mode==='work') pose= S.running?'awake':'rest';
  const svg=buildCat(S.catLevel,pose);
  els.catWrap.innerHTML=svg;
  const node=els.catWrap.querySelector('svg');
  if(S.mode==='work' && S.running) node.classList.add('breathing');
}
function renderFat(){
  els.fatLabel.textContent=FAT_NAMES[S.catLevel];
  els.fatEmoji.textContent=FAT_EMOJI[S.catLevel];
}
function renderDots(){
  els.dots.innerHTML='';
  for(let i=0;i<4;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<S.completedInCycle?' done':'');
    els.dots.appendChild(d);
  }
}
function renderState(){
  els.state.classList.remove('break');
  if(S.mode==='work'){
    els.state.textContent= S.running ? '专注中 · 第 '+(S.completedInCycle+1)+' 个番茄' : '准备好了吗';
  }else if(S.mode==='short'){
    els.state.textContent='短休息中'; els.state.classList.add('break');
  }else if(S.mode==='walk'){
    els.state.textContent='去走走'; els.state.classList.add('break');
  }
  els.start.textContent = S.running ? '暂停' : '开始';
  els.skip.style.display = (S.mode==='walk') ? 'none' : '';
}
function renderTimer(){
  els.timer.textContent=fmt(S.remaining);
  if(S.mode==='short') els.breakTimer.textContent=fmt(S.remaining);
  if(S.mode==='walk') els.walkTimer.textContent=fmt(S.remaining);
}
function renderAll(){
  renderCat(); renderFat(); renderDots(); renderState(); renderTimer();
  els.tasks.value=S.tasks;
  els.soundType.value=S.soundType;
  els.soundBtn.textContent= S.soundOn ? '🔔 声音' : '🔕 静音';
  els.soundBtn.classList.toggle('off', !S.soundOn);
}

/* =========================================================
   TIMER ENGINE
   ========================================================= */
let ticker=null;
function startTicker(){ if(!ticker) ticker=setInterval(tick,250); }
function syncRemaining(){
  if(S.running && S.endAt){ S.remaining=(S.endAt-Date.now())/1000; }
}
function tick(){
  if(!S.running){ return; }
  syncRemaining();
  if(S.remaining<=0){
    S.remaining=0; renderTimer();
    complete();
    return;
  }
  renderTimer();
}

function beginCountdown(seconds){
  S.remaining=seconds;
  S.running=true;
  S.endAt=Date.now()+seconds*1000;
  save(); startTicker();
}

function complete(){
  S.running=false; S.endAt=null;
  if(S.mode==='work'){
    S.completedInCycle++;
    chime();
    if(S.completedInCycle>=4){ startWalk(); }
    else { startShort(); }
  }else if(S.mode==='short'){
    chime();
    endShort();
  }else if(S.mode==='walk'){
    // do NOT auto-advance; user must press 我回来了 AFTER timer
    S.walkDone=true;
    chime();
    els.back.classList.add('ready');
    els.walkHint.classList.remove('show');
    // gently wake the sleeping cat (eyes still, but ready)
    renderTimer();
  }
  save();
  renderDots(); renderState(); renderCat();
}

/* ---- work ---- */
function loadWork(){
  S.mode='work'; S.running=false; S.remaining=WORK; S.endAt=null;
  renderAll(); save();
}

/* ---- short break ---- */
function startShort(){
  S.mode='short';
  const m=S.messages[Math.floor(Math.random()*S.messages.length)] || DEFAULT_MSGS[0];
  els.breakMsg.textContent=m;
  els.breakCat.innerHTML=buildCat(S.catLevel,'rest');
  els.breakOverlay.classList.add('show');
  beginCountdown(SHORT);
  renderState(); renderTimer();
}
function endShort(){
  els.breakOverlay.classList.remove('show');
  loadWork();
}

/* ---- forced walk (4th pomodoro) ---- */
function startWalk(){
  S.mode='walk'; S.walkDone=false;
  els.back.classList.remove('ready');
  els.walkHint.classList.remove('show');
  els.walkCat.innerHTML=buildCat(S.catLevel,'sleep');
  els.body.classList.add('grayscale');          // ENTIRE UI -> grayscale
  els.walkOverlay.classList.add('show');
  beginCountdown(WALK);
  renderState(); renderTimer();
}
function tryComeBack(){
  if(!S.walkDone){
    // reject early click: cat shakes head + hint
    const c=els.walkCat.querySelector('svg');
    if(c){ c.classList.remove('shake'); void c.offsetWidth; c.classList.add('shake'); }
    els.walkHint.classList.add('show');
    return;
  }
  // valid: color returns, cat stretches awake, cycle completes, cat fattens
  finishWalk();
}
function finishWalk(){
  S.catLevel=Math.min(4,S.catLevel+1);   // progressive fattening
  S.cyclesToday++;
  S.completedInCycle=0;
  S.walkDone=false;
  S.mode='work'; S.running=false; S.remaining=WORK; S.endAt=null;
  els.body.classList.remove('grayscale');         // color returns
  // stretch-wake animation on the overlay cat before closing
  els.walkCat.innerHTML=buildCat(S.catLevel,'awake');
  const c=els.walkCat.querySelector('svg');
  if(c) c.classList.add('stretch');
  chime();
  save();
  setTimeout(()=>{
    els.walkOverlay.classList.remove('show');
    renderAll();
  },650);
}

/* =========================================================
   CONTROLS
   ========================================================= */
els.start.addEventListener('click',()=>{
  ensureAudio(); // unlock audio on user gesture
  if(S.mode!=='work') return; // breaks/walk run on their own
  if(S.running){
    syncRemaining(); S.running=false; S.endAt=null; save();
  }else{
    beginCountdown(S.remaining>0?S.remaining:WORK);
  }
  renderState(); renderCat();
});
els.reset.addEventListener('click',()=>{
  if(S.mode!=='work'){ return; }
  S.running=false; S.endAt=null; S.remaining=WORK; save();
  renderState(); renderTimer(); renderCat();
});
els.skip.addEventListener('click',()=>{
  if(S.mode==='walk') return;
  S.remaining=0;
  if(S.mode==='work'){ S.running=true; } // allow complete() flow
  complete();
});
els.endBreak.addEventListener('click',()=>{
  S.running=false; S.endAt=null;
  endShort();
});
els.back.addEventListener('click',tryComeBack);

/* ---- task panel ---- */
els.taskToggle.addEventListener('click',()=>{
  els.taskPanel.classList.toggle('open');
});
els.tasks.addEventListener('input',()=>{ S.tasks=els.tasks.value; save(); });

/* ---- sound ---- */
els.soundBtn.addEventListener('click',()=>{
  S.soundOn=!S.soundOn;
  if(S.soundOn){ ensureAudio(); chime(); }
  save(); renderAll();
});
els.soundType.addEventListener('change',()=>{
  S.soundType=els.soundType.value; save();
  if(S.soundOn){ ensureAudio(); chime(); }
});

/* ---- edit messages ---- */
els.msgBtn.addEventListener('click',()=>{
  els.msgText.value=S.messages.join('\n');
  els.msgModal.classList.add('show');
});
els.msgCancel.addEventListener('click',()=>els.msgModal.classList.remove('show'));
els.msgSave.addEventListener('click',()=>{
  const lines=els.msgText.value.split('\n').map(s=>s.trim()).filter(Boolean);
  S.messages = lines.length?lines:DEFAULT_MSGS.slice();
  save();
  els.msgModal.classList.remove('show');
});
els.msgModal.addEventListener('click',e=>{ if(e.target===els.msgModal) els.msgModal.classList.remove('show'); });

/* keep accurate when tab regains focus */
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){ syncRemaining(); if(S.remaining<=0 && S.running){ S.remaining=0; complete(); } else renderTimer(); }
});

/* =========================================================
   BOOT — restore session (incl. mid-walk / mid-break)
   ========================================================= */
function boot(){
  load();
  // restore an in-progress timed session using endAt
  if(S.running && S.endAt){
    S.remaining=(S.endAt-Date.now())/1000;
    if(S.remaining<=0){
      // session elapsed while away
      S.remaining=0;
      if(S.mode==='work'){ complete(); }
      else if(S.mode==='short'){ S.running=false; S.endAt=null; endShort(); }
      else if(S.mode==='walk'){ S.running=false; S.endAt=null; S.walkDone=true; }
    }
  }
  renderAll();

  // re-open the right overlay if we were mid break/walk
  if(S.mode==='short' && (S.running || S.remaining>0)){
    const m=S.messages[Math.floor(Math.random()*S.messages.length)]||DEFAULT_MSGS[0];
    els.breakMsg.textContent=m;
    els.breakCat.innerHTML=buildCat(S.catLevel,'rest');
    els.breakOverlay.classList.add('show');
    if(S.running) startTicker();
  }
  if(S.mode==='walk'){
    els.walkCat.innerHTML=buildCat(S.catLevel, S.walkDone?'awake':'sleep');
    els.body.classList.add('grayscale');
    els.walkOverlay.classList.add('show');
    els.back.classList.toggle('ready', S.walkDone);
    if(S.running) startTicker();
  }
  renderTimer();
}
boot();
</script>
</body>
</html>
